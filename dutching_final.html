        const CheckCircle = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;

        const Activity = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 6 12 2 12"></polyline></svg>;
        const Target = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const BookOpen = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;

        const Network = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="16" y="16" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="2" width="6" height="6" rx="1"></rect><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"></path><path d="M12 12V8"></path></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
        const Clock = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const Combine = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="8" width="8" height="8" rx="2" ry="2"></rect><path d="M14 2v4a2 2 0 0 0 2 2h4"></path><path d="M14 22v-4a2 2 0 0 1 2-2h4"></path><path d="M10 2v4a2 2 0 0 1-2 2H4"></path><path d="M10 22v-4a2 2 0 0 0-2-2H4"></path></svg>;
        const Settings = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const Zap = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const User = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const ShieldCheck = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;

        // Вспомогательная функция комбинаторики
        const getCombinations = (arr, k) => {
            if (k === 1) return arr.map(a => [a]);
            if (k === arr.length) return [arr];
            if (k > arr.length) return [];
            const combos = [];
            arr.forEach((item, i) => {
                const smallerCombos = getCombinations(arr.slice(i + 1), k - 1);
                smallerCombos.forEach(sc => combos.push([item, ...sc]));
            });
            return combos;
        };

        const formatUSD = (val, maxDigits = 2) => val.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: maxDigits }) + ' $';

        function App() {
          // --- ГЛОБАЛЬНЫЙ СТЕЙТ ---
          const [mainBank, setMainBank] = useState(() => parseFloat(localStorage.getItem('dutchingMainBank')) || 1000);
          const [bank, setBank] = useState(50);
          const [minimumBet, setMinimumBet] = useState(0.20);
          const [historyData, setHistoryData] = useState(() => JSON.parse(localStorage.getItem('dutchingHistoryData')) || []);
          const [activeTab, setActiveTab] = useState('classic');

          // --- СОСТОЯНИЯ: КЛАССИКА ---
          const [classicCount, setClassicCount] = useState(3);
          const [placedBetsClassic, setPlacedBetsClassic] = useState(new Set());
          const [classicModes, setClassicModes] = useState({});
          const [classicMatches, setClassicMatches] = useState([
            { id: 1, name: 'Atletic - Roma', outcomes: [{ label: 'W1', odd: 2.0, active: true }, { label: 'X', odd: 3.6, active: true }, { label: 'W2', odd: 4.1, active: false }] },
            { id: 2, name: 'Vitoria G. - Betis', outcomes: [{ label: 'W1', odd: 3.1, active: false }, { label: 'X', odd: 3.2, active: true }, { label: 'W2', odd: 2.4, active: true }] },
            { id: 3, name: 'Rangers - Fener', outcomes: [{ label: 'W1', odd: 2.85, active: false }, { label: 'X', odd: 3.75, active: true }, { label: 'W2', odd: 2.3, active: true }] },
            { id: 4, name: 'Man Un - Sociedad', outcomes: [{ label: 'W1', odd: 2.0, active: true }, { label: 'X', odd: 3.3, active: true }, { label: 'W2', odd: 3.95, active: false }] },
            { id: 5, name: 'Матч 5', outcomes: [{ label: 'W1', odd: 2.5, active: true }, { label: 'X', odd: 3.0, active: true }, { label: 'W2', odd: 2.8, active: false }] },
            { id: 6, name: 'Матч 6', outcomes: [{ label: 'W1', odd: 1.8, active: true }, { label: 'X', odd: 3.5, active: true }, { label: 'W2', odd: 4.5, active: false }] }
          ]);

          // --- СОСТОЯНИЯ: ТОТАЛЫ ---
          const [totalsStrategy, setTotalsStrategy] = useState('smart'); 
          const [customTotalsCount, setCustomTotalsCount] = useState(4);
          const [placedBetsTotals, setPlacedBetsTotals] = useState(new Set());
          const [totalsModes, setTotalsModes] = useState({});
          const [totalsMatches, setTotalsMatches] = useState(Array.from({ length: 10 }, (_, i) => ({ id: i + 1, name: `Матч ${i+1}`, outcomes: [{ label: 'ТБ 2.5', odd: 1.80, active: true }, { label: 'ТМ 2.5', odd: 1.95, active: true }] })));

          // --- СОСТОЯНИЯ: ОЗ ---
          const [bttsStrategy, setBttsStrategy] = useState('shootout'); 
          const [customBttsCount, setCustomBttsCount] = useState(4);
          const [placedBetsBtts, setPlacedBetsBtts] = useState(new Set());
          const [bttsModes, setBttsModes] = useState({});
          const [bttsMatches, setBttsMatches] = useState(Array.from({ length: 10 }, (_, i) => ({ id: i + 1, name: `Матч ОЗ ${i+1}`, outcomes: [{ label: 'Да', odd: 1.70, active: true }, { label: 'Нет', odd: 2.10, active: true }] })));

          // --- СОСТОЯНИЯ: СИСТЕМЫ (ВЕЕР) ---
          const [systemStrategy, setSystemStrategy] = useState('matrix'); 
          const [systemMatrixType, setSystemMatrixType] = useState('3/6'); 
          const [systemBritishType, setSystemBritishType] = useState('Yankee'); 
          const [placedBetsSystems, setPlacedBetsSystems] = useState(new Set());
          const [systemsModes, setSystemsModes] = useState({});
          const [systemsMatches, setSystemsMatches] = useState(Array.from({ length: 6 }, (_, i) => ({ id: i + 1, name: `Событие ${i+1}`, label: 'Ничья', odd: 3.20 })));

          // --- СОСТОЯНИЯ: ИНД. ТОТАЛ ---
          const [itStrategy, setItStrategy] = useState('synth_itb'); 
          const [itHtFtSystemType, setItHtFtSystemType] = useState('2/3'); 
          const [placedBetsIt, setPlacedBetsIt] = useState(new Set());
          const [itModes, setItModes] = useState({});
          const [itSynthMatches, setItSynthMatches] = useState([{ id: 1, name: 'Команда W', outcomes: [{ label: 'Ровно 2 гола', odd: 3.50, active: true }, { label: 'Ровно 3 гола', odd: 6.00, active: true }, { label: '4+ голов', odd: 10.00, active: true }] }]);
          const [itSafeMatches, setItSafeMatches] = useState([{ id: 1, name: 'Андердог - Фаворит', outcomes: [{ label: 'ИТБ1 (0.5)', odd: 1.70, active: true }, { label: 'Счет 0:0', odd: 12.00, active: true }] }]);
          const [itHtFtMatches, setItHtFtMatches] = useState([{ id: 1, name: 'Ман Сити', label: 'Гол в обоих таймах', odd: 2.10 }, { id: 2, name: 'Бавария', label: 'Гол в обоих таймах', odd: 2.20 }, { id: 3, name: 'Реал Мадрид', label: 'Гол в обоих таймах', odd: 2.30 }, { id: 4, name: 'ПСЖ', label: 'Гол в обоих таймах', odd: 2.15 }]);

          // --- СОСТОЯНИЯ: КАСКАД (МАТРЁШКА) ---
          const [cascadeTotalMatchesInput, setCascadeTotalMatchesInput] = useState(15);
          const [cascadeStepInput, setCascadeStepInput] = useState(3);
          const [cascadeMatches, setCascadeMatches] = useState([]);
          const [cascadeExpresses, setCascadeExpresses] = useState([]);
          const [placedBetsCascade, setPlacedBetsCascade] = useState(new Set());

          // --- СОСТОЯНИЯ: УМНЫЙ ДОГОН ---
          const [chaserTarget, setChaserTarget] = useState(50);
          const [chaserSteps, setChaserSteps] = useState([]);
          const [chaserInputOdd, setChaserInputOdd] = useState(3.50);

          // --- СОСТОЯНИЯ: МОИ СТРАТЕГИИ ---
          const [customStrategies, setCustomStrategies] = useState(() => JSON.parse(localStorage.getItem('dutchingCustomStrats')) || []);
          const [activeStrategyId, setActiveStrategyId] = useState(null);
          const [showStratModal, setShowStratModal] = useState(false);
          const [editStratId, setEditStratId] = useState(null);
          const [stratForm, setStratForm] = useState({ name: '', description: '', startBank: '' });
          const [newBetForm, setNewBetForm] = useState({ match: '', stake: '', odd: '' });

          // Сохранение в LocalStorage
          useEffect(() => { localStorage.setItem('dutchingMainBank', mainBank); }, [mainBank]);
          useEffect(() => { localStorage.setItem('dutchingHistoryData', JSON.stringify(historyData)); }, [historyData]);
          useEffect(() => { localStorage.setItem('dutchingCustomStrats', JSON.stringify(customStrategies)); }, [customStrategies]);

          // --- ИНИЦИАЛИЗАЦИЯ КАСКАДА ---
          const generateCascade = () => {
              const count = parseInt(cascadeTotalMatchesInput) || 15;
              const step = parseInt(cascadeStepInput) || 3;
              const newMatches = Array.from({ length: count }, (_, i) => ({ id: i + 1, name: `Матч ${i + 1}`, odd: (1.30 + Math.random() * 0.4).toFixed(2), status: 'PENDING' }));
              setCascadeMatches(newMatches);
              const newExpresses = [];
              let expId = 1;
              for (let i = count; i >= 1; i -= step) {
                  newExpresses.push({ id: expId, name: `Экспресс ${expId} (${i} м)`, included: Array.from({length: i}, (_, j) => j + 1) });
                  expId++;
              }
              setCascadeExpresses(newExpresses);
              setPlacedBetsCascade(new Set());
          };

          useEffect(() => { generateCascade(); }, []);

          // --- РАСЧЕТ РЕЗУЛЬТАТОВ КАСКАДА ---
          const cascadeResults = useMemo(() => {
              const totalBank = parseFloat(bank);
              const minBet = parseFloat(minimumBet) || 0;
              if (isNaN(totalBank) || totalBank <= 0) return null;

              const calculatedExpresses = cascadeExpresses.map(exp => {
                  const parts = exp.included.map(matchId => cascadeMatches.find(m => m.id === matchId)).filter(Boolean);
                  const totalOdd = parts.reduce((acc, match) => acc * (parseFloat(match.odd) || 1), 1);
                  return { ...exp, parts, totalOdd, prob: 1 / totalOdd };
              }).filter(exp => exp.parts.length > 0); 

              if (calculatedExpresses.length === 0) return null;

              const sumProbs = calculatedExpresses.reduce((sum, exp) => sum + exp.prob, 0);
              const targetPayout = totalBank / sumProbs;

              let actualBank = 0;
              const finalExpresses = calculatedExpresses.map(exp => {
                  const stake = Math.max(Math.round((targetPayout / exp.totalOdd) * 100) / 100, minBet);
                  actualBank += stake;
                  
                  let expStatus = 'WON';
                  for (const match of exp.parts) {
                      if (match.status === 'LOST') { expStatus = 'LOST'; break; }
                      if (match.status === 'PENDING') expStatus = 'PENDING';
                  }
                  return { ...exp, stake, payout: stake * exp.totalOdd, status: expStatus };
              });

              const totalWonPayout = finalExpresses.reduce((sum, exp) => sum + (exp.status === 'WON' ? exp.payout : 0), 0);
              const potentialPayout = finalExpresses.reduce((sum, exp) => sum + ((exp.status === 'WON' || exp.status === 'PENDING') ? exp.payout : 0), 0);
              const netProfit = totalWonPayout - actualBank;

              return {
                  expresses: finalExpresses, targetPayout, actualBank, totalWonPayout, potentialPayout, netProfit,
                  allLost: finalExpresses.every(e => e.status === 'LOST'),
                  allPending: finalExpresses.every(e => e.status === 'PENDING'),
                  strategyName: 'Каскад (Матрёшка)'
              };
          }, [cascadeMatches, cascadeExpresses, bank, minimumBet]);


          // --- ЛОГИКА ДОГОНА ---
          const startChaser = () => {
              if(parseFloat(chaserTarget) <= 0) return;
              setChaserSteps([{ id: Date.now(), stake: parseFloat(chaserTarget) / (parseFloat(chaserInputOdd) - 1), odd: parseFloat(chaserInputOdd), result: 'PENDING' }]);
          };
          const handleChaserResult = (index, result) => {
              const newSteps = [...chaserSteps]; newSteps[index].result = result;
              if (result === 'LOST') {
                  const totalLosses = newSteps.filter(s => s.result === 'LOST').reduce((sum, s) => sum + s.stake, 0);
                  const nextStake = (parseFloat(chaserTarget) + totalLosses) / (parseFloat(chaserInputOdd) - 1);
                  newSteps.push({ id: Date.now(), stake: nextStake, odd: parseFloat(chaserInputOdd), result: 'PENDING' });
                  setMainBank((parseFloat(mainBank) - newSteps[index].stake).toFixed(2));
              } else if (result === 'WON') {
                  const winAmount = newSteps[index].stake * newSteps[index].odd;
                  const totalInvested = newSteps.reduce((sum, s) => sum + s.stake, 0);
                  const netProfit = winAmount - totalInvested;
                  setMainBank((parseFloat(mainBank) + (winAmount - newSteps[index].stake)).toFixed(2));
                  newSteps.push({ id: Date.now(), isDone: true, netProfit });
              }
              setChaserSteps(newSteps);
          };

          // --- ЛОГИКА ВКЛАДОК ДАТЧИНГА ---
          const getActiveMatches = () => {
              if (activeTab === 'classic') return classicMatches.slice(0, classicCount);
              if (activeTab === 'totals') return totalsMatches.slice(0, totalsStrategy === 'smart' ? 4 : totalsStrategy === 'anti' ? 3 : totalsStrategy === 'banker' ? 5 : totalsStrategy === 'teasers' ? 4 : customTotalsCount);
              if (activeTab === 'btts') return bttsMatches.slice(0, bttsStrategy === 'shootout' ? 4 : bttsStrategy === 'zero' ? 3 : customBttsCount);
              if (activeTab === 'systems') {
                  if (systemStrategy === 'matrix') return (systemMatrixType === '2/4' || systemMatrixType === '3/4') ? systemsMatches.slice(0, 4) : systemsMatches.slice(0, 6);
                  if (systemStrategy === 'anchors') return systemsMatches.slice(0, 6);
                  if (systemStrategy === 'fullcover' || systemStrategy === 'anti_express') return systemsMatches.slice(0, 5);
                  if (systemStrategy === 'british') return systemsMatches.slice(0, systemBritishType === 'Yankee' ? 4 : systemBritishType === 'Canadian' ? 5 : 6);
              }
              if (activeTab === 'it') {
                  if (itStrategy === 'synth_itb') return itSynthMatches;
                  if (itStrategy === 'safe_underdog') return itSafeMatches;
                  if (itStrategy === 'ht_ft_goals') {
                      const totalM = parseInt(itHtFtSystemType.split('/')[1]);
                      return itHtFtMatches.slice(0, totalM);
                  }
              }
              return [];
          };

          const handlePresetSwitch = (tab, preset) => {
              if (tab === 'totals') {
                  setTotalsStrategy(preset); setPlacedBetsTotals(new Set()); setTotalsModes({});
                  setTotalsMatches(prev => prev.map((m, i) => {
                      if (preset === 'teasers') return { ...m, outcomes: [{ label: 'ТБ 1.5', odd: 1.30, active: true }, { label: 'ТМ 1.5', odd: 3.20, active: true }] };
                      return { ...m, outcomes: [ { ...m.outcomes[0], label: 'ТБ 2.5', active: true }, { ...m.outcomes[1], label: 'ТМ 2.5', active: preset === 'banker' && i < 2 ? false : true } ] };
                  }));
              }
              if (tab === 'btts') {
                  setBttsStrategy(preset); setPlacedBetsBtts(new Set()); setBttsModes({});
                  setBttsMatches(prev => prev.map((m, i) => ({ ...m, outcomes: [ { ...m.outcomes[0], active: true }, { ...m.outcomes[1], active: true } ] })));
              }
              if (tab === 'systems') {
                  setSystemStrategy(preset); setPlacedBetsSystems(new Set()); setSystemsModes({});
                  if (preset === 'anti_express') {
                      setSystemsMatches(prev => prev.map(m => ({...m, outcomes: [{label: 'Фаворит', odd: 1.40, active: true}, {label: 'Осечка', odd: 2.80, active: true}]})));
                  } else if (preset === 'british') {
                      setSystemsMatches(prev => prev.map(m => ({...m, outcomes: [{label: 'Победа', odd: 1.90, active: true}]})));
                  }
              }
              if (tab === 'it') {
                  setItStrategy(preset); setPlacedBetsIt(new Set()); setItModes({});
              }
          };

          // --- РАСЧЕТ РЕЗУЛЬТАТОВ (Обычный Датчинг и Системы) ---
          const getResults = () => {
            if (activeTab === 'strategies' || activeTab === 'cascade' || activeTab === 'chaser' || activeTab === 'ultra') return null;
            const totalBank = parseFloat(bank); const minBet = parseFloat(minimumBet) || 0;
            if (totalBank <= 0) return { expresses: [], summary: null };

            const currentMatches = getActiveMatches();
            let expressesRaw = [];
            const currentModesState = activeTab === 'classic' ? classicModes : activeTab === 'totals' ? totalsModes : activeTab === 'btts' ? bttsModes : activeTab === 'it' ? itModes : systemsModes;

            if (activeTab === 'systems' || (activeTab === 'it' && itStrategy === 'ht_ft_goals')) {
                if (systemStrategy === 'anti_express' || systemStrategy === 'british') {
                    const activePaths = currentMatches.map((m, mIdx) => m.outcomes.map((o, oIdx) => ({ ...o, matchName: m.name, matchIdx: mIdx, outcomeIdx: oIdx })).filter(o => o.active));
                    if (activePaths.some(p => p.length === 0)) return { expresses: [], summary: null, error: "Выберите хотя бы один исход." };
                    let combos = [[]];
                    for (const path of activePaths) { const newCombos = []; for (const combo of combos) { for (const outcome of path) newCombos.push([...combo, outcome]); } combos = newCombos; }

                    if (systemStrategy === 'anti_express') {
                        expressesRaw = combos.map((parts, index) => {
                            const totalOdd = parts.reduce((acc, part) => acc * parseFloat(part.odd || 1), 1);
                            const hash = parts.map(p => `${p.matchIdx}-${p.outcomeIdx}`).join('|');
                            let defaultMode = parts.every(p => p.label === 'Фаворит') ? 'SKIP' : 'MAIN';
                            return { id: index + 1, hash, parts, totalOdd, mode: currentModesState[hash] || defaultMode };
                        });
                    } else if (systemStrategy === 'british') {
                        const activeOutcomes = currentMatches.map((m, i) => {
                            const active = m.outcomes.find(o => o.active);
                            return active ? { matchName: m.name, label: active.label, odd: parseFloat(active.odd), matchIdx: i } : null;
                        }).filter(o => o !== null);
                        
                        let bCombos = [];
                        for (let k = 2; k <= activeOutcomes.length; k++) { bCombos.push(...getCombinations(activeOutcomes, k)); }
                        expressesRaw = bCombos.map((parts, index) => {
                            const totalOdd = parts.reduce((acc, part) => acc * part.odd, 1);
                            const hash = parts.map(p => p.matchIdx).join('|');
                            return { id: index + 1, hash, parts, totalOdd, mode: currentModesState[hash] || 'MAIN' };
                        });
                    }
                } else {
                    if (currentMatches.some(m => !m.odd || parseFloat(m.odd) <= 0)) return { expresses: [], summary: null, error: "Укажите корректные коэффициенты для всех матчей." };
                    const mMapped = currentMatches.map((m, i) => ({ matchName: m.name, label: m.label, odd: parseFloat(m.odd), matchIdx: i }));
                    let combos = [];
                    if (activeTab === 'it' && itStrategy === 'ht_ft_goals') {
                        const k = parseInt(itHtFtSystemType.split('/')[0]);
                        combos = getCombinations(mMapped, k);
                    } else if (systemStrategy === 'matrix') {
                        const k = systemMatrixType === '2/4' ? 2 : systemMatrixType === '3/4' ? 3 : 3;
                        combos = getCombinations(mMapped, k);
                    } else if (systemStrategy === 'anchors') {
                        const anchors = mMapped.slice(0, 2); const bombs = mMapped.slice(2, 6);
                        const bombCombos = getCombinations(bombs, 2);
                        combos = bombCombos.map(bc => [...anchors, ...bc]);
                    } else if (systemStrategy === 'fullcover') {
                        combos = [...getCombinations(mMapped, 5), ...getCombinations(mMapped, 4), ...getCombinations(mMapped, 3)];
                    }
                    expressesRaw = combos.map((parts, index) => {
                        const totalOdd = parts.reduce((acc, part) => acc * part.odd, 1);
                        const hash = parts.map(p => p.matchIdx).join('|');
                        let defaultMode = 'MAIN';
                        if (systemStrategy === 'fullcover' && activeTab === 'systems') { defaultMode = parts.length === 3 ? 'INSURE' : 'MAIN'; }
                        return { id: index + 1, hash, parts, totalOdd, mode: currentModesState[hash] || defaultMode };
                    });
                }
            } else {
                const activePaths = currentMatches.map((m, mIdx) => m.outcomes.map((o, oIdx) => ({ ...o, matchName: m.name, matchIdx: mIdx, outcomeIdx: oIdx })).filter(o => o.active));
                if (activePaths.some(p => p.length === 0)) return { expresses: [], summary: null, error: "Выберите хотя бы один исход в каждом матче." };
                let combos = [[]];
                for (const path of activePaths) { const newCombos = []; for (const combo of combos) { for (const outcome of path) newCombos.push([...combo, outcome]); } combos = newCombos; }
                expressesRaw = combos.map((parts, index) => {
                  const totalOdd = parts.reduce((acc, part) => acc * parseFloat(part.odd || 1), 1);
                  const hash = parts.map(p => `${p.matchIdx}-${p.outcomeIdx}`).join('|');
                  let defaultMode = 'MAIN';
                  if (!currentModesState[hash]) {
                      if (activeTab === 'totals') {
                          const tmCount = parts.filter(p => p.label.includes('ТМ')).length;
                          if (totalsStrategy === 'smart') defaultMode = tmCount === 0 ? 'MAIN' : tmCount === 1 ? 'INSURE' : 'SKIP';
                          else if (totalsStrategy === 'anti') defaultMode = tmCount === 0 ? 'SKIP' : 'MAIN';
                          else if (totalsStrategy === 'teasers') defaultMode = 'MAIN';
                      } else if (activeTab === 'btts') {
                          const noCount = parts.filter(p => p.label === 'Нет').length;
                          if (bttsStrategy === 'shootout') defaultMode = noCount === 0 ? 'MAIN' : noCount === 1 ? 'INSURE' : 'SKIP';
                          else if (bttsStrategy === 'zero') defaultMode = noCount === 0 ? 'SKIP' : 'MAIN';
                      } else if (activeTab === 'it' && itStrategy === 'safe_underdog') {
                          const has00 = parts.some(p => p.label === 'Счет 0:0');
                          defaultMode = has00 ? 'INSURE' : 'MAIN';
                      }
                  }
                  return { id: index + 1, hash, parts, totalOdd, mode: currentModesState[hash] || defaultMode };
                });
            }

            let actualBank = 0; let mainTotalPayouts = 0; let mainCount = 0; let expresses = [];
            let insureCostExact = 0; let mainProbSum = 0;

            if (activeTab === 'systems' && systemStrategy === 'british') {
                const activeBets = expressesRaw.filter(exp => exp.mode !== 'SKIP');
                const stakePerBet = totalBank / activeBets.length;
                expresses = expressesRaw.map(exp => {
                    let betAmount = exp.mode !== 'SKIP' ? Math.max(Math.round(stakePerBet * 100)/100, minBet) : 0;
                    actualBank += betAmount;
                    if (betAmount > 0) { mainTotalPayouts += betAmount * exp.totalOdd; mainCount++; }
                    return { ...exp, betAmount, payout: betAmount * exp.totalOdd };
                });
            } else {
                expressesRaw.forEach(exp => {
                    if (exp.mode === 'INSURE') { let actualBet = Math.max(Math.ceil((totalBank / exp.totalOdd) * 20) / 20, minBet); exp.betAmount = actualBet; insureCostExact += actualBet; } 
                    else if (exp.mode === 'MAIN') mainProbSum += 1 / exp.totalOdd;
                });
                const isBankrupt = insureCostExact >= totalBank && mainProbSum > 0;
                const availableMainBank = Math.max(0, totalBank - insureCostExact);
                const targetMainPayout = mainProbSum > 0 ? availableMainBank / mainProbSum : 0;

                expresses = expressesRaw.map(exp => {
                    let betAmount = 0;
                    if (exp.mode === 'INSURE') betAmount = exp.betAmount; 
                    else if (exp.mode === 'MAIN') betAmount = Math.max(Math.round((targetMainPayout / exp.totalOdd) * 20) / 20, minBet);
                    actualBank += betAmount;
                    if (exp.mode === 'MAIN' && betAmount > 0) { mainTotalPayouts += betAmount * exp.totalOdd; mainCount++; }
                    return { ...exp, betAmount, payout: betAmount * exp.totalOdd };
                });
                if (isBankrupt) return { expresses, summary: { actualBank, avgMainPayout: 0, netProfit: 0, roi: 0, isBankrupt: true, strategyName: '' } };
            }

            const avgMainPayout = mainCount > 0 ? mainTotalPayouts / mainCount : 0;
            const netProfit = avgMainPayout > 0 ? avgMainPayout - actualBank : 0;
            let stratName = activeTab === 'classic' ? `Классика (${classicCount})` : activeTab === 'totals' ? `Тоталы (${totalsStrategy})` : activeTab === 'btts' ? `ОЗ (${bttsStrategy})` : '';
            if (activeTab === 'systems') stratName = `Система (${systemStrategy === 'matrix' ? systemMatrixType : systemStrategy === 'anchors' ? 'Якоря' : systemStrategy === 'british' ? systemBritishType : systemStrategy === 'anti_express' ? 'Анти-Экспресс' : 'Веер'})`;
            if (activeTab === 'it') stratName = `Инд. Тотал (${itStrategy === 'synth_itb' ? 'Синтетика' : itStrategy === 'safe_underdog' ? 'Безопасный' : itHtFtSystemType})`;

            return { expresses, summary: { actualBank, avgMainPayout, netProfit, roi: actualBank > 0 ? (netProfit / actualBank) * 100 : 0, isBankrupt: false, strategyName: stratName } };
          };

          const results = useMemo(getResults, [classicMatches, totalsMatches, bttsMatches, systemsMatches, itSynthMatches, itSafeMatches, itHtFtMatches, classicCount, totalsStrategy, bttsStrategy, systemStrategy, systemMatrixType, systemBritishType, itStrategy, itHtFtSystemType, customTotalsCount, customBttsCount, bank, minimumBet, classicModes, totalsModes, bttsModes, systemsModes, itModes, activeTab]);

          // --- СОХРАНЕНИЕ В ГЛОБАЛЬНУЮ ИСТОРИЮ ---
          const saveToHistory = () => {
            if (activeTab === 'cascade') {
                if (!cascadeResults) return;
                setHistoryData([{ id: Date.now(), date: new Date().toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'}), strategy: cascadeResults.strategyName, matches: cascadeMatches.map(m => m.name).join(', '), gameBank: cascadeResults.actualBank, netProfit: cascadeResults.netProfit, status: 'PENDING' }, ...historyData]);
                return;
            }
            if (!results || !results.summary) return;
            setHistoryData([{ id: Date.now(), date: new Date().toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'}), strategy: results.summary.strategyName, matches: getActiveMatches().map(m => m.name).join(' | '), gameBank: results.summary.actualBank, netProfit: results.summary.netProfit, status: 'PENDING' }, ...historyData]);
          };

          const resolveHistoryItem = (id, outcome) => {
            setHistoryData(historyData.map(item => {
                if (item.id === id && item.status === 'PENDING') {
                    let newMainBank = parseFloat(mainBank);
                    if (outcome === 'WON_MAIN') newMainBank += item.netProfit; else if (outcome === 'LOST') newMainBank -= item.gameBank;
                    setMainBank(newMainBank.toFixed(2)); return { ...item, status: outcome };
                } return item;
            }));
          };

          const globalStats = useMemo(() => {
            let totalProfit = 0, resolvedCount = 0;
            historyData.forEach(item => { if (item.status === 'WON_MAIN') { totalProfit += item.netProfit; resolvedCount++; } if (item.status === 'LOST') { totalProfit -= item.gameBank; resolvedCount++; } if (item.status === 'WON_INSURE') { resolvedCount++; } });
            return { totalProfit, resolvedCount, total: historyData.length };
          }, [historyData]);

          // --- МОИ СТРАТЕГИИ ---
          const openStratModal = (strat = null) => {
              if (strat) { setEditStratId(strat.id); setStratForm({ name: strat.name, description: strat.description, startBank: strat.startBank }); } 
              else { setEditStratId(null); setStratForm({ name: '', description: '', startBank: '100' }); }
              setShowStratModal(true);
          };
          const saveStrategy = () => {
              if (!stratForm.name || !stratForm.startBank) return;
              if (editStratId) setCustomStrategies(customStrategies.map(s => s.id === editStratId ? { ...s, name: stratForm.name, description: stratForm.description, startBank: parseFloat(stratForm.startBank) } : s));
              else setCustomStrategies([{ id: Date.now(), name: stratForm.name, description: stratForm.description, startBank: parseFloat(stratForm.startBank), bets: [] }, ...customStrategies]);
              setShowStratModal(false);
          };
          const deleteStrategy = (id) => {
              if (window.confirm('Вы уверены, что хотите удалить эту стратегию?')) { setCustomStrategies(customStrategies.filter(s => s.id !== id)); if (activeStrategyId === id) setActiveStrategyId(null); }
          };
          const addCustomBet = () => {
              if (!newBetForm.match || !newBetForm.stake || !newBetForm.odd) return;
              setCustomStrategies(customStrategies.map(s => {
                  if (s.id === activeStrategyId) return { ...s, bets: [{ id: Date.now(), date: new Date().toLocaleString('ru-RU', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'}), match: newBetForm.match, stake: parseFloat(newBetForm.stake), odd: parseFloat(newBetForm.odd), status: 'PENDING' }, ...s.bets] };
                  return s;
              }));
              setNewBetForm({ match: '', stake: '', odd: '' });
          };
          const resolveCustomBet = (stratId, betId, status) => {
              setCustomStrategies(customStrategies.map(s => { if (s.id === stratId) return { ...s, bets: s.bets.map(b => b.id === betId ? { ...b, status } : b) }; return s; }));
          };
          const deleteCustomBet = (stratId, betId) => {
              if(window.confirm('Удалить ставку из истории?')) setCustomStrategies(customStrategies.map(s => { if (s.id === stratId) return { ...s, bets: s.bets.filter(b => b.id !== betId) }; return s; }));
          }
          const getStrategyStats = (strat) => {
              let currentBank = strat.startBank; let inPlay = 0; let won = 0, lost = 0, totalResolved = 0;
              strat.bets.forEach(b => {
                  currentBank -= b.stake;
                  if (b.status === 'PENDING') inPlay += b.stake;
                  else if (b.status === 'WON') { currentBank += (b.stake * b.odd); won++; totalResolved++; } 
                  else if (b.status === 'LOST') { lost++; totalResolved++; } 
                  else if (b.status === 'RETURN') { currentBank += b.stake; totalResolved++; }
              });
              const netProfit = (currentBank + inPlay) - strat.startBank;
              return { currentBank, inPlay, netProfit, roi: strat.startBank > 0 ? (netProfit / strat.startBank) * 100 : 0, winrate: totalResolved > 0 ? (won / (won + lost)) * 100 : 0, totalBets: strat.bets.length };
          };

          // --- РЕНДЕРЕРЫ ---
          const handleCascadeMatchChange = (id, field, value) => {
              setCascadeMatches(cascadeMatches.map(m => m.id === id ? { ...m, [field]: value } : m));
          };
          const toggleMatchInCascadeExpress = (expressId, matchId) => {
              setCascadeExpresses(cascadeExpresses.map(exp => {
                  if (exp.id === expressId) {
                      const newIncluded = exp.included.includes(matchId) 
                          ? exp.included.filter(id => id !== matchId)
                          : [...exp.included, matchId].sort((a, b) => a - b);
                      return { ...exp, included: newIncluded };
                  }
                  return exp;
              }));
          };
          const addCascadeExpress = () => {
              const newId = cascadeExpresses.length > 0 ? Math.max(...cascadeExpresses.map(e => e.id)) + 1 : 1;
              setCascadeExpresses([...cascadeExpresses, { id: newId, name: `Свой Экспресс ${newId}`, included: [] }]);
          };
          const removeCascadeExpress = (id) => {
              setCascadeExpresses(cascadeExpresses.filter(e => e.id !== id));
          };

          const renderTabs = () => (
              <div className="flex justify-center mb-6 overflow-x-auto pb-2">
                  <div className="bg-slate-900/80 p-1.5 rounded-2xl border border-slate-700/50 backdrop-blur-md flex gap-2 shadow-2xl min-w-max">
                      <button onClick={() => setActiveTab('classic')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'classic' ? 'bg-gradient-to-r from-emerald-600 to-teal-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Layers size={18} className={activeTab === 'classic' ? "text-emerald-100" : ""} /> Классика
                      </button>
                      <button onClick={() => setActiveTab('systems')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'systems' ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Network size={18} className={activeTab === 'systems' ? "text-indigo-100" : ""} /> Системы (Веер)
                      </button>
                      <button onClick={() => setActiveTab('cascade')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'cascade' ? 'bg-gradient-to-r from-rose-600 to-red-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Combine size={18} className={activeTab === 'cascade' ? "text-rose-100" : ""} /> Каскад
                      </button>
                      <button onClick={() => setActiveTab('totals')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'totals' ? 'bg-gradient-to-r from-blue-600 to-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Activity size={18} className={activeTab === 'totals' ? "text-blue-100" : ""} /> Тоталы
                      </button>
                      <button onClick={() => setActiveTab('btts')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'btts' ? 'bg-gradient-to-r from-amber-500 to-orange-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Target size={18} className={activeTab === 'btts' ? "text-amber-100" : ""} /> ОЗ
                      </button>

                          <User size={18} className={activeTab === 'it' ? "text-orange-100" : ""} /> Инд. Тотал

                          <TrendingUp size={18} className={activeTab === 'chaser' ? "text-red-100" : ""} /> Догон
                      </button>
                      <button onClick={() => setActiveTab('ultra')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'ultra' ? 'bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <Zap size={18} className={activeTab === 'ultra' ? "text-violet-100" : ""} /> Ультра
                      </button>
                      <button onClick={() => setActiveTab('strategies')} className={`px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 transition-all ${activeTab === 'strategies' ? 'bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                          <BookOpen size={18} className={activeTab === 'strategies' ? "text-fuchsia-100" : ""} /> Мои Стратегии
                      </button>
                  </div>
              </div>
          );

          const renderUltraAggressionTab = () => {
              const Block = ({ n, title, children }) => (
                  <article className="bg-slate-900/80 border border-violet-500/25 rounded-2xl p-5 md:p-6 shadow-xl backdrop-blur-md">
                      <div className="flex items-start gap-3 mb-4">
                          <span className="shrink-0 text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-lg bg-violet-600/35 text-violet-100 border border-violet-400/30">{n}</span>
                          <h2 className="text-base md:text-lg font-bold text-white leading-snug">{title}</h2>
                      </div>
                      <div className="text-slate-300 text-sm leading-relaxed space-y-4">{children}</div>
                  </article>
              );
              return (
                  <div className="max-w-4xl mx-auto space-y-6 pb-10">
                      <div className="bg-violet-950/45 border border-violet-500/40 rounded-2xl p-5 md:p-6 shadow-inner">
                          <div className="flex items-center gap-3 mb-4">
                              <Zap className="text-violet-300 shrink-0" size={32} />
                              <div>
                                  <h2 className="text-xl md:text-2xl font-black text-white tracking-tight">Ультра-Агрессия: разгон банка на «верняках»</h2>
                                  <p className="text-violet-200/90 text-xs font-bold uppercase tracking-wider mt-1">Коэффициенты ≤ 1.50</p>
                              </div>
                          </div>
                          <p className="text-slate-300 text-sm leading-relaxed">
                              Чтобы получить огромную выплату (сотни «иксов») из маленьких коэффициентов вроде 1.35 или 1.45, нельзя просто собрать экспресс из 20 событий — один случайный гол или ничья уничтожит всё.
                              Нужны агрессивные математические модели, которые разгоняют прибыль по экспоненте, но имеют встроенную гибкость или «право на ошибку».
                          </p>
                          <p className="text-violet-200/80 text-xs font-semibold uppercase tracking-wider mt-4">Четыре концепции для внедрения в терминал</p>
                      </div>

                      <Block n="1" title="«Фрактальный мульти-экспресс» (блочная система)">
                          <p>Для тех, кто любит собирать по 15–20 «железобетонных» событий (П1 фаворитов, ТБ 1.5, фора +1.5) с кэфами 1.20–1.40.</p>
                          <div className="bg-slate-950/55 rounded-xl p-4 border border-slate-700/60">
                              <p className="text-violet-300 font-bold text-[10px] uppercase tracking-wider mb-2">Механика для терминала</p>
                              <p>
                                  Загружаете 15 матчей с кэфом ~1.35. Терминал не собирает один длинный экспресс, а делит их на 5 независимых блоков по 3 матча.
                                  Коэффициент блока ≈ 1.35 × 1.35 × 1.35 ≈ <strong className="text-white">2.46</strong>.
                                  Сами отмечаете галочками, какие блоки входят в какие экспрессы (матрица блоков). Ошибка в одном матче убивает только один блок.
                              </p>
                          </div>
                          <div className="bg-emerald-950/25 rounded-xl p-4 border border-emerald-600/30">
                              <p className="text-emerald-300 font-bold text-[10px] uppercase tracking-wider mb-2">В чём профит</p>
                              <p>
                                  Итоговый потенциальный коэффициент может быть очень большим (порядка 80–100). Если случится сенсация в одном из 15 матчей, сгорит только один блок;
                                  остальные блоки и система в целом могут дать крупный плюс вместо полного слива купона.
                              </p>
                          </div>
                      </Block>

                      <Block n="2" title="Экспоненциальная «Гидра» (сплит-лесенка)">
                          <p>Эволюция «снежного кома»: разгон банка all-in с ветвлением.</p>
                          <div className="bg-slate-950/55 rounded-xl p-4 border border-slate-700/60">
                              <p className="text-violet-300 font-bold text-[10px] uppercase tracking-wider mb-2">Механика для терминала</p>
                              <p>
                                  Старт с 10 $ на событие с кэфом 1.40 → выигрыш 14 $; следующий шаг — 14 $ на кэф 1.45 → 20.30 $.
                                  <strong className="text-white"> Точка клонирования:</strong> когда банк утраивается (например, 30 $), терминал делает сплит — делит виртуальный банк на две ветки по 15 $.
                                  Каждая ветка продолжает расти и снова делится при достижении цели.
                              </p>
                          </div>
                          <div className="bg-emerald-950/25 rounded-xl p-4 border border-emerald-600/30">
                              <p className="text-emerald-300 font-bold text-[10px] uppercase tracking-wider mb-2">В чём профит</p>
                              <p>
                                  Параллельно растут несколько «лесенок» на кэфы 1.30–1.50. Если одна ветка обрывается, остальные продолжают размножаться в геометрической прогрессии.
                              </p>
                          </div>
                      </Block>

                      <Block n="3" title="Матрица «Агрессивный бустер» (банкеры + навесы)">
                          <p>Максимум из 2–3 ультра-надёжных матчей и нескольких матчей с кэфом ~1.40–1.50.</p>
                          <div className="bg-slate-950/55 rounded-xl p-4 border border-slate-700/60">
                              <p className="text-violet-300 font-bold text-[10px] uppercase tracking-wider mb-2">Механика для терминала</p>
                              <p>
                                  Вводите 2 банкера (например, ТБ 1.0 у Реала за ~1.15) и 6 агрессивных матчей с кэфами 1.40–1.50.
                                  Терминал прикрепляет банкеров ко <strong className="text-white">всем</strong> тройкам из шести агрессивных матчей (20 пересекающихся экспрессов).
                              </p>
                          </div>
                          <div className="bg-emerald-950/25 rounded-xl p-4 border border-emerald-600/30">
                              <p className="text-emerald-300 font-bold text-[10px] uppercase tracking-wider mb-2">В чём профит</p>
                              <p>
                                  Коэффициент каждого экспресса порядка ~4.50. При заходе банкеров победа в агрессивном блоке запускает цепную реакцию — заходят сразу несколько экспрессов; при удачном сценарии ROI может быть очень высоким.
                              </p>
                          </div>
                      </Block>

                      <Block n="4" title="Разгон «Ступени сохранения» (Save-State Snowball)">
                          <p>Режим в духе вкладки «Догон», но для наращивания плюса: all-in на исходы не выше ~1.50 с чекпоинтами.</p>
                          <div className="bg-slate-950/55 rounded-xl p-4 border border-slate-700/60">
                              <p className="text-violet-300 font-bold text-[10px] uppercase tracking-wider mb-2">Механика для терминала</p>
                              <p>
                                  Цель — пройти 10 шагов: шаг 1 — 10 $ × 1.40 = 14 $; шаг 2 — 14 $ × 1.50 = 21 $ и т.д.
                                  На шаге 3 (например, сумма 31 $) терминал подсказывает: вывести 10 $ на счёт, дальше играть на чистую прибыль; на шаге 6 — отложить ещё 50 $ в несгораемый «сейф».
                              </p>
                          </div>
                          <div className="bg-emerald-950/25 rounded-xl p-4 border border-emerald-600/30">
                              <p className="text-emerald-300 font-bold text-[10px] uppercase tracking-wider mb-2">В чём профит</p>
                              <p>
                                  Десять шагов с кэфом ~1.40 дают большой совокупный множитель (порядка ~29), но при спотыкании на позднем шаге в сейфе уже лежит сумма, кратно превышающая первоначальный депозит.
                              </p>
                          </div>
                      </Block>

                      <p className="text-center text-slate-500 text-xs">Информационный макет · ставки связаны с риском</p>
                  </div>
              );
          };

          const renderCascadeTab = () => {
              return (
                  <div className="flex flex-col xl:flex-row gap-6">
                      <div className="bg-rose-900/30 border border-rose-500/50 p-4 rounded-xl mb-4 text-rose-100 text-sm shadow-inner w-full xl:hidden">
                          💡 <b>Каскадный Экспресс (Матрёшка):</b> Создайте длинный экспресс и страхуйте его более короткими 'обрезками'. Даже если длинный не зайдет, короткие окупят вложения! Задайте шаг удаления и отмечайте статусы матчей в Симуляторе.
                      </div>
                      {/* Левая панель: Настройки и Симулятор */}
                      <div className="w-full xl:w-1/3 flex flex-col gap-4">
                          <div className="bg-rose-900/30 border border-rose-500/50 p-4 rounded-xl hidden xl:block text-rose-100 text-sm shadow-inner w-full">
                              💡 <b>Каскадный Экспресс (Матрёшка):</b> Создайте длинный экспресс и страхуйте его более короткими 'обрезками'. Даже если длинный не зайдет, короткие окупят вложения! Задайте шаг удаления и отмечайте статусы матчей в Симуляторе.
                          </div>
                          <div className="bg-slate-800/50 rounded-2xl border border-slate-700/50 p-4 shadow-xl backdrop-blur-md">
                              <div className="flex items-center gap-2 mb-3 pb-3 border-b border-slate-700">
                                  <Settings className="text-rose-400" size={18}/> 
                                  <h2 className="font-bold text-white uppercase text-sm">Генератор Каскада</h2>
                              </div>
                              <div className="flex gap-3 mb-3">
                                  <div className="flex-1">
                                      <label className="text-[10px] text-slate-400 uppercase font-bold block mb-1">Матчей всего</label>
                                      <input type="number" value={cascadeTotalMatchesInput} onChange={e=>setCascadeTotalMatchesInput(e.target.value)} className="w-full bg-slate-900 text-white p-2 rounded border border-slate-600 text-center text-sm font-bold focus:border-rose-500 outline-none"/>
                                  </div>
                                  <div className="flex-1">
                                      <label className="text-[10px] text-slate-400 uppercase font-bold block mb-1">Шаг удаления</label>
                                      <input type="number" value={cascadeStepInput} onChange={e=>setCascadeStepInput(e.target.value)} className="w-full bg-slate-900 text-white p-2 rounded border border-slate-600 text-center text-sm font-bold focus:border-rose-500 outline-none"/>
                                  </div>
                              </div>
                              <button onClick={generateCascade} className="w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-2 rounded-lg text-xs uppercase tracking-wider transition-colors shadow-lg shadow-rose-600/20">Сгенерировать</button>
                          </div>

                          {/* Симулятор */}
                          <div className="bg-slate-800/50 rounded-2xl border border-slate-700/50 p-4 shadow-xl backdrop-blur-md flex-1 overflow-hidden flex flex-col">
                              <div className="flex items-center justify-between mb-3 pb-3 border-b border-slate-700 shrink-0">
                                  <h2 className="font-bold text-white uppercase text-sm flex items-center gap-2"><Zap className="text-amber-400" size={18}/> Симулятор</h2>
                              </div>
                              
                              <div className="space-y-2 overflow-y-auto pr-2 pb-2 flex-1 max-h-[500px] custom-scrollbar">
                                  {cascadeMatches.map((match, index) => (
                                      <div key={match.id} className={`flex flex-col gap-2 p-2 rounded-lg border transition-all ${match.status === 'WON' ? 'bg-emerald-900/20 border-emerald-700/50' : match.status === 'LOST' ? 'bg-red-900/20 border-red-700/50 grayscale-[30%]' : 'bg-slate-800/80 border-slate-700'}`}>
                                          <div className="flex items-center gap-2">
                                              <div className="text-[10px] text-slate-500 font-mono w-4">{index + 1}.</div>
                                              <input type="text" value={match.name} onChange={e => handleCascadeMatchChange(match.id, 'name', e.target.value)} className="flex-1 bg-transparent text-xs font-bold text-white outline-none border-b border-transparent focus:border-slate-600 truncate"/>
                                              <input type="number" step="0.01" value={match.odd} onChange={e => handleCascadeMatchChange(match.id, 'odd', e.target.value)} className="w-14 bg-slate-900 text-slate-300 text-[11px] font-bold px-1 py-1 rounded border border-slate-700 outline-none focus:border-rose-500 text-center"/>
                                          </div>
                                          <div className="flex gap-1 justify-end">
                                              <button onClick={() => handleCascadeMatchChange(match.id, 'status', 'WON')} className={`flex-1 py-1 rounded flex justify-center items-center transition-colors ${match.status === 'WON' ? 'bg-emerald-600 text-white shadow-inner' : 'bg-emerald-900/30 text-emerald-500/50 hover:bg-emerald-800/50'}`} title="Зашел"><CheckCircle size={14}/></button>
                                              <button onClick={() => handleCascadeMatchChange(match.id, 'status', 'PENDING')} className={`flex-1 py-1 rounded flex justify-center items-center transition-colors ${match.status === 'PENDING' ? 'bg-slate-600 text-white shadow-inner' : 'bg-slate-800 text-slate-500/50 hover:bg-slate-700'}`} title="Ожидает"><Clock size={14}/></button>
                                              <button onClick={() => handleCascadeMatchChange(match.id, 'status', 'LOST')} className={`flex-1 py-1 rounded flex justify-center items-center transition-colors ${match.status === 'LOST' ? 'bg-red-600 text-white shadow-inner' : 'bg-red-900/30 text-red-500/50 hover:bg-red-800/50'}`} title="Слив"><XCircle size={14}/></button>
                                          </div>
                                      </div>
                                  ))}
                              </div>
                          </div>
                      </div>

                      {/* Правая панель: Матрица и Таблица */}
                      <div className="w-full xl:w-2/3 flex flex-col gap-6">
                          <div className="bg-slate-800/50 rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden flex flex-col backdrop-blur-md">
                              <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                                  <h2 className="font-bold text-white uppercase text-sm">Матрица Сборки</h2>
                                  <button onClick={addCascadeExpress} className="flex items-center gap-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg text-[11px] font-bold transition-all border border-slate-600"><Plus size={14}/> Добавить Свой</button>
                              </div>
                              <div className="overflow-x-auto p-4 flex-1">
                                  <table className="w-full text-left border-collapse min-w-[500px]">
                                      <thead>
                                          <tr>
                                              <th className="pb-3 px-1 text-[10px] uppercase tracking-wider text-slate-500 font-semibold w-8 text-center">№ Матча</th>
                                              {cascadeExpresses.map((exp) => (
                                                  <th key={exp.id} className="pb-3 px-2 text-center align-bottom group">
                                                      <div className="flex flex-col items-center gap-2">
                                                          <input type="text" value={exp.name} onChange={e => setCascadeExpresses(cascadeExpresses.map(ex => ex.id === exp.id ? {...ex, name: e.target.value} : ex))} className="bg-transparent text-[10px] uppercase font-bold text-slate-300 outline-none text-center w-full border-b border-transparent focus:border-rose-500"/>
                                                          <button onClick={() => removeCascadeExpress(exp.id)} className="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-400 transition-all"><Trash2 size={12}/></button>
                                                      </div>
                                                  </th>
                                              ))}
                                          </tr>
                                      </thead>
                                      <tbody className="divide-y divide-slate-700/30">
                                          {cascadeMatches.map((match, mIdx) => (
                                              <tr key={match.id} className="hover:bg-slate-800/50 transition-colors">
                                                  <td className="py-1.5 px-1 text-[10px] text-slate-500 font-mono text-center">{mIdx + 1}</td>
                                                  {cascadeExpresses.map(exp => {
                                                      const isIncluded = exp.included.includes(match.id);
                                                      return (
                                                          <td key={exp.id} className="py-1.5 px-2 text-center">
                                                              <button onClick={() => toggleMatchInCascadeExpress(exp.id, match.id)} className={`w-5 h-5 mx-auto rounded flex items-center justify-center transition-all ${isIncluded ? 'bg-rose-500 shadow-[0_0_8px_rgba(225,29,72,0.4)]' : 'bg-slate-800 border border-slate-600 hover:border-slate-400'}`}>
                                                                  {isIncluded && <CheckCircle size={10} className="text-white"/>}
                                                              </button>
                                                          </td>
                                                      );
                                                  })}
                                              </tr>
                                          ))}
                                      </tbody>
                                  </table>
                              </div>
                          </div>

                          {cascadeResults && (
                              <div className={`p-5 rounded-2xl border transition-all duration-500 shadow-2xl backdrop-blur-md ${cascadeResults.netProfit > 0 ? 'bg-emerald-900/20 border-emerald-500/30 shadow-[0_0_30px_rgba(16,185,129,0.1)]' : cascadeResults.allLost ? 'bg-red-900/20 border-red-500/30' : 'bg-slate-800/50 border-slate-700'}`}>
                                  <div className="flex flex-wrap items-center justify-between gap-4">
                                      <div className="flex gap-6 items-center w-full md:w-auto">
                                          <div><p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Вложено</p><p className="text-xl font-bold text-slate-300">{formatUSD(cascadeResults.actualBank)}</p></div>
                                          <div className="w-px h-8 bg-slate-700"></div>
                                          <div><p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Выиграно</p><p className={`text-2xl font-black ${cascadeResults.totalWonPayout > 0 ? 'text-emerald-400' : 'text-slate-500'}`}>{formatUSD(cascadeResults.totalWonPayout)}</p></div>
                                          <div className="w-px h-8 bg-slate-700"></div>
                                          <div><p className="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Профит (Факт)</p><p className={`text-3xl font-black ${cascadeResults.netProfit > 0 ? 'text-emerald-400' : cascadeResults.netProfit === 0 ? 'text-slate-400' : 'text-red-400'}`}>{cascadeResults.netProfit > 0 ? '+' : ''}{formatUSD(cascadeResults.netProfit)}</p></div>
                                      </div>
                                      {!cascadeResults.allLost && !cascadeResults.allPending && cascadeResults.potentialPayout > cascadeResults.totalWonPayout && (
                                          <div className="bg-amber-900/20 border border-amber-500/30 px-4 py-2 rounded-lg text-right"><p className="text-[9px] text-amber-300 uppercase font-bold tracking-wider">Еще в игре (Макс. Выплата)</p><p className="text-lg font-bold text-amber-400">{formatUSD(cascadeResults.potentialPayout)}</p></div>
                                      )}
                                      <div className="w-full md:w-auto mt-4 md:mt-0">
                                          <button onClick={saveToHistory} disabled={cascadeResults.actualBank === 0} className={`w-full bg-gradient-to-br from-rose-500 to-red-600 shadow-[0_0_15px_rgba(225,29,72,0.3)] text-white rounded-xl px-6 py-3 flex items-center justify-center gap-2 font-bold uppercase tracking-wider text-[10px] transition-all hover:scale-105 disabled:opacity-50 disabled:hover:scale-100`}>
                                              <Save size={18} /> В общую историю
                                          </button>
                                      </div>
                                  </div>
                              </div>
                          )}

                          {cascadeResults && (
                              <div className="bg-slate-800/50 rounded-2xl border border-slate-700/50 shadow-xl overflow-hidden backdrop-blur-md">
                                  <div className="p-4 border-b border-slate-700 bg-slate-800/80"><h2 className="font-bold text-white uppercase text-sm">Список Ставок для БК</h2></div>
                                  <div className="overflow-x-auto max-h-[400px] overflow-y-auto custom-scrollbar">
                                      <table className="w-full text-left border-collapse min-w-[700px]">
                                          <thead className="sticky top-0 z-10 bg-slate-800 border-b border-slate-700">
                                              <tr>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center w-8">✓</th>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">№</th>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider">События в экспрессе</th>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Итоговый Кэф.</th>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Сумма Ставки</th>
                                                  <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-right">Потенц. Выплата</th>
                                              </tr>
                                          </thead>
                                          <tbody className="divide-y divide-slate-700/30">
                                              {cascadeResults.expresses.map((exp) => {
                                                  const isPlaced = placedBetsCascade.has(exp.id);
                                                  return (
                                                      <tr key={exp.id} className={`transition-all duration-300 ${exp.status === 'LOST' ? 'bg-red-950/20 grayscale-[40%]' : exp.status === 'WON' ? 'bg-emerald-900/10' : 'hover:bg-slate-800/30'} ${isPlaced ? 'opacity-70' : ''}`}>
                                                          <td className="py-3 px-3 text-center">
                                                              <input type="checkbox" checked={isPlaced} onChange={() => { const newSet = new Set(placedBetsCascade); if(newSet.has(exp.id)) newSet.delete(exp.id); else newSet.add(exp.id); setPlacedBetsCascade(newSet); }} className="w-4 h-4 cursor-pointer accent-rose-500 rounded bg-slate-800 border-slate-600"/>
                                                          </td>
                                                          <td className="py-3 px-3 text-center">
                                                              <div className="flex flex-col items-center">
                                                                  <span className="font-mono text-xs text-slate-400">{exp.name.split(' ')[1]}</span>
                                                                  {exp.status === 'WON' && <span className="text-[9px] bg-emerald-900 text-emerald-400 px-1 py-0.5 rounded mt-1 font-bold">ЗАШЕЛ</span>}
                                                                  {exp.status === 'LOST' && <span className="text-[9px] bg-red-900 text-red-400 px-1 py-0.5 rounded mt-1 font-bold">СЛИВ</span>}
                                                                  {exp.status === 'PENDING' && <span className="text-[9px] bg-slate-700 text-slate-300 px-1 py-0.5 rounded mt-1 font-bold">ОЖИДАЕТ</span>}
                                                              </div>
                                                          </td>
                                                          <td className="py-3 px-3">
                                                              <div className="flex flex-wrap gap-1">
                                                                  {exp.parts.map((match, i) => (
                                                                      <div key={i} className={`flex items-center gap-1.5 px-2 py-1 rounded text-[10px] border ${match.status === 'WON' ? 'bg-emerald-900/30 border-emerald-700/50 text-emerald-200' : match.status === 'LOST' ? 'bg-red-900/30 border-red-700/50 text-red-300 line-through' : 'bg-slate-800 border-slate-700 text-slate-300'}`}>
                                                                          <span className="max-w-[80px] truncate" title={match.name}>{match.name}</span><span className="font-bold opacity-70">x{match.odd}</span>
                                                                      </div>
                                                                  ))}
                                                              </div>
                                                          </td>
                                                          <td className="py-3 px-3 text-center"><span className="inline-block bg-slate-800 border border-slate-600 font-bold px-2 py-1 text-xs rounded text-rose-300">{exp.totalOdd.toFixed(2)}</span></td>
                                                          <td className="py-3 px-3 text-center"><span className="font-bold text-sm text-white bg-slate-800/50 px-2 py-1 rounded border border-slate-700">{formatUSD(exp.stake)}</span></td>
                                                          <td className="py-3 px-3 text-right"><span className={`font-bold text-sm ${exp.status === 'WON' ? 'text-emerald-400' : exp.status === 'LOST' ? 'text-slate-500' : 'text-amber-400'}`}>{formatUSD(exp.payout)}</span></td>
                                                      </tr>
                                                  );
                                              })}
                                          </tbody>
                                      </table>
                                  </div>
                              </div>
                          )}
                      </div>
                  </div>
              );
          };

          const renderChaserTab = () => (
              <div className="bg-slate-900/80 border border-red-500/30 rounded-2xl p-6 backdrop-blur-xl shadow-2xl max-w-4xl mx-auto">
                  <div className="bg-red-900/30 border border-red-500/50 p-4 rounded-xl mb-6 text-red-100 text-sm shadow-inner w-full">
                      💡 <b>Умный Догон (Target Chaser):</b> Введите желаемую чистую прибыль. Калькулятор рассчитает ставку так, чтобы при выигрыше отбить все предыдущие минусы и дать ровно эту прибыль сверху.
                  </div>
                  <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-700">
                      <div className="flex items-center gap-3">
                          <TrendingUp className="text-red-400" size={28} />
                          <div><h2 className="text-xl font-bold text-white uppercase">Умный Догон (Target Chaser)</h2><p className="text-xs text-red-300">Безопасный отыгрыш на высоких коэффициентах</p></div>
                      </div>
                      <div className="bg-slate-800 border border-slate-600 px-4 py-2 rounded-lg text-right">
                          <p className="text-[10px] text-slate-400 uppercase font-bold mb-0.5">Текущий Общий Банк</p>
                          <p className="text-lg font-bold text-emerald-400">{formatUSD(parseFloat(mainBank))}</p>
                      </div>
                  </div>
                  
                  {chaserSteps.length === 0 ? (
                      <div className="space-y-4 max-w-md mx-auto py-6">
                          <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                              <label className="text-xs text-slate-400 uppercase font-bold block mb-2">Желаемая Чистая Прибыль ($)</label>
                              <input type="number" value={chaserTarget} onChange={e=>setChaserTarget(e.target.value)} className="w-full bg-slate-900 text-emerald-400 p-3 rounded border border-slate-600 text-center font-bold text-2xl focus:border-red-500 outline-none"/>
                          </div>
                          <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center">
                              <label className="text-xs text-slate-400 uppercase font-bold block mb-2">Коэффициент первой ставки</label>
                              <input type="number" step="0.01" value={chaserInputOdd} onChange={e=>setChaserInputOdd(e.target.value)} className="w-full bg-slate-900 text-white p-3 rounded border border-slate-600 text-center font-bold text-xl focus:border-red-500 outline-none"/>
                          </div>
                          <button onClick={startChaser} className="w-full bg-red-600 hover:bg-red-500 text-white font-bold rounded-xl shadow-lg py-4 uppercase tracking-wider transition-transform hover:scale-[1.01]">Начать Цикл Догона</button>
                      </div>
                  ) : (
                      <div className="space-y-3">
                          <div className="flex justify-between items-center bg-red-900/20 p-3 rounded-lg border border-red-500/30 mb-4 flex-wrap gap-2">
                              <div className="flex gap-4 items-center">
                                  <span className="text-sm font-bold text-emerald-300">Цель: +{formatUSD(parseFloat(chaserTarget))}</span>
                                  <span className="text-sm font-bold text-red-300">Накопленный Убыток: -{formatUSD(chaserSteps.filter(s=>s.result==='LOST').reduce((a,b)=>a+b.stake,0))}</span>
                              </div>
                              <button onClick={() => {if(window.confirm('Сбросить текущий цикл?')) setChaserSteps([]);}} className="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded transition-colors">Сброс Цикла</button>
                          </div>
                          
                          {chaserSteps.map((step, idx) => (
                              <div key={step.id} className={`flex flex-wrap md:flex-nowrap items-center gap-3 p-4 rounded-xl border transition-all ${step.result === 'PENDING' ? 'bg-slate-800 border-red-500/50 shadow-lg' : step.isDone ? 'bg-emerald-900/30 border-emerald-500/50' : 'bg-slate-900/50 border-slate-700 opacity-60'}`}>
                                  {step.isDone ? (
                                      <div className="w-full text-center py-2 text-emerald-400 font-bold flex flex-col items-center justify-center">
                                          <span className="text-xl">🎉 Цикл закрыт! Все минусы отбиты.</span>
                                          <span className="text-sm text-emerald-200 mt-1">Чистая прибыль: +{formatUSD(step.netProfit)} зачислена в банк.</span>
                                          <button onClick={() => setChaserSteps([])} className="mt-4 bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg text-xs font-bold transition-all">Новый Цикл</button>
                                      </div>
                                  ) : (
                                      <>
                                          <div className="w-12 text-center shrink-0"><span className="text-[10px] text-slate-500 uppercase font-bold">Шаг</span><p className="text-2xl font-black text-red-400">{idx + 1}</p></div>
                                          
                                          {step.result === 'PENDING' ? (
                                              <>
                                                  <div className="flex-1 min-w-[120px] bg-red-900/30 p-2 rounded border border-red-500/30 text-center">
                                                      <span className="text-[10px] text-red-300 uppercase font-bold block mb-1">Сумма Ставки</span>
                                                      <p className="text-2xl font-bold text-white">{formatUSD(step.stake)}</p>
                                                  </div>
                                                  <div className="w-32 shrink-0"><span className="text-[10px] text-slate-400 uppercase font-bold">Кэф (Редакт.)</span><input type="number" step="0.01" value={step.odd} onChange={e => {const n=[...chaserSteps]; n[idx].odd=parseFloat(e.target.value)||1.01; n[idx].stake=(parseFloat(chaserTarget)+chaserSteps.filter(s=>s.result==='LOST').reduce((a,b)=>a+b.stake,0))/(n[idx].odd-1); setChaserSteps(n);}} className="w-full bg-slate-950 text-white p-2.5 rounded border border-slate-600 text-center font-bold text-lg outline-none focus:border-red-500"/></div>
                                                  <div className="flex gap-2 shrink-0 ml-auto items-center">
                                                      <button onClick={() => handleChaserResult(idx, 'WON')} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-3 rounded-lg font-bold flex items-center gap-2"><CheckCircle size={18}/> Зашла</button>
                                                      <button onClick={() => handleChaserResult(idx, 'LOST')} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-3 rounded-lg font-bold flex items-center gap-2"><XCircle size={18}/> Слив</button>
                                                  </div>
                                              </>
                                          ) : (
                                              <>
                                                  <div className="flex-1 min-w-[120px]"><span className="text-[10px] text-slate-500 uppercase font-bold block">Ставка</span><p className="text-lg font-bold text-slate-300">{formatUSD(step.stake)}</p></div>
                                                  <div className="ml-auto flex items-center gap-4">
                                                      <span className="text-xs text-slate-400 font-mono">Кэф: {step.odd.toFixed(2)}</span>
                                                      <span className="text-red-400 font-bold text-sm bg-red-900/30 px-3 py-1 rounded">❌ Минус {formatUSD(step.stake)}</span>
                                                  </div>
                                              </>
                                          )}
                                      </>
                                  )}
                              </div>
                          ))}
                      </div>
                  )}
              </div>
          );

                      </div>
                      {activeStrategyId ? (() => {
                          const activeStrat = customStrategies.find(s => s.id === activeStrategyId);

                          const stats = getStrategyStats(activeStrat);

                          return (
                              <div className="space-y-6">
                                  <div className="bg-slate-900/80 border border-fuchsia-500/30 rounded-2xl p-6 backdrop-blur-xl shadow-2xl">

                                          <div className="flex items-center gap-3">
