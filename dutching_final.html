                                          </div>
                                          <div className="flex gap-2">
                                              <button onClick={() => openStratModal(activeStrat)} className="flex items-center gap-1 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold transition-all"><Edit2 size={14}/> Настройки</button>
                                              <button onClick={() => deleteStrategy(activeStrat.id)} className="flex items-center gap-1 bg-red-900/40 hover:bg-red-600 text-red-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all"><Trash2 size={14}/> Удалить</button>
                                          </div>
                                      </div>

                                      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-2">
                                          <div className="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center"><p className="text-[10px] text-slate-400 uppercase tracking-wider mb-1">Стартовый Банк</p><p className="text-lg font-bold text-slate-300">{formatUSD(activeStrat.startBank)}</p></div>
                                          <div className="bg-fuchsia-900/20 p-3 rounded-xl border border-fuchsia-500/30 text-center shadow-inner"><p className="text-[10px] text-fuchsia-300 uppercase tracking-wider mb-1">Доступный Банк</p><p className="text-xl font-black text-white">{formatUSD(stats.currentBank)}</p></div>
                                          <div className="bg-amber-900/20 p-3 rounded-xl border border-amber-500/30 text-center"><p className="text-[10px] text-amber-300 uppercase tracking-wider mb-1">В игре (Ожидают)</p><p className="text-lg font-bold text-amber-400">{formatUSD(stats.inPlay)}</p></div>
                                          <div className="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center"><p className="text-[10px] text-slate-400 uppercase tracking-wider mb-1">Профит</p><p className={`text-lg font-bold ${stats.netProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{stats.netProfit > 0 ? '+' : ''}{formatUSD(stats.netProfit)}</p></div>
                                          <div className="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center"><p className="text-[10px] text-slate-400 uppercase tracking-wider mb-1">ROI</p><p className={`text-lg font-bold ${stats.roi >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{stats.roi > 0 ? '+' : ''}{stats.roi.toFixed(1)}%</p></div>
                                          <div className="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center"><p className="text-[10px] text-slate-400 uppercase tracking-wider mb-1">Победы</p><p className="text-lg font-bold text-sky-400">{stats.winrate.toFixed(1)}%</p></div>
                                      </div>
                                  </div>

                                  <div className="bg-slate-800/80 border border-slate-700/80 rounded-xl p-4 flex flex-col md:flex-row gap-3 items-end shadow-lg">
                                      <div className="w-full md:flex-1"><label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Событие (Матч, Исход)</label><input type="text" value={newBetForm.match} onChange={e=>setNewBetForm({...newBetForm, match: e.target.value})} placeholder="Например: Арсенал - Челси (П1)" className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-white focus:border-fuchsia-500 outline-none"/></div>
                                      <div className="w-full md:w-32"><label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Ставка ($)</label><input type="number" value={newBetForm.stake} onChange={e=>setNewBetForm({...newBetForm, stake: e.target.value})} placeholder="0.00" className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-white focus:border-fuchsia-500 outline-none text-center"/></div>
                                      <div className="w-full md:w-24"><label className="text-[10px] text-slate-400 uppercase font-bold mb-1 block">Коэф.</label><input type="number" step="0.01" value={newBetForm.odd} onChange={e=>setNewBetForm({...newBetForm, odd: e.target.value})} placeholder="0.00" className="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-white focus:border-fuchsia-500 outline-none text-center"/></div>
                                      <button onClick={addCustomBet} className="w-full md:w-auto bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-2 px-6 rounded transition-colors flex items-center justify-center gap-2 h-[38px]"><Plus size={16}/> Добавить</button>
                                  </div>

                                  <div className="bg-slate-900/80 border border-slate-700/80 rounded-2xl overflow-hidden shadow-xl">
                                      <div className="p-0 overflow-x-auto max-h-[500px] overflow-y-auto">
                                          {activeStrat.bets.length === 0 ? <div className="p-10 text-center text-slate-500 text-sm">История ставок для этой стратегии пуста.</div> : (
                                              <table className="w-full text-left border-collapse min-w-[700px]">
                                                  <thead className="sticky top-0 bg-slate-800 border-b border-slate-700 z-10">
                                                      <tr className="text-[10px] uppercase tracking-wider text-slate-400">
                                                          <th className="py-3 px-4 font-semibold">Дата</th>
                                                          <th className="py-3 px-4 font-semibold">Событие</th>
                                                          <th className="py-3 px-4 font-semibold text-center">Ставка / Кэф</th>
                                                          <th className="py-3 px-4 font-semibold text-center">Статус</th>
                                                          <th className="py-3 px-4 font-semibold text-right">Выплата</th>
                                                          <th className="py-3 px-4 font-semibold text-center w-12"></th>
                                                      </tr>
                                                  </thead>
                                                  <tbody className="divide-y divide-slate-800/50">
                                                      {activeStrat.bets.map(bet => (
                                                          <tr key={bet.id} className="hover:bg-slate-800/30 transition-colors">
                                                              <td className="py-3 px-4 text-[10px] text-slate-500 font-mono whitespace-nowrap">{bet.date}</td>
                                                              <td className="py-3 px-4 text-xs font-bold text-slate-200">{bet.match}</td>
                                                              <td className="py-3 px-4 text-center"><span className="text-white font-bold text-sm">{formatUSD(bet.stake)}</span><span className="text-slate-500 text-xs ml-2">x {bet.odd.toFixed(2)}</span></td>
                                                              <td className="py-3 px-4">
                                                                  {bet.status === 'PENDING' ? (
                                                                      <div className="flex items-center justify-center gap-1">
                                                                          <button onClick={()=>resolveCustomBet(activeStrat.id, bet.id, 'WON')} className="p-1.5 bg-emerald-900/40 text-emerald-400 hover:bg-emerald-600 hover:text-white rounded transition-colors" title="Выигрыш"><CheckCircle size={16}/></button>
                                                                          <button onClick={()=>resolveCustomBet(activeStrat.id, bet.id, 'RETURN')} className="p-1.5 bg-slate-800 text-slate-400 hover:bg-slate-600 hover:text-white rounded transition-colors" title="Возврат"><RotateCcw size={16}/></button>
                                                                          <button onClick={()=>resolveCustomBet(activeStrat.id, bet.id, 'LOST')} className="p-1.5 bg-red-900/40 text-red-400 hover:bg-red-600 hover:text-white rounded transition-colors" title="Проигрыш"><XCircle size={16}/></button>
                                                                      </div>
                                                                  ) : (
                                                                      <div className="text-center">
                                                                          {bet.status === 'WON' && <span className="text-[10px] font-bold bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded uppercase">Победа</span>}
                                                                          {bet.status === 'RETURN' && <span className="text-[10px] font-bold bg-slate-800 text-slate-400 px-2 py-1 rounded uppercase">Возврат</span>}
                                                                          {bet.status === 'LOST' && <span className="text-[10px] font-bold bg-red-900/30 text-red-400 px-2 py-1 rounded uppercase">Проигрыш</span>}
                                                                      </div>
                                                                  )}
                                                              </td>
                                                              <td className="py-3 px-4 text-right">
                                                                  {bet.status === 'WON' && <span className="text-emerald-400 font-bold">+{formatUSD(bet.stake * bet.odd - bet.stake)}</span>}
                                                                  {bet.status === 'RETURN' && <span className="text-slate-400 font-bold">0.00 $</span>}
                                                                  {bet.status === 'LOST' && <span className="text-red-400 font-bold">-{formatUSD(bet.stake)}</span>}
                                                                  {bet.status === 'PENDING' && <span className="text-amber-400/80">Ожидает (~ {formatUSD(bet.stake * bet.odd)})</span>}
                                                              </td>
                                                              <td className="py-3 px-4 text-center"><button onClick={()=>deleteCustomBet(activeStrat.id, bet.id)} className="text-slate-600 hover:text-red-400"><Trash2 size={14}/></button></td>
                                                          </tr>
                                                      ))}
                                                  </tbody>
                                              </table>
                                          )}
                                      </div>
                                  </div>
                              </div>
                          );
                      })() : (
                          <div>
                              <div className="flex items-center justify-between mb-6"><div><h2 className="text-2xl font-bold text-white uppercase tracking-tight">Мои Стратегии</h2><p className="text-slate-400 text-sm mt-1">Конструктор и дневник пользовательских ставок</p></div></div>
                              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                  <div onClick={() => openStratModal()} className="bg-slate-800/30 border-2 border-dashed border-fuchsia-500/50 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-fuchsia-900/20 hover:border-fuchsia-400 transition-all min-h-[180px] group">
                                      <div className="bg-fuchsia-600/20 p-4 rounded-full group-hover:bg-fuchsia-600/40 transition-colors"><Plus size={32} className="text-fuchsia-400 group-hover:text-fuchsia-300" /></div><span className="font-bold text-fuchsia-300 uppercase tracking-wider text-sm">Создать Стратегию</span>
                                  </div>
                                  {customStrategies.map(strat => {
                                      const stats = getStrategyStats(strat);
                                      return (
                                          <div key={strat.id} className="bg-slate-900/80 border border-slate-700 hover:border-fuchsia-500/50 rounded-2xl p-5 shadow-lg hover:shadow-[0_0_20px_rgba(217,70,239,0.15)] transition-all flex flex-col min-h-[180px] relative overflow-hidden group">
                                              <div className="absolute top-0 left-0 w-1 h-full bg-fuchsia-600 opacity-50 group-hover:opacity-100 transition-opacity"></div>
                                              <div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                  <button onClick={(e) => { e.stopPropagation(); openStratModal(strat); }} className="p-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded"><Edit2 size={12}/></button>
                                                  <button onClick={(e) => { e.stopPropagation(); deleteStrategy(strat.id); }} className="p-1.5 bg-red-900/40 hover:bg-red-600 text-red-400 hover:text-white rounded"><Trash2 size={12}/></button>
                                              </div>
                                              <div className="flex justify-between items-start mb-2 pr-16 cursor-pointer" onClick={() => setActiveStrategyId(strat.id)}><h3 className="font-bold text-lg text-white truncate pr-2">{strat.name}</h3></div>
                                              <p className="text-xs text-slate-500 line-clamp-2 mb-4 flex-1 cursor-pointer" onClick={() => setActiveStrategyId(strat.id)}>{strat.description || 'Нет описания'}</p>
                                              <div className="grid grid-cols-2 gap-2 mt-auto cursor-pointer" onClick={() => setActiveStrategyId(strat.id)}>
                                                  <div className="bg-slate-800/50 rounded-lg p-2 border border-slate-700/50"><p className="text-[9px] text-slate-400 uppercase tracking-wider">Доступный Банк</p><p className="font-bold text-white text-sm">{formatUSD(stats.currentBank, 0)}</p></div>
                                                  <div className="bg-slate-800/50 rounded-lg p-2 border border-slate-700/50"><p className="text-[9px] text-slate-400 uppercase tracking-wider">Профит</p><p className={`font-bold text-sm ${stats.netProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>{stats.netProfit > 0 ? '+' : ''}{formatUSD(stats.netProfit, 0)}</p></div>
                                              </div>
                                          </div>
                                      );
                                  })}
                              </div>
                          </div>
                      )}

                      {showStratModal && (
                          <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                              <div className="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md p-6 shadow-2xl relative overflow-hidden">
                                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-fuchsia-500 to-purple-500"></div>

                                  <div className="space-y-4">
                                      <div><label className="text-xs text-slate-400 uppercase font-bold block mb-1">Название *</label><input type="text" value={stratForm.name} onChange={e=>setStratForm({...stratForm, name: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:border-fuchsia-500 outline-none" placeholder="Например: Тоталы во 2 тайме"/></div>
                                      <div><label className="text-xs text-slate-400 uppercase font-bold block mb-1">Описание</label><textarea value={stratForm.description} onChange={e=>setStratForm({...stratForm, description: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:border-fuchsia-500 outline-none h-24 resize-none" placeholder="Краткие правила стратегии..."></textarea></div>
                                      <div><label className="text-xs text-slate-400 uppercase font-bold block mb-1">Начальный Банк ($) *</label><input type="number" value={stratForm.startBank} onChange={e=>setStratForm({...stratForm, startBank: e.target.value})} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-white focus:border-fuchsia-500 outline-none" placeholder="100"/></div>
                                  </div>
                                  <div className="flex gap-3 mt-8">
                                      <button onClick={() => setShowStratModal(false)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-colors">Отмена</button>
                                      <button onClick={saveStrategy} disabled={!stratForm.name || !stratForm.startBank} className="flex-1 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-3 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Сохранить</button>
                                  </div>
                              </div>
                          </div>
                      )}
                  </div>
              );
          };

          const renderMatchesGrid = () => {
              const isTotals = activeTab === 'totals'; const isBtts = activeTab === 'btts'; const isSystems = activeTab === 'systems'; const isIt = activeTab === 'it';
              const isSystemsLike = isSystems || (isIt && itStrategy === 'ht_ft_goals');
              const matchesToRender = getActiveMatches();
              
              const updateM = (idx, field, val) => {
                  if(activeTab === 'classic') setClassicMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                  else if(isTotals) setTotalsMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                  else if(isBtts) setBttsMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                  else if(isIt) {
                      if(itStrategy === 'synth_itb') setItSynthMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                      else if(itStrategy === 'safe_underdog') setItSafeMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                      else setItHtFtMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
                  }
                  else setSystemsMatches(prev => {const n = [...prev]; n[idx][field] = val; return n;});
              }
              const updateO = (mIdx, oIdx, field, val) => {
                  if(activeTab === 'classic') setClassicMatches(prev => {const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n;});
                  else if(isTotals) setTotalsMatches(prev => {const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n;});
                  else if(isBtts) setBttsMatches(prev => {const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n;});
                  else if(isIt) {
                      if(itStrategy === 'synth_itb') setItSynthMatches(prev => {const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n;});
                      else if(itStrategy === 'safe_underdog') setItSafeMatches(prev => {const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n;});
                  }
              }

              const borderTheme = isSystems ? 'border-indigo-700/50' : isTotals ? 'border-blue-700/50' : isBtts ? 'border-amber-700/50' : isIt ? 'border-orange-700/50' : 'border-emerald-700/50';
              const focusTheme = isSystems ? 'focus:ring-indigo-400' : isTotals ? 'focus:ring-blue-400' : isBtts ? 'focus:ring-amber-400' : isIt ? 'focus:ring-orange-400' : 'focus:ring-emerald-400';
              const activeTheme = isTotals ? 'bg-blue-900/60 border-blue-500/50 accent-blue-500' : isBtts ? 'bg-amber-900/60 border-amber-500/50 accent-amber-500' : isSystems ? 'bg-indigo-900/60 border-indigo-500/50 accent-indigo-500' : isIt ? 'bg-orange-900/60 border-orange-500/50 accent-orange-500' : 'bg-emerald-900/60 border-emerald-500/50 accent-emerald-500';

              return (
                  <>
                  {activeTab === 'classic' && (
                      <div className="bg-emerald-900/30 border border-emerald-500/50 p-4 rounded-xl mb-4 text-emerald-100 text-sm shadow-inner">
                          💡 <b>Классический Датчинг:</b> Введите коэффициенты на взаимоисключающие исходы. Калькулятор распределит банк так, чтобы при заходе ЛЮБОГО из выбранных исходов (Основа) вы получили одинаковую прибыль. Страховки вернут сумму ставки.
                      </div>
                  )}
                  {isSystems && systemStrategy === 'matrix' && (
                      <div className="bg-indigo-900/30 border border-indigo-500/50 p-4 rounded-xl mb-4 text-indigo-100 text-sm shadow-inner">
                          💡 <b>Матрица:</b> Перекрытие сложных исходов (например, ничьих). Система собирает все возможные экспрессы выбранной размерности. Выигрыш даже части экспрессов может принести крупный профит.
                      </div>
                  )}
                  {isSystems && systemStrategy === 'anchors' && (
                      <div className="bg-indigo-900/30 border border-indigo-500/50 p-4 rounded-xl mb-4 text-indigo-100 text-sm shadow-inner">
                          💡 <b>Якоря + Бомбы:</b> Первые два события (Якоря) идут во все экспрессы — они должны быть 'железобетонными'. Остальные (Бомбы) комбинируются между собой. Отличный способ разогнать кэф!
                      </div>
                  )}
                  {isSystems && systemStrategy === 'fullcover' && (
                      <div className="bg-indigo-900/30 border border-indigo-500/50 p-4 rounded-xl mb-4 text-indigo-100 text-sm shadow-inner">
                          💡 <b>Веер (Full Cover):</b> Полное перекрытие для 5 матчей. Формируются экспрессы по 3, 4 и 5 событий. Тройники работают как страховка, а 4-5 приносят основную прибыль.
                      </div>
                  )}
                  {isSystems && systemStrategy === 'anti_express' && (
                      <div className="bg-red-900/30 border border-red-500/50 p-4 rounded-xl mb-4 text-red-100 text-sm shadow-inner">
                          💡 <b>Анти-Экспресс:</b> Выберите 5 матчей с явными фаворитами. Система поставит так, что вы выиграете, если ХОТЯ БЫ ОДИН фаворит оступится (сыграет 'Осечка').
                      </div>
                  )}
                  {isSystems && systemStrategy === 'british' && (
                      <div className="bg-indigo-900/30 border border-indigo-500/50 p-4 rounded-xl mb-4 text-indigo-100 text-sm shadow-inner">
                          💡 <b>Британские Системы (Yankee, Canadian, Heinz):</b> Классическое полное перекрытие всех возможных экспрессов от двойников до максимума. Банк делится на равные части.
                      </div>
                  )}
                  {isTotals && totalsStrategy === 'smart' && (
                      <div className="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-4 text-blue-100 text-sm shadow-inner">
                          💡 <b>Умная Страховка (Тоталы):</b> Основная ставка идет на то, что везде будет ТБ 2.5. Если в одном матче будет 'низ' (ТМ 2.5), сработает страховка и вернет банк.
                      </div>
                  )}
                  {isTotals && totalsStrategy === 'anti' && (
                      <div className="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-4 text-blue-100 text-sm shadow-inner">
                          💡 <b>Анти-Попан:</b> Обратная стратегия. Ждем, что во всех матчах будет мало голов (ТМ). Идеально для низовых чемпионатов.
                      </div>
                  )}
                  {isTotals && totalsStrategy === 'banker' && (
                      <div className="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-4 text-blue-100 text-sm shadow-inner">

                      </div>
                  )}
                  {isTotals && totalsStrategy === 'teasers' && (
                      <div className="bg-cyan-900/30 border border-cyan-500/50 p-4 rounded-xl mb-4 text-cyan-100 text-sm shadow-inner">
                          💡 <b>Тизеры (Сдвиг):</b> Искусственно понижаем риски, покупая 'безопасные' тоталы (например, ТБ 1.5). Низкие кэфы компенсируются матричной сборкой экспрессов.
                      </div>
                  )}
                  {isTotals && totalsStrategy === 'constructor' && (
                      <div className="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-4 text-blue-100 text-sm shadow-inner">

                      </div>
                  )}
                  {isBtts && bttsStrategy === 'shootout' && (
                      <div className="bg-amber-900/30 border border-amber-500/50 p-4 rounded-xl mb-4 text-amber-100 text-sm shadow-inner">
                          💡 <b>Перестрелка (ОЗ):</b> Ставим на то, что все команды забьют (ОЗ - Да). Один 'сухой' матч перекрывается страховкой.
                      </div>
                  )}
                  {isBtts && bttsStrategy === 'zero' && (
                      <div className="bg-amber-900/30 border border-amber-500/50 p-4 rounded-xl mb-4 text-amber-100 text-sm shadow-inner">
                          💡 <b>Охота на нули:</b> Ищем матчи, где хотя бы одна команда не забьет (ОЗ - Нет). Отличная стратегия для низовых лиг.
                      </div>
                  )}
                  {isBtts && bttsStrategy === 'constructor' && (
                      <div className="bg-amber-900/30 border border-amber-500/50 p-4 rounded-xl mb-4 text-amber-100 text-sm shadow-inner">
                          💡 <b>Конструктор ОЗ:</b> Выберите любое количество матчей и настройте исходы вручную.
                      </div>
                  )}
                  {isIt && itStrategy === 'synth_itb' && (
                      <div className="bg-orange-900/30 border border-orange-500/50 p-4 rounded-xl mb-4 text-orange-100 text-sm shadow-inner">
                          💡 <b>Синтетический ИТБ:</b> Замените низкий кэф букмекера на "ИТБ 1.5" составной ставкой на точное количество голов. Это дает прирост коэффициента на 0.15 - 0.30 пунктов!
                      </div>
                  )}
                  {isIt && itStrategy === 'safe_underdog' && (
                      <div className="bg-orange-900/30 border border-orange-500/50 p-4 rounded-xl mb-4 text-orange-100 text-sm shadow-inner">

                      </div>
                  )}
                  {isIt && itStrategy === 'ht_ft_goals' && (
                      <div className="bg-orange-900/30 border border-orange-500/50 p-4 rounded-xl mb-4 text-orange-100 text-sm shadow-inner">
                          💡 <b>Гол в обоих таймах:</b> Выберите забивные команды и ставьте на огромный кэф "Забьет в обоих таймах: Да". Калькулятор соберет из них надежную матрицу-систему!
                      </div>
                  )}
                  <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-${matchesToRender.length > 4 ? (matchesToRender.length === 5 ? 5 : 4) : matchesToRender.length} gap-3 mb-5 transition-all`}>
                  {matchesToRender.map((match, mIndex) => (
                    <div key={match.id} className={`bg-slate-900/80 border ${borderTheme} rounded-xl p-3 shadow-lg backdrop-blur-md relative overflow-hidden group`}>
                      {isTotals && totalsStrategy === 'banker' && mIndex < 2 && <div className="absolute top-0 right-0 bg-red-500/20 text-red-300 text-[8px] font-bold px-2 py-0.5 rounded-bl uppercase">Банкер</div>}
                      {isSystems && systemStrategy === 'anchors' && mIndex < 2 && <div className="absolute top-0 right-0 bg-amber-500/20 text-amber-300 text-[8px] font-bold px-2 py-0.5 rounded-bl uppercase tracking-wider">⚓ Якорь</div>}
                      {isSystems && systemStrategy === 'anchors' && mIndex >= 2 && <div className="absolute top-0 right-0 bg-red-500/20 text-red-300 text-[8px] font-bold px-2 py-0.5 rounded-bl uppercase tracking-wider">💣 Бомба</div>}
                      
                      <div className="flex items-center gap-2 mb-3">
                        {isSystemsLike && !isIt ? <Network className="text-indigo-400" size={16}/> : isIt ? <User className="text-orange-400" size={16}/> : <Goal className={isTotals ? "text-blue-400" : isBtts ? "text-amber-400" : "text-emerald-400"} size={16} />}
                        <input type="text" value={match.name} onChange={(e) => updateM(mIndex, 'name', e.target.value)} className={`bg-transparent text-white font-bold text-sm border-b border-slate-600/50 focus:outline-none w-full pb-1 ${focusTheme}`} placeholder={isSystemsLike ? "Событие" : "Команды"} />
                      </div>
                      
                      {isSystemsLike ? (
                          <div className="flex gap-2">
                              <input type="text" value={match.label} onChange={(e) => updateM(mIndex, 'label', e.target.value)} className={`bg-slate-950 text-slate-300 text-xs border border-slate-700 rounded px-2 py-1.5 w-1/2 focus:outline-none focus:ring-1 ${focusTheme}`} placeholder="Исход (П1, Ничья...)" />
                              <input type="number" step="0.01" value={match.odd} onChange={(e) => updateM(mIndex, 'odd', e.target.value)} className={`bg-slate-950 text-white font-bold text-sm border border-slate-700 rounded px-2 py-1.5 w-1/2 text-center focus:outline-none focus:ring-1 ${focusTheme}`} placeholder="Коэф" />
                          </div>
                      ) : (
                          <div className="flex flex-row gap-2 justify-between">
                            {match.outcomes.map((outcome, oIndex) => (
                              <div key={oIndex} className={`flex flex-col items-center gap-1.5 p-1.5 rounded-lg border transition-colors flex-1 ${outcome.active ? activeTheme : 'bg-slate-900/50 border-transparent opacity-50'}`}>
                                <label className="text-xs font-bold text-slate-200 cursor-pointer flex items-center gap-1 w-full justify-center">
                                  <input type="checkbox" checked={outcome.active} onChange={(e) => updateO(mIndex, oIndex, 'active', e.target.checked)} className={`w-3 h-3 cursor-pointer ${isTotals ? 'accent-blue-500' : isBtts ? 'accent-amber-500' : isIt ? 'accent-orange-500' : 'accent-emerald-500'}`} />
                                  {isSystems && systemStrategy === 'anti_express' ? outcome.label : isSystems && systemStrategy === 'british' ? 'Выбор' : outcome.label}
                                </label>
                                <input type="number" step="0.01" value={outcome.odd} disabled={!outcome.active} onChange={(e) => updateO(mIndex, oIndex, 'odd', e.target.value)} className={`bg-slate-950 text-white font-bold text-xs border border-slate-700 rounded px-1 py-1 w-full text-center focus:outline-none focus:ring-1 ${focusTheme} disabled:opacity-50`} placeholder="Коэф" />
                              </div>
                            ))}
                          </div>
                      )}
                    </div>
                  ))}
                </div>
                </>
              );
          };

          const themeMain = activeTab === 'totals' ? 'bg-blue-600/20 border-blue-500 text-blue-400' : activeTab === 'btts' ? 'bg-amber-600/20 border-amber-500 text-amber-400' : activeTab === 'systems' ? 'bg-indigo-600/20 border-indigo-500 text-indigo-400' : activeTab === 'it' ? 'bg-orange-600/20 border-orange-500 text-orange-400' : 'bg-emerald-600/20 border-emerald-500 text-emerald-400';
          const themeCb = activeTab === 'totals' ? 'accent-blue-500' : activeTab === 'btts' ? 'accent-amber-500' : activeTab === 'systems' ? 'accent-indigo-500' : activeTab === 'it' ? 'accent-orange-500' : 'accent-emerald-500';
          const themeBtn = activeTab === 'totals' ? 'from-blue-500 to-cyan-600 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : activeTab === 'btts' ? 'from-amber-500 to-orange-600 shadow-[0_0_15px_rgba(245,158,11,0.3)]' : activeTab === 'systems' ? 'from-indigo-500 to-purple-600 shadow-[0_0_15px_rgba(99,102,241,0.3)]' : activeTab === 'it' ? 'from-orange-500 to-red-600 shadow-[0_0_15px_rgba(249,115,22,0.3)]' : 'from-emerald-500 to-teal-600 shadow-[0_0_15px_rgba(16,185,129,0.3)]';

          return (
            <div className="min-h-screen bg-slate-900 bg-cover bg-center bg-fixed relative text-slate-100 font-sans p-2 md:p-4" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&q=80&w=2000')" }}>
              <div className="absolute inset-0 bg-slate-950/85 backdrop-blur-[2px]"></div>

              <div className="max-w-[1400px] mx-auto relative z-10">
                
                {renderTabs()}

                {/* --- HEADER ДЛЯ ДАТЧИНГА/СИСТЕМ --- */}
                {(activeTab === 'classic' || activeTab === 'totals' || activeTab === 'btts' || activeTab === 'systems' || activeTab === 'it') && (
                    <header className="flex flex-col xl:flex-row items-center justify-between mb-4 pb-4 border-b border-slate-600/30 gap-4">
                      <div className="flex flex-col sm:flex-row items-center gap-3 w-full xl:w-auto">
                        {activeTab === 'classic' && (
                            <div className="flex bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <button onClick={() => setClassicCount(2)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 2 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>2 Матча</button>
                              <button onClick={() => setClassicCount(3)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 3 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>3 Матча</button>
                              <button onClick={() => setClassicCount(4)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 4 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>4 Матча</button>
                              <button onClick={() => setClassicCount(5)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 5 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>5 Матчей</button>
                              <button onClick={() => setClassicCount(6)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 6 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>6 Матчей</button>
                            </div>
                        )}
                        {activeTab === 'systems' && (
                            <div className="flex items-center gap-2 bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <div className={`flex items-center gap-1 px-1 rounded transition-all ${systemStrategy === 'matrix' ? 'bg-indigo-600 shadow-md' : ''}`}>
                                  <button onClick={() => handlePresetSwitch('systems', 'matrix')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${systemStrategy === 'matrix' ? 'text-white' : 'text-indigo-400 hover:text-indigo-200'}`}>Матрица</button>
                                  {systemStrategy === 'matrix' && (
                                      <select value={systemMatrixType} onChange={e => {setSystemMatrixType(e.target.value); setPlacedBetsSystems(new Set()); setSystemsModes({});}} className="bg-slate-900 text-indigo-100 text-[11px] font-bold border border-indigo-500 rounded px-1 py-1 outline-none cursor-pointer">
                                          <option value="2/4">2 из 4</option>
                                          <option value="3/4">3 из 4</option>
                                          <option value="3/6">3 из 6</option>
                                      </select>
                                  )}
                              </div>
                              <button onClick={() => handlePresetSwitch('systems', 'anchors')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${systemStrategy === 'anchors' ? 'bg-indigo-600 text-white shadow-md' : 'text-indigo-400 hover:text-indigo-200'}`}>⚓ Якоря + Бомбы</button>
                              <button onClick={() => handlePresetSwitch('systems', 'fullcover')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${systemStrategy === 'fullcover' ? 'bg-indigo-600 text-white shadow-md' : 'text-indigo-400 hover:text-indigo-200'}`}>🪭 Веер (5м)</button>
                              <button onClick={() => handlePresetSwitch('systems', 'anti_express')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${systemStrategy === 'anti_express' ? 'bg-red-600 text-white shadow-md' : 'text-red-400 hover:text-red-200'}`}>🚫 Анти-Экспресс</button>
                              <div className={`flex items-center gap-1 px-1 rounded transition-all ${systemStrategy === 'british' ? 'bg-indigo-600 shadow-md' : ''}`}>
                                  <button onClick={() => handlePresetSwitch('systems', 'british')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${systemStrategy === 'british' ? 'text-white' : 'text-indigo-400 hover:text-indigo-200'}`}>🇬🇧 Британские</button>
                                  {systemStrategy === 'british' && (
                                      <select value={systemBritishType} onChange={e => {setSystemBritishType(e.target.value); setPlacedBetsSystems(new Set()); setSystemsModes({});}} className="bg-slate-900 text-indigo-100 text-[11px] font-bold border border-indigo-500 rounded px-1 py-1 outline-none cursor-pointer">
                                          <option value="Yankee">Yankee (4м)</option>
                                          <option value="Canadian">Canadian (5м)</option>
                                          <option value="Heinz">Heinz (6м)</option>
                                      </select>
                                  )}
                              </div>
                            </div>
                        )}
                        {activeTab === 'totals' && (
                            <div className="flex items-center gap-2 bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <button onClick={() => handlePresetSwitch('totals', 'smart')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${totalsStrategy === 'smart' ? 'bg-blue-600 text-white shadow-md' : 'text-blue-400 hover:text-blue-200'}`}>🛡️ Страховка</button>
                              <button onClick={() => handlePresetSwitch('totals', 'anti')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${totalsStrategy === 'anti' ? 'bg-blue-600 text-white shadow-md' : 'text-blue-400 hover:text-blue-200'}`}>🎯 Анти-Попан</button>
                              <button onClick={() => handlePresetSwitch('totals', 'banker')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${totalsStrategy === 'banker' ? 'bg-blue-600 text-white shadow-md' : 'text-blue-400 hover:text-blue-200'}`}>🏦 Банкеры</button>
                              <button onClick={() => handlePresetSwitch('totals', 'teasers')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${totalsStrategy === 'teasers' ? 'bg-cyan-600 text-white shadow-md' : 'text-cyan-400 hover:text-cyan-200'}`}>📉 Тизеры (Сдвиг)</button>
                              <div className={`flex items-center gap-1 px-1 rounded transition-all ${totalsStrategy === 'constructor' ? 'bg-blue-600 shadow-md' : ''}`}>
                                  <button onClick={() => handlePresetSwitch('totals', 'constructor')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${totalsStrategy === 'constructor' ? 'text-white' : 'text-blue-400 hover:text-blue-200'}`}>⚙️ Конструктор</button>
                                  {totalsStrategy === 'constructor' && (
                                      <select value={customTotalsCount} onChange={e => setCustomTotalsCount(Number(e.target.value))} className="bg-slate-900 text-blue-100 text-[11px] font-bold border border-blue-500 rounded px-1 py-1 outline-none">
                                          {[3,4,5,6,7,8,9,10].map(n => <option key={n} value={n}>{n} матчей</option>)}
                                      </select>
                                  )}
                              </div>
                            </div>
                        )}
                        {activeTab === 'btts' && (
                            <div className="flex items-center gap-2 bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <button onClick={() => handlePresetSwitch('btts', 'shootout')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${bttsStrategy === 'shootout' ? 'bg-amber-500 text-slate-900 shadow-md' : 'text-amber-400 hover:text-amber-200'}`}>🔥 Перестрелка</button>
                              <button onClick={() => handlePresetSwitch('btts', 'zero')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${bttsStrategy === 'zero' ? 'bg-amber-500 text-slate-900 shadow-md' : 'text-amber-400 hover:text-amber-200'}`}>❄️ Охота на нули</button>
                              <div className={`flex items-center gap-1 px-1 rounded transition-all ${bttsStrategy === 'constructor' ? 'bg-amber-500 shadow-md' : ''}`}>
                                  <button onClick={() => handlePresetSwitch('btts', 'constructor')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${bttsStrategy === 'constructor' ? 'text-slate-900' : 'text-amber-400 hover:text-amber-200'}`}>⚙️ Конструктор</button>
                                  {bttsStrategy === 'constructor' && (
                                      <select value={customBttsCount} onChange={e => setCustomBttsCount(Number(e.target.value))} className="bg-slate-900 text-amber-100 text-[11px] font-bold border border-amber-500 rounded px-1 py-1 outline-none">
                                          {[3,4,5,6,7,8,9,10].map(n => <option key={n} value={n}>{n} матчей</option>)}
                                      </select>
                                  )}
                              </div>
                            </div>
                        )}
                        {activeTab === 'it' && (
                            <div className="flex items-center gap-2 bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                                <button onClick={() => handlePresetSwitch('it', 'synth_itb')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${itStrategy === 'synth_itb' ? 'bg-orange-600 text-white shadow-md' : 'text-orange-400 hover:text-orange-200'}`}>🧬 Синтетический ИТБ</button>
                                <button onClick={() => handlePresetSwitch('it', 'safe_underdog')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${itStrategy === 'safe_underdog' ? 'bg-orange-600 text-white shadow-md' : 'text-orange-400 hover:text-orange-200'}`}>🛡️ Безопасный Андердог</button>
                                <div className={`flex items-center gap-1 px-1 rounded transition-all ${itStrategy === 'ht_ft_goals' ? 'bg-orange-600 shadow-md' : ''}`}>
                                    <button onClick={() => handlePresetSwitch('it', 'ht_ft_goals')} className={`px-3 py-1.5 rounded text-[11px] uppercase font-bold transition-all ${itStrategy === 'ht_ft_goals' ? 'text-white' : 'text-orange-400 hover:text-orange-200'}`}>⚽ Гол в обоих таймах</button>
                                    {itStrategy === 'ht_ft_goals' && (
                                        <select value={itHtFtSystemType} onChange={e => {setItHtFtSystemType(e.target.value); setPlacedBetsIt(new Set()); setItModes({});}} className="bg-slate-900 text-orange-100 text-[11px] font-bold border border-orange-500 rounded px-1 py-1 outline-none cursor-pointer">
                                            <option value="2/3">2 из 3</option>
                                            <option value="2/4">2 из 4</option>
                                            <option value="3/4">3 из 4</option>
                                        </select>
                                    )}
                                </div>
                            </div>
                        )}
                      </div>

                      <div className="flex flex-wrap items-center justify-center gap-3 bg-slate-900/60 px-4 py-2 rounded-xl border border-slate-700/50 backdrop-blur-md w-full xl:w-auto shadow-inner">
                        <div className="flex flex-col border-r border-slate-700 pr-3">
                          <label className={`text-[10px] font-bold uppercase tracking-wider mb-0.5 ${activeTab==='systems'?'text-indigo-400':activeTab==='totals'?'text-blue-400':activeTab==='btts'?'text-amber-400':activeTab==='it'?'text-orange-400':'text-emerald-400'}`}>Игровой Банк (Ставка)</label>
                          <div className="relative">
                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">$</span>
                            <input type="number" value={bank} onChange={(e) => setBank(e.target.value)} className="bg-slate-800/50 border border-slate-600 text-white font-bold text-sm rounded pl-6 pr-2 py-1.5 w-24 focus:outline-none focus:ring-1 transition-all"/>
                          </div>
                        </div>
                        <div className="flex flex-col">
                          <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Мин. ставка (Лимит)</label>
                          <div className="relative">
                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-sm">$</span>
                            <input type="number" step="0.05" value={minimumBet} onChange={(e) => setMinimumBet(e.target.value)} className="bg-slate-800 border border-slate-600 text-white font-bold text-sm rounded pl-6 pr-2 py-1.5 w-20 focus:outline-none focus:ring-1 transition-all"/>
                          </div>
                        </div>
                      </div>
                    </header>
                )}

                {/* --- РЕНДЕР ТЕКУЩЕЙ ВКЛАДКИ --- */}
                {activeTab === 'strategies' ? renderStrategiesTab() : activeTab === 'ultra' ? renderUltraAggressionTab() : activeTab === 'chaser' ? renderChaserTab() : activeTab === 'cascade' ? renderCascadeTab() : (
                    <>
                        {renderMatchesGrid()}
                        
                        {results.error ? (
                          <div className="bg-red-950/80 border border-red-800/80 rounded-xl p-6 text-center text-red-400 backdrop-blur-md mb-6"><ShieldAlert className="mx-auto mb-3 opacity-50" size={36} /><p className="text-sm font-bold">{results.error}</p></div>
                        ) : results.summary ? (
                          <div className="space-y-4 mb-8">
                            
                            {results.summary.isBankrupt && (
                              <div className="bg-red-900/60 border border-red-500 rounded-lg p-3 flex items-center justify-center gap-2 text-red-100 animate-pulse shadow-lg"><ShieldAlert size={20} /><span className="text-sm font-bold">Внимание! Страховки съедают весь банк, на "Основу" денег не остается. Отключите часть исходов или увеличьте банк.</span></div>
                            )}

                            <div className="flex flex-col md:flex-row gap-4 items-stretch justify-between bg-slate-900/50 p-3 rounded-2xl border border-slate-700/50 backdrop-blur-md">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 flex-1">
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Сумма Ставок</p>
                                    <p className="text-xl font-bold text-white">{formatUSD(results.summary.actualBank, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Ср. Выплата (Основа)</p>
                                    <p className="text-xl font-bold text-slate-100">{formatUSD(results.summary.avgMainPayout, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Чистая Прибыль</p>
                                    <p className="text-xl font-bold text-white">{results.summary.netProfit > 0 ? '+' : ''}{formatUSD(results.summary.netProfit, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                    <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">ROI (Основа)</p>
                                    <div className="flex items-center gap-1 text-xl font-bold text-white">
                                      {results.summary.roi > 0 ? '+' : ''}{results.summary.roi.toFixed(2)} <Percent size={16} />
                                    </div>
                                  </div>
                                </div>
                                
                                <div className="flex shrink-0">
                                    <button onClick={saveToHistory} disabled={results.summary.isBankrupt || results.summary.actualBank === 0} className={`h-full w-full md:w-36 bg-gradient-to-br ${themeBtn} text-white rounded-xl p-3 flex flex-col items-center justify-center gap-1.5 transition-all hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:shadow-none`}>
                                        <Save size={24} />
                                        <span className="text-[10px] font-bold uppercase tracking-wider text-center leading-tight">В общую<br/>историю</span>
                                    </button>
                                </div>
                            </div>

                            <div className="bg-slate-900/80 border border-slate-700/80 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-xl">
                              <div className="max-h-[500px] overflow-y-auto overflow-x-auto custom-scrollbar">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                  <thead className="sticky top-0 z-20">
                                    <tr className="bg-slate-800 border-b border-slate-700/50 shadow-md">
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center w-8">✓</th>
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">№</th>
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider">События в экспрессе</th>
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Коэф.</th>
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Режим</th>
                                      <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-right">Ставка</th>
                                      <th className="py-3 px-3 text-slate-300 font-semibold text-[10px] uppercase tracking-wider text-right bg-slate-800/50">Выплата</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-800/50">
                                    {results.expresses.map((exp) => {
                                      const isPlaced = activeTab === 'classic' ? placedBetsClassic.has(exp.id) : activeTab === 'totals' ? placedBetsTotals.has(exp.id) : activeTab === 'systems' ? placedBetsSystems.has(exp.id) : activeTab === 'it' ? placedBetsIt.has(exp.id) : placedBetsBtts.has(exp.id);
                                      const toggle = () => {
                                          if (activeTab === 'classic') { const s = new Set(placedBetsClassic); s.has(exp.id)?s.delete(exp.id):s.add(exp.id); setPlacedBetsClassic(s); }
                                          else if (activeTab === 'totals') { const s = new Set(placedBetsTotals); s.has(exp.id)?s.delete(exp.id):s.add(exp.id); setPlacedBetsTotals(s); }
                                          else if (activeTab === 'systems') { const s = new Set(placedBetsSystems); s.has(exp.id)?s.delete(exp.id):s.add(exp.id); setPlacedBetsSystems(s); }
                                          else if (activeTab === 'it') { const s = new Set(placedBetsIt); s.has(exp.id)?s.delete(exp.id):s.add(exp.id); setPlacedBetsIt(s); }
                                          else { const s = new Set(placedBetsBtts); s.has(exp.id)?s.delete(exp.id):s.add(exp.id); setPlacedBetsBtts(s); }
                                      };
                                      const setMode = (e) => {
                                          if (activeTab === 'classic') setClassicModes(p => ({...p, [exp.hash]: e.target.value}));
                                          else if (activeTab === 'totals') setTotalsModes(p => ({...p, [exp.hash]: e.target.value}));
                                          else if (activeTab === 'systems') setSystemsModes(p => ({...p, [exp.hash]: e.target.value}));
                                          else if (activeTab === 'it') setItModes(p => ({...p, [exp.hash]: e.target.value}));
                                          else setBttsModes(p => ({...p, [exp.hash]: e.target.value}));
                                      };

                                      return (
                                      <tr key={exp.id} className={`transition-all duration-300 ${exp.mode === 'SKIP' ? 'opacity-30 grayscale' : ''} ${isPlaced ? 'bg-slate-800/80 opacity-60' : 'hover:bg-slate-800/50'}`}>
                                        <td className="py-2 px-3 text-center">
                                          <input type="checkbox" disabled={exp.mode === 'SKIP'} checked={isPlaced} onChange={toggle} className={`w-4 h-4 cursor-pointer rounded bg-slate-800 border-slate-600 disabled:opacity-50 ${themeCb}`}/>
                                        </td>
                                        <td className="py-2 px-3 text-center font-mono text-xs text-slate-500">{exp.id}</td>
                                        <td className="py-2 px-3">
                                          <div className="flex flex-col gap-0.5">
                                            {exp.parts.map((part, i) => (
                                              <div key={i} className="flex justify-between items-center bg-slate-800/50 rounded px-2 py-0.5">
                                                <span className="text-[11px] text-slate-300 w-32 lg:w-48 truncate" title={part.matchName}>{part.matchName}</span>
                                                <div className="flex items-center gap-2">
                                                  <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm min-w-[32px] text-center ${part.label.includes('ТМ') || part.label==='Нет' || part.label==='Осечка' || part.label==='Счет 0:0' ? 'bg-slate-700 text-slate-300' : 'bg-slate-900 text-white'}`}>{part.label}</span>
                                                  <span className="text-[11px] text-slate-400 w-8 text-right">{parseFloat(part.odd).toFixed(2)}</span>
                                                </div>
                                              </div>
                                            ))}
                                          </div>
                                        </td>
                                        <td className="py-2 px-3 text-center">
                                          <span className={`inline-block border font-bold px-2 py-0.5 text-xs rounded ${exp.mode === 'SKIP' ? 'text-slate-600 border-slate-700 bg-transparent' : 'bg-slate-800 border-slate-600 text-slate-300'}`}>{exp.totalOdd.toFixed(2)}</span>
                                        </td>
                                        <td className="py-2 px-3 text-center">
                                          <select value={exp.mode} onChange={setMode} className={`text-[10px] font-bold px-2 py-1 rounded cursor-pointer border focus:outline-none appearance-none text-center ${exp.mode === 'MAIN' ? themeMain : exp.mode === 'INSURE' ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-900 border-slate-800 text-slate-600'}`}>
                                            <option value="MAIN">🎯 Основа</option>
                                            <option value="INSURE">🛡️ Страховка</option>
                                            <option value="SKIP">❌ Пропуск</option>
                                          </select>
                                        </td>
                                        <td className="py-2 px-3 text-right"><span className={`font-bold text-sm ${exp.mode === 'SKIP' ? 'text-slate-600' : 'text-slate-200'}`}>{formatUSD(exp.betAmount, 2)}</span></td>
                                        <td className={`py-2 px-3 text-right ${exp.mode === 'SKIP' ? '' : 'bg-slate-800/30'}`}>
                                          <div className="flex flex-col items-end">
                                            <span className={`font-bold text-sm ${exp.mode === 'MAIN' ? 'text-white' : exp.mode === 'INSURE' ? 'text-slate-400' : 'text-slate-600'}`}>{formatUSD(exp.payout, 2)}</span>
                                            {exp.mode === 'INSURE' && <span className="text-[9px] text-slate-500 leading-none mt-0.5">Возврат</span>}
                                          </div>
                                        </td>
                                      </tr>
                                    )})}
                                  </tbody>
                                </table>
                              </div>
                            </div>

                          </div>
                        ) : null}

                        {/* --- ОБЩАЯ ИСТОРИЯ ДЛЯ КАЛЬКУЛЯТОРОВ --- */}
                        <div className="bg-slate-900/80 border border-slate-700/80 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-xl mt-8">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-800 px-5 py-4 border-b border-slate-700/50 gap-3">
                                <div className="flex items-center gap-2">
                                    <HistoryIcon size={20} className="text-slate-400" />
                                    <h2 className="text-white font-bold uppercase tracking-wider text-sm">Глобальная История Расчетов</h2>
                                </div>
                                <div className="flex items-center gap-4 self-end sm:self-auto">
                                    <div className="text-[11px] text-slate-300 font-mono flex items-center gap-4 bg-slate-900/80 px-4 py-2 rounded-lg border border-slate-700 shadow-inner">
                                        <span title="Сыграно / Всего" className="flex items-center gap-1.5"><span className="text-slate-500">Систем:</span> {globalStats.resolvedCount}/{globalStats.total}</span>
                                        <span title="Общий профит/убыток по истории" className={`flex items-center gap-1.5 font-bold ${globalStats.totalProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                            <span className="text-slate-500 font-normal">P&L:</span> {globalStats.totalProfit > 0 ? '+' : ''}{formatUSD(globalStats.totalProfit, 2)}
                                        </span>
                                    </div>
                                    <button onClick={() => {if(window.confirm('Очистить историю расчетов?')) setHistoryData([]);}} className="text-slate-500 hover:text-red-400 transition-colors p-2 rounded hover:bg-red-400/10" title="Очистить историю"><Trash2 size={18} /></button>
                                </div>
                            </div>
                            
                            <div className="p-0 overflow-x-auto max-h-[400px] overflow-y-auto custom-scrollbar">
                                {historyData.length === 0 ? (
                                    <div className="p-12 text-center text-slate-500 text-sm flex flex-col items-center gap-3">
                                        <Save size={32} className="opacity-20"/>
                                        Сохраняйте ваши расчеты из калькуляторов сюда.
                                    </div>
                                ) : (
                                    <table className="w-full text-left border-collapse min-w-[800px]">
                                        <thead>
                                            <tr className="bg-slate-900/50 border-b border-slate-800 text-[10px] uppercase tracking-wider text-slate-500 sticky top-0 backdrop-blur-md z-10">
                                                <th className="py-3 px-5 font-semibold w-24">Дата</th>
                                                <th className="py-3 px-5 font-semibold w-40">Тип</th>
                                                <th className="py-3 px-5 font-semibold">События</th>
                                                <th className="py-3 px-5 font-semibold text-right">Сумма ставок</th>
                                                <th className="py-3 px-5 font-semibold text-right">Потенц. Профит</th>
                                                <th className="py-3 px-5 font-semibold text-center w-64">Результат</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {historyData.map(item => (
                                                <tr key={item.id} className="hover:bg-slate-800/30 transition-colors group">
                                                    <td className="py-3 px-5 text-[11px] text-slate-500 whitespace-nowrap font-mono">{item.date}</td>
                                                    <td className="py-3 px-5 text-[10px] font-bold text-slate-400 uppercase tracking-wider">{item.strategy}</td>
                                                    <td className="py-3 px-5 text-[11px] text-slate-300 leading-relaxed max-w-[250px] truncate" title={item.matches}>{item.matches}</td>
                                                    <td className="py-3 px-5 text-right font-bold text-sm text-slate-300">{formatUSD(item.gameBank)}</td>
                                                    <td className="py-3 px-5 text-right font-bold text-sm text-slate-100">+{formatUSD(item.netProfit)}</td>
                                                    <td className="py-3 px-5">
                                                        {item.status === 'PENDING' ? (
                                                            <div className="flex items-center justify-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                <button onClick={() => resolveHistoryItem(item.id, 'WON_MAIN')} className="flex flex-1 items-center justify-center gap-1 bg-emerald-900/30 hover:bg-emerald-600 text-emerald-500 hover:text-white border border-emerald-800/50 px-2 py-1.5 rounded text-[10px] font-bold transition-all" title="Зашла основа (+ профит)"><CheckCircle size={14} /> Вин</button>
                                                                {!item.strategy.includes('Матрёшка') && (
                                                                    <button onClick={() => resolveHistoryItem(item.id, 'WON_INSURE')} className="flex flex-1 items-center justify-center gap-1 bg-slate-800 hover:bg-slate-600 text-slate-400 hover:text-white border border-slate-700 px-2 py-1.5 rounded text-[10px] font-bold transition-all" title="Зашла страховка (возврат)"><ShieldAlert size={14} /> Возврат</button>
                                                                )}
                                                                <button onClick={() => resolveHistoryItem(item.id, 'LOST')} className="flex flex-1 items-center justify-center gap-1 bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border border-red-800/50 px-2 py-1.5 rounded text-[10px] font-bold transition-all" title="Слив (- банк)"><XCircle size={14} /> Слив</button>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-center justify-center w-full">
                                                                {item.status === 'WON_MAIN' && <span className="w-full justify-center bg-emerald-900/20 text-emerald-400 border border-emerald-800/50 px-3 py-1.5 rounded text-[10px] font-bold flex items-center gap-1.5"><CheckCircle size={14}/> Победа (+{formatUSD(item.netProfit)})</span>}
                                                                {item.status === 'WON_INSURE' && <span className="w-full justify-center bg-slate-800 text-slate-400 border border-slate-700 px-3 py-1.5 rounded text-[10px] font-bold flex items-center gap-1.5"><ShieldAlert size={14}/> Возврат (0.00 $)</span>}
                                                                {item.status === 'LOST' && <span className="w-full justify-center bg-red-900/20 text-red-400 border border-red-800/50 px-3 py-1.5 rounded text-[10px] font-bold flex items-center gap-1.5"><XCircle size={14}/> Слив (-{formatUSD(item.gameBank)})</span>}
                                                            </div>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    </>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
