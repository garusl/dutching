                                                                                          </div>
                                                                                          <div className="flex flex-wrap items-center justify-end gap-0.5 shrink-0 self-start w-full min-[520px]:w-auto min-[520px]:max-w-[11rem]">
                                                                                              <button type="button" disabled={item.status !== 'PENDING'} onClick={() => setHistoryExpressResult(sourceTab, item.id, exp.id, selVal === 'WIN' ? 'clear' : 'WIN')} className={`inline-flex items-center justify-center gap-0.5 border px-1 py-0.5 rounded text-[8px] font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed ${selVal === 'WIN' ? 'bg-emerald-500 text-white border-emerald-200' : 'bg-emerald-900/30 hover:bg-emerald-600 text-emerald-500 hover:text-white border-emerald-800/50 disabled:hover:bg-emerald-900/30'}`}><CheckCircle size={11} /> Вин</button>
                                                                                              {!hideRowInsure && (
                                                                                                  <button type="button" disabled={item.status !== 'PENDING'} onClick={() => setHistoryExpressResult(sourceTab, item.id, exp.id, selVal === 'RETURN' ? 'clear' : 'RETURN')} className={`inline-flex items-center justify-center gap-0.5 border px-1 py-0.5 rounded text-[8px] font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed ${selVal === 'RETURN' ? 'bg-slate-300 text-slate-950 border-white' : 'bg-slate-800 hover:bg-slate-600 text-slate-400 hover:text-white border-slate-700 disabled:hover:bg-slate-800'}`}><ShieldAlert size={11} /> Возвр.</button>
                                                                                              )}
                                                                                              <button type="button" disabled={item.status !== 'PENDING'} onClick={() => setHistoryExpressResult(sourceTab, item.id, exp.id, selVal === 'LOSE' ? 'clear' : 'LOSE')} className={`inline-flex items-center justify-center gap-0.5 border px-1 py-0.5 rounded text-[8px] font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed ${selVal === 'LOSE' ? 'bg-red-500 text-white border-red-200' : 'bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border-red-800/50 disabled:hover:bg-red-900/30'}`}><XCircle size={11} /> Слив</button>
                                                                                          </div>
                                                                                      </div>
                                                                                  )}
                                                                              </div>
                                                                          );
                                                                      })}
                                                                  </div>
                                                              </div>
                                                              )}
                                                          </td>
                                                      </tr>
                                                  )}
                                              </React.Fragment>
                                          );
                                      })}
                                  </tbody>
                              </table>
                          ) : isGlobal ? (
                              <div className="p-8 text-center text-slate-500 text-sm flex flex-col items-center gap-2">
                                  <Save size={28} className="opacity-20" />
                                  В общей ленте пока нет сохранённых серий (датчинг, тоталы, пул). Добавьте их из разделов или сохраните расчёт.
                              </div>
                          ) : null}
                      </div>
                  </div>
              );
          };

          const renderHomePage = () => {
              const gh = globalHistory || [];
              const homeHasAnyForecast = gh.length > 0;
              /** Карточки разделов только если есть записи этого раздела в общей истории (добавлены вручную с вкладки раздела). */
              const homeStrategyKeys = [
                  ...(HISTORY_TAB_KEYS.filter(
                      (key) => key !== 'express' && (key === 'classic' || key === 'totals') && gh.some((row) => row && row.sourceTab === key),
                  )),
                  ...(gh.some((row) => row && row.sourceTab === 'pool') ? ['pool'] : []),
              ];
              const mainNum = parseFloat(mainBank) || 0;
              const held = globalHistoryOutcomes.pendingHeld || 0;
              const liquidMainBank = poolMoney2(mainNum - held + poolHomeBankAdjust);
              const go = globalHistoryOutcomes;
              const passPct = go.winRateWL != null ? go.winRateWL.toFixed(1) : '—';

              const lineStratPicksAll = lineStrategiesData.picks || [];
              const summarizeLineStrategy = (strategyId) => {
                  const picks = lineStratPicksAll.filter((p) => String(p.strategyId) === String(strategyId));
                  let wins = 0;
                  let losses = 0;
                  let returns = 0;
                  let pending = 0;
                  let pl = 0;
                  picks.forEach((p) => {
                      if (p.status === 'PENDING') pending++;
                      else if (p.status === 'WON') {
                          wins++;
                          const st = poolMoney2(Number(p.stake) || 0);
                          const od = Number(p.bundle.totalOdd) || 1;
                          pl = poolMoney2(pl + poolMoney2(st * od - st));
                      } else if (p.status === 'LOST') {
                          losses++;
                          pl = poolMoney2(pl - poolMoney2(Number(p.stake) || 0));
                      } else if (p.status === 'RETURN') {
                          returns++;
                      }
                  });
                  const wl = wins + losses;
                  const passPctStr = wl > 0 ? ((wins / wl) * 100).toFixed(0) : '—';
                  return { picks, wins, losses, returns, pending, pl, passPctStr, total: picks.length };
              };

              const lineStrategiesTotalWallet = poolMoney2(
                  (lineStrategiesData.strategies || []).reduce((acc, s) => acc + (Number(s.bank) || 0), 0),
              );

              const renderHomeStrategyCard = (key) => {
                  const meta = SECTION_META[key];
                  const itemsForCard = gh.filter((row) => row && row.sourceTab === key);
                  const st = computeHistoryStats(itemsForCard);
                  const oc = sectionHistoryOutcomes(itemsForCard);
                  const secPass = oc.winRateWL != null ? oc.winRateWL.toFixed(0) : '—';
                  return (
                      <button
                          type="button"
                          key={key}
                          onClick={() => setActiveTab(key)}
                          className={`text-left rounded-xl border ${meta.border} bg-slate-950/55 hover:bg-slate-800/60 p-4 transition-all shadow-lg hover:shadow-xl ring-1 ${meta.ring} hover:ring-2 group`}
                      >
                          <div className={`h-1 w-full rounded-full bg-gradient-to-r ${meta.grad} mb-3 opacity-90`} />
                          <div className="flex items-start justify-between gap-2">
                              <h3 className="text-white font-bold text-base leading-tight">{meta.title}</h3>
                              <span className="text-sky-400/90 text-xl leading-none font-light group-hover:text-sky-300" aria-hidden>→</span>
                          </div>
                          <p className="text-[11px] text-slate-500 mt-1 leading-snug">{meta.desc}</p>
                          <p className="mt-2 text-xs font-mono text-slate-400 border border-slate-700/80 rounded-md px-2 py-1 bg-slate-900/60">
                              <span className="text-emerald-400/90 font-bold">{oc.wins}</span>
                              <span className="text-slate-600">–</span>
                              <span className="text-slate-300 font-bold">{oc.returns}</span>
                              <span className="text-slate-600">–</span>
                              <span className="text-red-400/90 font-bold">{oc.losses}</span>
                              <span className="text-slate-600 ml-1.5">· проход</span>{' '}
                              <span className="text-sky-300 font-bold">{secPass}{secPass !== '—' ? '%' : ''}</span>
                              <span className="text-slate-600 text-[10px] ml-1">(вин/вин+слив)</span>
                          </p>
                          <dl className="mt-3 grid grid-cols-2 gap-x-2 gap-y-2 text-sm font-mono border-t border-slate-800/80 pt-3">
                              <dt className="text-slate-500">Итогов</dt>
                              <dd className="text-right font-bold text-slate-200">{st.resolvedCount}/{st.total}</dd>
                              <dt className="text-slate-500">Ожид.</dt>
                              <dd className={`text-right font-bold ${st.pending > 0 ? 'text-amber-400' : 'text-slate-500'}`}>{st.pending}</dd>
                              <dt className="text-slate-500 col-span-2 pt-1">P&L раздела</dt>
                              <dd className={`col-span-2 text-right font-black text-base ${st.totalProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                  {st.totalProfit > 0 ? '+' : ''}{formatUSD(st.totalProfit, 2)}
                              </dd>
                          </dl>
                      </button>
                  );
              };

              return (
                  <div className="space-y-8 pt-2 pb-14 px-1 sm:px-0">
                      <div className="rounded-2xl border border-slate-700/80 bg-slate-900/75 p-4 sm:p-5 shadow-2xl backdrop-blur-md ring-1 ring-slate-600/25">
                          <div className="flex flex-col gap-4">
                              <div className="border-b border-slate-700/60 pb-4">
                                  <div className="flex items-center gap-2">
                                      <CircleDollarSign className="text-sky-400 shrink-0" size={24} />
                                      <div className="min-w-0">
                                          <h2 className="text-xs font-black uppercase tracking-wider text-slate-400 leading-tight">Общий банк</h2>
                                          <p className="text-[10px] text-slate-600 leading-tight mt-0.5">Все разделы · ожидающие удерживают сумму серии</p>
                                      </div>
                                  </div>
                                  <div className="mt-3 flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                                      <div className="shrink-0 lg:min-w-[10rem]">
                                          <p className={`text-3xl sm:text-4xl font-black tabular-nums leading-none ${liquidMainBank < 0 ? 'text-red-400' : 'text-emerald-300'}`}>{formatUSD(liquidMainBank, 2)}</p>
                                          <p className="text-xs text-slate-500 mt-1">Доступный банк</p>
                                          <p className="text-xs text-amber-400/95 mt-1 tabular-nums">
                                              {held > 0 ? (
                                                  <>В игре: {formatUSD(held, 2)}</>
                                              ) : (
                                                  <span className="text-slate-500">Не рассчитано</span>
                                              )}
                                          </p>
                                      </div>
                                      <div className="w-full rounded-lg border border-slate-700/70 bg-slate-950/45 p-2 sm:ml-auto sm:max-w-[22rem]">
                                      <div className="flex flex-wrap items-center gap-2">
                                          <input
                                              type="number"
                                              step="0.01"
                                              min="0"
                                              value={mainBankSimAmount}
                                              onChange={(e) => setMainBankSimAmount(e.target.value)}
                                              title="Сумма операции"
                                              className="h-9 min-w-0 w-full sm:flex-1 rounded border border-slate-600 bg-slate-900/80 px-2.5 text-sm font-mono text-white"
                                          />
                                          <button
                                              type="button"
                                              onClick={() => applyMainBankSimulation('topup')}
                                              className="h-9 rounded border border-emerald-600/60 bg-emerald-900/35 px-2.5 text-xs font-black uppercase tracking-wide text-emerald-200 hover:bg-emerald-900/55 sm:flex-none"
                                          >
                                              Пополнить
                                          </button>
                                          <button
                                              type="button"
                                              onClick={() => applyMainBankSimulation('withdraw')}
                                              className="h-9 rounded border border-amber-600/60 bg-amber-900/35 px-2.5 text-xs font-black uppercase tracking-wide text-amber-100 hover:bg-amber-900/55 sm:flex-none"
                                          >
                                              Вывести
                                          </button>
                                      </div>
                                      <div className="mt-2 grid grid-cols-3 gap-1 text-[10px] font-mono">
                                          <div className="rounded border border-slate-700/60 bg-slate-900/60 px-1.5 py-1">
                                              <p className="text-slate-500 uppercase tracking-wide">Завёл</p>
                                              <p className="text-sm font-black text-emerald-300 tabular-nums">{formatUSD(mainBankTopupTotal, 2)}</p>
                                          </div>
                                          <div className="rounded border border-slate-700/60 bg-slate-900/60 px-1.5 py-1">
                                              <p className="text-slate-500 uppercase tracking-wide">Вывел</p>
                                              <p className="text-sm font-black text-amber-300 tabular-nums">{formatUSD(mainBankWithdrawTotal, 2)}</p>
                                          </div>
                                          <div className="rounded border border-slate-700/60 bg-slate-900/60 px-1.5 py-1">
                                              <p className="text-slate-500 uppercase tracking-wide">Итого</p>
                                              <p className={`text-sm font-black tabular-nums ${(mainBankTopupTotal - mainBankWithdrawTotal) >= 0 ? 'text-emerald-300' : 'text-red-300'}`}>
                                                  {mainBankTopupTotal - mainBankWithdrawTotal > 0 ? '+' : ''}
                                                  {formatUSD(poolMoney2(mainBankTopupTotal - mainBankWithdrawTotal), 2)}
                                              </p>
                                          </div>
                                      </div>
                                  </div>
                                  </div>
                                  {poolHomeBankAdjust !== 0 ? (
                                      <p className="text-[10px] text-slate-600 mt-1 leading-snug">
                                          С учётом P&L пула в общей истории:{' '}
                                          <span className={poolHomeBankAdjust >= 0 ? 'text-emerald-400/90 font-bold' : 'text-red-400/90 font-bold'}>
                                              {poolHomeBankAdjust > 0 ? '+' : ''}
                                              {formatUSD(poolHomeBankAdjust, 2)}
                                          </span>
                                      </p>
                                  ) : null}
                              </div>
                              <div className="flex flex-col gap-4">
                                  <div className="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-3">
                                      <div className="min-w-0">
                                          <h2 className="text-white font-black text-xl sm:text-2xl tracking-tight">Сводка по стратегиям</h2>
                                          <p className="text-xs text-slate-500 mt-1 max-w-xl leading-relaxed">
                                              {homeHasAnyForecast
                                                  ? 'Статистика на карточках считается только по записям, добавленным в общую историю (иконка у строки на «Экспрессы», «Тоталы» или у снимка в «Пул лесенок»). Нажмите карточку — откроется калькулятор.'
                                                  : 'Добавьте серии или снимки пула в общую историю (экспрессы, тоталы, пул) — здесь появятся карточки и сводка по ним.'}
                                          </p>
                                      </div>
                                      <div className={`flex flex-wrap gap-2 lg:justify-end shrink-0 transition-opacity duration-300 ${homeHasAnyForecast ? 'opacity-100' : 'opacity-50'}`}>
                                          <div className="rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 min-w-[6.5rem]">
                                              <p className="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Всего записей</p>
                                              <p className="text-xl font-black text-white tabular-nums leading-tight">{globalStats.total}</p>
                                          </div>
                                          <div className="rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 min-w-[6.5rem]">
                                              <p className="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Суммарный P&L</p>
                                              <p className={`text-lg font-black tabular-nums leading-tight ${globalStats.totalProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                                  {globalStats.totalProfit > 0 ? '+' : ''}{formatUSD(globalStats.totalProfit, 2)}
                                              </p>
                                              <p className="text-[10px] text-slate-500 mt-0.5">Итогов: {globalStats.resolvedCount} · Ожид.: {globalStats.pending}</p>
                                          </div>
                                          <div className="rounded-lg border border-slate-700 bg-slate-950/80 px-3 py-2 min-w-[7.5rem]">
                                              <p className="text-[10px] uppercase text-slate-500 font-bold tracking-wider">Серии W–В–П</p>
                                              <p className="text-xl font-black text-white tabular-nums leading-tight">
                                                  <span className="text-emerald-400">{go.wins}</span>
                                                  <span className="text-slate-600">–</span>
                                                  <span className="text-slate-300">{go.returns}</span>
                                                  <span className="text-slate-600">–</span>
                                                  <span className="text-red-400">{go.losses}</span>
                                              </p>
                                              <p className="text-[10px] text-slate-500 mt-0.5">
                                                  Проход: <span className="text-sky-300 font-bold">{passPct}{passPct !== '—' ? '%' : ''}</span>
                                                  <span className="text-slate-600"> · вин/(вин+слив)</span>
                                              </p>
                                          </div>
                                      </div>
                                  </div>
                                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                      {homeStrategyKeys.length ? (
                                          homeStrategyKeys.map((key) => renderHomeStrategyCard(key))
                                      ) : (
                                          <p className="col-span-full text-sm text-slate-500 py-4 text-center border border-dashed border-slate-700/80 rounded-xl bg-slate-950/40">
                                              Пока нет разделов в общей истории. На «Экспрессы», «Тоталы» или в «Пул лесенок» нажмите иконку у строки/снимка, чтобы добавить сюда.
                                          </p>
                                      )}
                                  </div>
                              </div>
                          </div>
                      </div>

                      <div className="rounded-2xl border border-violet-600/40 bg-slate-900/75 p-4 sm:p-5 shadow-2xl backdrop-blur-md ring-1 ring-violet-500/20">
                          <h2 className="text-white font-black text-lg sm:text-xl tracking-tight">Стратегии с «Линия»</h2>
                          <div className="mt-3 mb-4 flex flex-wrap items-end justify-between gap-2 gap-y-2">
                              <div className="flex flex-wrap items-end gap-1.5 min-w-0 flex-1 sm:flex-initial sm:max-w-[min(100%,14rem)]">
                                  <input
                                      type="text"
                                      value={lineStrategyNewName}
                                      onChange={(e) => setLineStrategyNewName(e.target.value)}
                                      placeholder="Имя стратегии"
                                      aria-label="Новая стратегия"
                                      className="min-w-0 w-[7.5rem] flex-1 sm:w-[10rem] rounded-lg border border-violet-600/50 bg-slate-950 px-2 py-1.5 text-xs text-white placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-violet-400"
                                  />
                                  <button
                                      type="button"
                                      onClick={addLineStrategyFromHome}
                                      className="shrink-0 rounded-lg border border-violet-500 bg-violet-700/80 px-2.5 py-1.5 text-xs font-bold text-white hover:bg-violet-600 transition-colors"
                                  >
                                      Добавить
                                  </button>
                              </div>
                              <div className="shrink-0 rounded-xl border border-slate-700/80 bg-slate-950/70 px-2.5 py-2 text-right ring-1 ring-sky-500/15 min-w-[7.25rem]">
                                  <p className="text-[9px] font-bold uppercase tracking-wide text-slate-500 leading-tight">Сумма по кошелькам</p>
                                  <p className="mt-0.5 text-lg sm:text-xl font-black font-mono text-white tabular-nums tracking-tight border-b border-sky-500/25 pb-0.5 leading-none">
                                      {formatUSD(lineStrategiesTotalWallet, 2)}
                                  </p>
                                  <p className="text-[9px] text-slate-600 mt-0.5 tabular-nums leading-tight">
                                      стратегий: {(lineStrategiesData.strategies || []).length}
                                  </p>
                              </div>
                          </div>
                          {(lineStrategiesData.strategies || []).length === 0 ? (
                              <p className="text-sm text-slate-500 border border-dashed border-violet-800/50 rounded-xl py-6 text-center bg-slate-950/40">
                                  Пока нет стратегий. Задайте имя выше — затем переведите сумму с основного банка в кошелёк стратегии и добавляйте купоны с «Линия».
                              </p>
                          ) : (
                              <div className="grid grid-cols-1 min-[520px]:grid-cols-2 gap-2">
                                  {(lineStrategiesData.strategies || []).map((s) => {
                                      const sum = summarizeLineStrategy(s.id);
                                      return (
                                          <div
                                              key={s.id}
                                              className="min-w-0 rounded-lg border border-violet-700/45 bg-slate-950/60 p-3 shadow-inner text-sm"
                                          >
                                              <div className="flex items-start justify-between gap-2">
                                                  <h3
                                                      className="min-w-0 text-lg sm:text-xl font-black text-sky-300 tracking-tight truncate pr-1 drop-shadow-[0_0_12px_rgba(56,189,248,0.12)]"
                                                      title={s.name}
                                                  >
                                                      {s.name}
                                                  </h3>
                                                  <button
                                                      type="button"
                                                      onClick={() => setLineStrategyDeletePrompt({ strategyId: s.id, name: s.name })}
                                                      className="shrink-0 text-xs font-bold uppercase text-red-400/90 hover:text-red-300"
                                                  >
                                                      Удалить
                                                  </button>
                                              </div>
                                              <div className="mt-2 flex gap-2 items-stretch">
                                                  <div className="min-w-0 flex-1">
                                                      <p className="text-xl sm:text-2xl font-mono font-black text-white tabular-nums leading-tight">
                                                          {formatUSD(s.bank, 2)}
                                                      </p>
                                                      <p className="mt-1.5 text-sm leading-snug font-mono text-slate-400">
                                                          <span className="text-emerald-400 font-bold">{sum.wins}</span>
                                                          <span className="text-slate-600">–</span>
                                                          <span className="text-slate-300 font-bold">{sum.returns}</span>
                                                          <span className="text-slate-600">–</span>
                                                          <span className="text-red-400 font-bold">{sum.losses}</span>
                                                          <span className="text-slate-600"> · </span>
                                                          <span className={sum.pending > 0 ? 'text-amber-400 font-bold' : 'text-slate-500'}>{sum.pending}</span>
                                                          <span className="text-slate-600"> ожид. · </span>
                                                          <span className="text-sky-300 font-bold">{sum.passPctStr}{sum.passPctStr !== '—' ? '%' : ''}</span>
                                                          <span className="text-slate-600"> · </span>
                                                          <span className={sum.pl >= 0 ? 'text-emerald-400 font-bold' : 'text-red-400 font-bold'}>
                                                              {sum.pl > 0 ? '+' : ''}
                                                              {formatUSD(sum.pl, 2)}
                                                          </span>
                                                      </p>
                                                  </div>
                                                  <div
                                                      className="shrink-0 flex flex-col justify-center gap-1.5 border-l border-slate-700/50 pl-2 w-[5.75rem] sm:w-[6.25rem]"
                                                      title="Переводы с основного банка и обратно"
                                                  >
                                                      <div className="flex flex-col gap-0.5">
                                                          <input
                                                              type="number"
                                                              step="0.01"
                                                              min="0"
                                                              aria-label="Сумма перевода с основного банка"
                                                              title="С основного банка"
                                                              value={lineStrategyXferIn[s.id] ?? ''}
                                                              onChange={(e) =>
                                                                  setLineStrategyXferIn((prev) => ({
                                                                      ...prev,
                                                                      [s.id]: e.target.value,
                                                                  }))
                                                              }
                                                              className="w-full rounded border border-slate-600 bg-slate-900 px-1 py-0.5 text-[10px] font-mono text-white leading-tight h-5"
                                                          />
                                                          <button
                                                              type="button"
                                                              title="Перевести с основного банка в кошелёк стратегии"
                                                              onClick={() => transferMainToLineStrategy(s.id, lineStrategyXferIn[s.id])}
                                                              className="h-5 w-full rounded border border-emerald-600/55 bg-emerald-950/45 text-[8px] font-bold text-emerald-200 hover:bg-emerald-900/55 leading-none"
                                                          >
                                                              Из банка
                                                          </button>
                                                      </div>
                                                      <div className="flex flex-col gap-0.5">
                                                          <input
                                                              type="number"
                                                              step="0.01"
                                                              min="0"
                                                              aria-label="Сумма перевода на основной банк"
                                                              title="На основной банк"
                                                              value={lineStrategyXferOut[s.id] ?? ''}
                                                              onChange={(e) =>
                                                                  setLineStrategyXferOut((prev) => ({
                                                                      ...prev,
                                                                      [s.id]: e.target.value,
                                                                  }))
                                                              }
                                                              className="w-full rounded border border-slate-600 bg-slate-900 px-1 py-0.5 text-[10px] font-mono text-white leading-tight h-5"
                                                          />
                                                          <button
                                                              type="button"
                                                              title="Перевести с кошелька стратегии на основной банк"
                                                              onClick={() => transferFromLineStrategyToMain(s.id, lineStrategyXferOut[s.id])}
                                                              className="h-5 w-full rounded border border-sky-600/50 bg-slate-800 text-[8px] font-bold text-sky-200 hover:bg-slate-700 leading-none"
                                                          >
                                                              В банк
                                                          </button>
                                                      </div>
                                                  </div>
                                              </div>
                                              <p className="mt-2.5 rounded-md border border-slate-700/50 bg-slate-900/40 px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wide text-slate-500">
                                                  Прогнозов: {sum.total}. Список и действия — в блоке «Общая лента» ниже (фильтры по стратегии и статусу).
                                              </p>
                                          </div>
                                      );
                                  })}
                              </div>
                          )}
                      </div>

                      {renderHistoryPanel(undefined, { isGlobal: true })}
                  </div>
              );
          };

          const poolUpdateActiveShell = (patchFn) => {
              setPoolMulti((pm) => {
                  const id = pm.activePoolId;
                  return {
                      ...pm,
                      pools: pm.pools.map((p) => (p.id === id ? patchFn(p) : p)),
                  };
              });
          };
          const poolSetLeg = (si, wi, li, key, val) => {
              poolUpdateActiveShell((p) => {
                  const next = JSON.parse(JSON.stringify(p.session));
                  next.series[si].steps[wi].legs[li][key] = val;
                  return { ...p, session: next };
              });
          };
          const poolSetStake = (si, wi, raw) => {
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  const st = prev.series[si] && prev.series[si].steps[wi];
                  if (!st || (st.status !== 'empty' && st.status !== 'placed')) return p;
                  const next = JSON.parse(JSON.stringify(prev));
                  let v = parseFloat(String(raw).replace(',', '.'));
                  if (!Number.isFinite(v) || v < 0) v = 0;
                  next.series[si].steps[wi].stake = poolMoney2(v);
                  return { ...p, session: next };
              });
          };
          const poolClearExpressExtraLegs = (si, wi) => {
              poolUpdateActiveShell((p) => {
                  const next = JSON.parse(JSON.stringify(p.session));
                  const legs = next.series[si].steps[wi].legs;
                  if (!legs || legs.length < 3) return p;
                  legs[1] = poolEmptyLeg();
                  legs[2] = poolEmptyLeg();
                  return { ...p, session: next };
              });
          };
          const poolCommitPlace = (si, wi) => {
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  if (!poolStepUnlocked(prev.series, si, wi)) return p;
                  const st = prev.series[si].steps[wi];
                  if (st.status !== 'empty') return p;
                  if (poolProductOdds(st.legs) <= 1) return p;
                  const next = JSON.parse(JSON.stringify(prev));
                  next.series[si].steps[wi].status = 'placed';
                  return { ...p, session: next };
              });
          };
          const poolResolveWin = (si, wi) => {
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  const st = prev.series[si].steps[wi];
                  if (st.status !== 'placed') return p;
                  const prod = poolProductOdds(st.legs);
                  const payout = poolMoney2(st.stake * prod);
                  const next = JSON.parse(JSON.stringify(prev));
                  const ns = next.series[si];
                  ns.steps[wi] = { ...ns.steps[wi], status: 'won', payout };
                  if (wi < ns.steps.length - 1) {
                      ns.steps[wi + 1] = {
                          stake: poolMoney2(payout),
                          legs: [poolEmptyLeg(), poolEmptyLeg(), poolEmptyLeg()],
                          status: 'empty',
                          payout: null,
                      };
                  }
                  return { ...p, session: next };
              });
          };
          const poolResolveLoss = (si, wi) => {
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  const st = prev.series[si].steps[wi];
                  if (st.status !== 'placed') return p;
                  const next = JSON.parse(JSON.stringify(prev));
                  next.series[si].steps[wi] = { ...next.series[si].steps[wi], status: 'lost', payout: 0 };
                  next.series[si].dead = true;
                  return { ...p, session: next };
              });
          };
          const poolReopenResolvedStep = (si, wi) => {
              const pid = poolMultiRef.current.activePoolId;
              setPoolDeadRowHiddenKeys((prev) => prev.filter((k) => k !== `${pid}:${si}`));
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  const ns = prev.series[si];
                  if (!ns) return p;
                  const st = ns.steps[wi];
                  if (st.status !== 'won' && st.status !== 'lost') return p;
                  if (st.status === 'won' && wi < ns.steps.length - 1 && !poolStepIsPristineEmpty(ns.steps[wi + 1])) return p;
                  const next = JSON.parse(JSON.stringify(prev));
                  const nser = next.series[si];
                  const was = nser.steps[wi].status;
                  nser.steps[wi] = { ...nser.steps[wi], status: 'placed', payout: null };
                  if (was === 'won' && wi < nser.steps.length - 1) nser.steps[wi + 1] = poolEmptyStep(0);
                  if (was === 'lost') nser.dead = false;
                  const baseEx = p.deadExpanded && typeof p.deadExpanded === 'object' ? p.deadExpanded : {};
                  const deadEx = was === 'lost' ? { ...baseEx, [si]: false } : baseEx;
                  return { ...p, session: next, deadExpanded: deadEx };
              });
              setPoolEditCellKey(null);
          };
          /** Полностью снять последнюю ставку в лесенке серии (placed → пусто; won/lost → пусто после отката расчёта). */
          const poolDeleteLastBet = (si, wi) => {
              poolUpdateActiveShell((p) => {
                  const prev = p.session;
                  const ser = prev.series[si];
                  if (!ser || ser.dead) return p;
                  if (poolSeriesLastBetIndex(ser) !== wi) return p;
                  const st = ser.steps[wi];
                  if (!st || (st.status !== 'placed' && st.status !== 'won' && st.status !== 'lost')) return p;
                  const next = JSON.parse(JSON.stringify(prev));
                  const ns = next.series[si];
                  const nSer = Math.max(1, next.series.length);
                  const init = Number(next.initialPoolBank) || 0;
                  const per0 = poolMoney2(init > 0 ? init / nSer : 0);
                  if (st.status === 'placed') {
                      ns.steps[wi] = poolEmptyStep(wi === 0 ? per0 : poolMoney2(Number(st.stake) || 0));
                      return { ...p, session: next };
                  }
                  if (st.status === 'won' && wi < ns.steps.length - 1 && !poolStepIsPristineEmpty(ns.steps[wi + 1])) {
                      return p;
                  }
                  const was = st.status;
                  ns.steps[wi] = { ...ns.steps[wi], status: 'placed', payout: null };
                  if (was === 'won' && wi < ns.steps.length - 1) {
                      ns.steps[wi + 1] = poolEmptyStep(0);
                  }
                  if (was === 'lost') {
                      ns.dead = false;
                  }
                  const stMid = ns.steps[wi];
                  ns.steps[wi] = poolEmptyStep(wi === 0 ? per0 : poolMoney2(Number(stMid.stake) || 0));
                  const baseEx = p.deadExpanded && typeof p.deadExpanded === 'object' ? { ...p.deadExpanded } : {};
                  const deadEx = was === 'lost' ? { ...baseEx, [si]: false } : baseEx;
                  return { ...p, session: next, deadExpanded: deadEx };
              });
              const pid = poolMultiRef.current.activePoolId;
              const betKey = `${pid}-${si}-${wi}`;
              setPoolBetExpressOpenKeys((prev) => prev.filter((k) => k !== betKey));
              setPoolEditCellKey(null);
          };
          const poolStartNew = () => {
              setPoolEditCellKey(null);
              setPoolTrashConfirm(null);
              setPoolTrashNotice(null);
              if (poolTrashNoticeTimerRef.current) {
                  clearTimeout(poolTrashNoticeTimerRef.current);
                  poolTrashNoticeTimerRef.current = null;
              }
              setPoolBetExpressOpenKeys([]);
              const id = poolMultiRef.current.activePoolId;
              setPoolDeadRowHiddenKeys((prev) => prev.filter((k) => !k.startsWith(`${id}:`)));
              setPoolMulti((pm) => {
                  const activeId = pm.activePoolId;
                  return {
                      ...pm,
                      pools: pm.pools.map((p) => {
                          if (p.id !== activeId) return p;
                          poolDoubleArmRefs.current[activeId] = true;
                          poolGoalPrevMetRefs.current[activeId] = false;
                          return {
                              ...p,
                              deadExpanded: {},
                              isClosed: false,
                              closeReason: null,
                              session: poolCreateSession(p.bankInput, p.constructorSeries, p.constructorSteps),

          };
          const poolSaveToHistory = () => {
              const ap = poolMulti.pools.find((p) => p.id === poolMulti.activePoolId);
              if (!ap) return;
              const snap = {
                  id: Date.now(),
                  poolId: ap.id,
                  poolName: ap.name,
                  savedAt: new Date().toLocaleString('ru-RU'),
                  initialPoolBank: poolMoney2(ap.session.initialPoolBank),
                  insideSnapshot: poolMoney2(poolComputeInsideTotal(ap.session.series)),
                  goalMet: poolGoalMet(ap.session.series, ap.targetFull4, ap.targetSeries3, ap.targetSteps3),
                  targets: { full4: ap.targetFull4, series3: ap.targetSeries3, steps3: ap.targetSteps3 },
                  seriesCount: ap.session.seriesCount || ap.session.series.length,
                  stepsCount: ap.session.stepsCount || poolStepsLen(ap.session.series),
                  series: JSON.parse(JSON.stringify(ap.session.series)),

              setPoolHistory((h) => [snap, ...h].slice(0, 100));
          };
          const commitPoolHistoryDelete = () => {
              const p = poolHistoryDeletePrompt;

          const poolAddTab = () => {

              setPoolTrashNotice(null);

                  clearTimeout(poolTrashNoticeTimerRef.current);
                  poolTrashNoticeTimerRef.current = null;
              }
              setPoolBetExpressOpenKeys([]);
              setPoolMulti((pm) => {
                  const n = pm.pools.length + 1;
                  const sh = poolShellFromSession(`Пул ${n}`, poolCreateSession(500, POOL_DEFAULT_SERIES, POOL_DEFAULT_STEPS));
                  if (!sh) return pm;
                  poolDoubleArmRefs.current[sh.id] = true;
                  poolGoalPrevMetRefs.current[sh.id] = false;
                  return { activePoolId: sh.id, pools: [...pm.pools, sh] };
              });
          };
          const poolRemoveActiveTab = () => {
              const removedId = poolMultiRef.current.activePoolId;
              setPoolEditCellKey(null);
              setPoolTrashConfirm(null);
              setPoolTrashNotice(null);
              if (poolTrashNoticeTimerRef.current) {
                  clearTimeout(poolTrashNoticeTimerRef.current);
                  poolTrashNoticeTimerRef.current = null;
              }
              setPoolBetExpressOpenKeys([]);
              setPoolDeadRowHiddenKeys((prev) => prev.filter((k) => !k.startsWith(`${removedId}:`)));

                  const activeId = pm.activePoolId;
                  delete poolDoubleArmRefs.current[activeId];
                  delete poolGoalPrevMetRefs.current[activeId];
                  delete poolAutoCloseArmRefs.current[activeId];
                  const rest = pm.pools.filter((p) => p.id !== activeId);
                  if (rest.length > 0) {
                      return { activePoolId: rest[0].id, pools: rest };
                  }
                  const sh = poolShellFromSession('Пул 1', poolCreateSession(500, POOL_DEFAULT_SERIES, POOL_DEFAULT_STEPS));
                  if (!sh) return pm;
                  poolDoubleArmRefs.current[sh.id] = true;
                  poolGoalPrevMetRefs.current[sh.id] = false;
                  return { activePoolId: sh.id, pools: [sh] };
              });
          };
          const poolSwitchTab = (poolId) => {
              setPoolEditCellKey(null);
              setPoolTrashConfirm(null);
              setPoolTrashNotice(null);
              if (poolTrashNoticeTimerRef.current) {
                  clearTimeout(poolTrashNoticeTimerRef.current);
                  poolTrashNoticeTimerRef.current = null;
              }
              setPoolBetExpressOpenKeys([]);
              setPoolMulti((pm) => (pm.pools.some((p) => p.id === poolId) ? { ...pm, activePoolId: poolId } : pm));
          };
          const poolRenameActive = (name) => {
              poolUpdateActiveShell((p) => ({ ...p, name: String(name ?? '').slice(0, 48) }));
          };

          const renderPoolTab = () => {
              const activePool = poolMulti.pools.find((p) => p.id === poolMulti.activePoolId) || poolMulti.pools[0];
              if (!activePool) return null;
              const poolSession = activePool.session;
              const poolTargetSteps3 = activePool.targetSteps3;
              const poolTargetFull4 = activePool.targetFull4;
              const poolTargetSeries3 = activePool.targetSeries3;
              const poolBankInput = activePool.bankInput;
              const poolConstructorSeries = activePool.constructorSeries;
              const poolConstructorSteps = activePool.constructorSteps;
              const poolDeadExpanded = activePool.deadExpanded || {};
              const inside = poolComputeInsideTotal(poolSession.series);
              const init = Number(poolSession.initialPoolBank) || 0;
              const goal = poolMoney2(init * 2);
              const stN = poolSession.stepsCount || poolStepsLen(poolSession.series);
              const serN = poolSession.seriesCount || poolSession.series.length;
              const nextBetSlots = poolNextBetSlots(poolSession.series);
              const nextBetKeySet = new Set(nextBetSlots.map((sl) => `${sl.si}-${sl.wi}`));
              const renderStepCell = (si, wi) => {
                  const ser = poolSession.series[si];
                  const st = ser.steps[wi];
                  const poolIsClosed = activePool.isClosed === true;
                  const un = poolStepUnlocked(poolSession.series, si, wi);
                  const prod = poolProductOdds(st.legs);
                  const payShow =
                      st.status === 'won'
                          ? poolMoney2(Number(st.payout) || 0)
                          : st.status === 'placed'
                            ? poolMoney2(Number(st.stake) * prod)
                            : null;
                  const poolLegsReadOnly = (legs) => {
                      const rows = (legs || []).map((lg, li) => {
                          const m = String(lg.matchName || '').trim();
                          const mk = String(lg.market || '').trim();
                          const o = lg.odd != null && String(lg.odd).trim() !== '' ? parseFloat(lg.odd) : NaN;
                          const has = m || mk || Number.isFinite(o);
                          if (!has) return null;
                          return (
                              <div key={li} className="text-[13px] leading-relaxed text-slate-300 border-t border-slate-800/60 first:border-t-0 first:pt-0 pt-2">
                                  <span className="font-bold text-slate-100 break-words">{m || '—'}</span>
                                  <span className="text-slate-600"> · </span>
                                  <span className="text-slate-400">{mk || '—'}</span>
                                  {Number.isFinite(o) && o > 0 ? (
                                      <span className="font-mono text-amber-200/95"> @ {o.toFixed(2)}</span>
                                  ) : null}
                              </div>

                      });
                      if (!rows.some(Boolean)) return null;
                      return (
                          <div className="rounded-md border border-slate-700/50 bg-slate-950/55 p-2 space-y-1.5">
                              {rows}
                          </div>
                      );
                  };
                  const isNextBet = nextBetKeySet.has(`${si}-${wi}`);
                  const isClosedNextBet = poolIsClosed && isNextBet && st.status === 'empty' && un;
                  const nextBetAccent = isNextBet && !poolIsClosed;
                  const baseCell =
                      st.status === 'won'
                          ? 'border-emerald-600/50 bg-emerald-950/25'
                          : st.status === 'lost'
                            ? 'border-red-700/50 bg-red-950/20'
                            : st.status === 'placed'
                              ? 'border-amber-600/40 bg-amber-950/15'
                              : 'border-slate-700/60 bg-slate-950/40';
                  const nextRing = nextBetAccent
                      ? ' ring-2 ring-amber-400 ring-offset-2 ring-offset-slate-950 shadow-[0_0_24px_rgba(251,191,36,0.45)] z-[2]'
                      : '';
                  const cellKey = `${si}-${wi}`;
                  const editOpen = poolEditCellKey === cellKey;
                  const canReopenResolved =
                      st.status === 'lost' ||
                      (st.status === 'won' && (wi >= ser.steps.length - 1 || poolStepIsPristineEmpty(ser.steps[wi + 1])));
                  const lastBetWi = poolSeriesLastBetIndex(ser);
                  const wonNextIsClear =
                      st.status !== 'won' || wi >= ser.steps.length - 1 || poolStepIsPristineEmpty(ser.steps[wi + 1]);
                  const canDeleteLastBet =
                      !ser.dead &&
                      lastBetWi === wi &&
                      wonNextIsClear &&
                      (st.status === 'placed' || st.status === 'won' || st.status === 'lost');
                  const resolvedPad =
                      st.status === 'won' || st.status === 'lost'
                          ? canDeleteLastBet
                              ? ' pr-14'
                              : ' pr-8'

                  const placedTrashPad = st.status === 'placed' && canDeleteLastBet ? ' pr-10' : '';
                  return (
                      <div
                          className={`relative flex h-full min-h-[10rem] w-full flex-col gap-2 rounded-lg border px-2.5 py-2.5 ${nextBetAccent ? 'pt-6' : ''} ${baseCell}${nextRing}${resolvedPad}${placedTrashPad}`}
                          data-pool-next={nextBetAccent ? '1' : undefined}
                      >
                          {nextBetAccent ? (
                              <div className="absolute -top-2 left-1/2 z-10 -translate-x-1/2 whitespace-nowrap rounded-full bg-amber-400 px-2.5 py-0.5 text-[11px] font-black uppercase tracking-wide text-slate-900 shadow-lg">
                                  Следующая ставка
                              </div>
                          ) : null}
                          {st.status === 'won' || st.status === 'lost' ? (
                              <>
                                  <div className="pointer-events-auto absolute top-2 right-2 z-30 flex flex-row-reverse items-center gap-0.5">
                                      <button

                                          onClick={(e) => {

                                      >
                                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                              <path
                                                  d="M12 20h8M16.5 3.5a2.12 2.12 0 0 1 3 3L8 18l-4 1 1-3.8L16.5 3.5z"
                                                  stroke="currentColor"
                                                  strokeWidth="1.75"
                                                  strokeLinecap="round"
                                                  strokeLinejoin="round"
                                              />
                                          </svg>
                                      </button>
                                      {canDeleteLastBet ? (
                                          <button
                                              type="button"
                                              title="Удалить ставку (только последняя в этой лесенке)"
                                              aria-label="Удалить ставку"
                                              className="inline-flex h-[20px] w-[20px] shrink-0 items-center justify-center rounded text-slate-400 transition-colors hover:bg-slate-800/70 hover:text-amber-200 focus:outline-none focus-visible:ring-1 focus-visible:ring-amber-500/35"
                                              onClick={(e) => {
                                                  e.stopPropagation();
                                                  setPoolEditCellKey(null);
                                                  setPoolTrashConfirm({ si, wi });

                                              <Trash2 size={11} className="pointer-events-none opacity-90" aria-hidden />
                                          </button>

                                  {editOpen ? (

                                                  onClick={() => poolReopenResolvedStep(si, wi)}

                                                  Следующий шаг уже начат — отмена недоступна.
                                              </p>
                                          )}
                                      </div>
                                  ) : null}
                              </>

                          <div className="shrink-0 space-y-1.5">
                              <div className="flex justify-between gap-2 text-[12px] font-bold uppercase tracking-wide text-slate-500">
                                  <span>Ставка</span>

                              <div className="flex items-center justify-between gap-2 font-mono text-[15px] font-bold text-white">
                                  {st.status === 'empty' || st.status === 'placed' ? (
                                      <input
                                          type="number"
                                          step="0.01"
                                          min="0"
                                          value={poolMoney2(Number(st.stake) || 0)}

                                          className="min-w-0 max-w-[7rem] flex-1 rounded-md border border-slate-600 bg-slate-950/90 px-2 py-1 text-[14px] font-mono font-bold text-white tabular-nums shadow-inner disabled:opacity-50"
                                      />

                                      <span className="tabular-nums">{formatUSD(st.stake, 2)}</span>
                                  )}
                                  <span className="shrink-0 tabular-nums text-sky-300">{prod >= 1.001 ? prod.toFixed(2) : '—'}</span>
                              </div>
                          </div>
                          {isClosedNextBet ? (
                              <div className="mt-auto rounded-md border border-slate-700/70 bg-slate-900/55 p-2.5">
                                  <p className="text-[12px] font-black uppercase tracking-wide text-slate-300">Пул закрыт</p>
                                  <p className="mt-1 text-[12px] leading-snug text-slate-500">
                                      Новые ставки отключены до повторного открытия пула.
                                  </p>
                              </div>
                          ) : null}
                          {st.status === 'empty' && un && !isClosedNextBet ? (
                              <div className="flex min-h-0 flex-1 flex-col gap-2">
                                  {(() => {
                                      const betExpandKey = `${activePool.id}-${si}-${wi}`;
                                      const hasExtraData = !poolLegIsBlank(st.legs[1]) || !poolLegIsBlank(st.legs[2]);
                                      const userOpened = poolBetExpressOpenKeys.includes(betExpandKey);
                                      const showExtraLegs = userOpened || hasExtraData;
                                      const renderLegInputs = (li) => {
                                          const lg = st.legs[li];
                                          return (
                                              <div key={li} className="grid grid-cols-1 gap-1">

                                                      value={lg.matchName}

                                                      disabled={poolIsClosed}

                                                      placeholder="Рынок"

                                                      type="number"
                                                      step="0.01"
                                                      value={lg.odd}
                                                      onChange={(e) => poolSetLeg(si, wi, li, 'odd', e.target.value)}
                                                      disabled={poolIsClosed}
                                                      className="w-full rounded-md border border-slate-700 bg-slate-900 px-2 py-1.5 font-mono text-[14px] text-amber-200"

                                          poolUpdateActiveShell((p) => ({

                                              isClosed: !p.isClosed,

                                              onClick={() => poolUpdateActiveShell((p) => poolShellBumpedBank(p, 1))}

                                                  max={POOL_MAX_STEPS}

                                                      poolUpdateActiveShell((p) => ({ ...p, constructorSteps: poolClampSteps(e.target.value) }))

                                  <ul className="max-h-[28rem] space-y-2 overflow-y-auto pr-0.5 custom-scrollbar">

                                                          ) : null}
                                                          <span className="min-w-0 flex-1 basis-full pl-6 text-slate-200 sm:basis-auto sm:pl-0">
                                                              <span className="whitespace-normal break-words">

                                                                  <button
                                                                      type="button"
                                                                      onClick={(e) => {
                                                                          e.preventDefault();
                                                                          e.stopPropagation();
                                                                          togglePoolSnapshotInGlobal(h);

                                                                      title={inGlobalPool ? 'Убрать из общей истории' : 'Добавить в общую историю'}
                                                                      className={`inline-flex align-middle items-center justify-center rounded-md border p-0.5 transition-colors ${
                                                                          inGlobalPool
                                                                              ? 'border-emerald-500/60 bg-emerald-900/35 text-emerald-300 hover:bg-emerald-900/55'
                                                                              : 'border-slate-600 bg-slate-800/80 text-slate-500 hover:text-emerald-300 hover:border-emerald-500/45'
                                                                      }`}

                                                                      <CircleDollarSign size={14} />

                                                          </span>
                                                          <button
                                                              type="button"
                                                              onClick={(e) => {
                                                                  e.preventDefault();

                                                                      id: h.id,
                                                                      savedAt: h.savedAt,
                                                                      poolName: h.poolName || '',
                                                                  });
                                                              }}
                                                              className="ml-auto inline-flex shrink-0 items-center justify-center gap-1 rounded-md border border-red-900/50 bg-red-950/30 px-2 py-1 text-[12px] font-bold uppercase leading-none text-red-400 transition hover:border-red-700/60 hover:bg-red-950/50 hover:text-red-300"
                                                          >

                              </>
                          )}
                      </div>
                  </div>
                  </>
              );
          };

          const tierBadgeClass = (tier) =>
              tier === 'strong'
                  ? 'bg-emerald-900/70 text-emerald-200 border-emerald-600/50'
                  : tier === 'mid'
                    ? 'bg-amber-900/60 text-amber-100 border-amber-600/50'
                    : 'bg-rose-900/60 text-rose-100 border-rose-600/50';

          const tierLabelRu = (tier) => (tier === 'strong' ? 'Уверенный' : tier === 'mid' ? 'Средний' : 'Может подосрать');

          const expressBundlePassPctLabel = (bundle) => `${(((bundle && bundle.passProbability) || 0) * 100).toFixed(1)}%`;
          /**
           * Цвет карточки: голубая тема только на вкладках «Тотал» / «Crazy».
           * На «Все» тотал-комбинации окрашиваются по меткам уверенности (зелёный = все ноги «Уверенный»).
           */
          const expressBundleCardToneClasses = (bundle, listTab = 'all') => {
              const legs = bundle && bundle.legs ? bundle.legs : [];
              const innerList = 'bg-slate-900/65';
              const innerRowDefault = 'border border-slate-600/40 bg-slate-800/55';
              const innerRowBlue = 'border border-sky-700/35 bg-slate-800/50';
              const blue = {
                  card: 'border-2 border-sky-400/60 bg-sky-950/30',
                  header: 'bg-sky-950/90 border-b border-sky-800/50',
                  innerList,
                  innerRow: innerRowBlue,
                  legOdd: 'text-sky-200',
                  passBadge: 'border-sky-400/40 text-sky-100',
              };
              const yellow = {
                  card: 'border-2 border-amber-400/65 bg-amber-950/25',
                  header: 'bg-amber-950/90 border-b border-amber-800/45',
                  innerList,
                  innerRow: innerRowDefault,
                  legOdd: 'text-violet-100',
                  passBadge: 'border-cyan-400/30 text-cyan-100',
              };
              const useBlueTotals =
                  (listTab === 'totals' || listTab === 'crazy') &&
                  bundle &&
                  (bundle.expressCategory === 'totals' ||
                      bundle.expressCategory === 'crazy' ||
                      bundle.expressCategory === 'crazy12');
              if (useBlueTotals) {
                  return blue;
              }
              if (!legs.length) {
                  return {
                      card: 'border-2 border-slate-300/55 bg-slate-700/35',
                      header: 'bg-slate-950/85 border-b border-slate-600/50',
                      innerList,
                      innerRow: innerRowDefault,
                      legOdd: 'text-violet-100',
                      passBadge: 'border-cyan-400/30 text-cyan-100',
                  };
              }
              const hasWeak = legs.some((l) => l.tier === 'weak');
              const hasStrong = legs.some((l) => l.tier === 'strong');
              if (hasWeak && hasStrong) {
                  return { ...yellow };
              }
              if (hasWeak) {
                  return {
                      card: 'border-2 border-slate-500/70 bg-slate-800/55',
                      header: 'bg-slate-900 border-b border-slate-700/65',
                      innerList,
                      innerRow: innerRowDefault,
                      legOdd: 'text-violet-100',
                      passBadge: 'border-cyan-400/30 text-cyan-100',
                  };
              }
              if (legs.every((l) => l.tier === 'strong')) {
                  return {
                      card: 'border-2 border-emerald-400/65 bg-emerald-950/25',
                      header: 'bg-emerald-950/90 border-b border-emerald-800/45',
                      innerList,
                      innerRow: innerRowDefault,
                      legOdd: 'text-violet-100',
                      passBadge: 'border-cyan-400/30 text-cyan-100',
                  };
              }
              return { ...yellow };
          };
          const expressBundlesSortedByConfidence = (bundles) =>
              [...(bundles || [])].sort((a, b) => (b.passProbability || 0) - (a.passProbability || 0));

          /** Порядок на вкладке «Все»: сначала купоны, где все ноги «Уверенный», затем остальные. */
          const expressBundleAllTabSortGroup = (bundle) => {
              const legs = bundle?.legs || [];
              if (!legs.length) return 2;
              return legs.every((l) => l.tier === 'strong') ? 0 : 1;
          };

          const expressBundlesSortedForAllTab = (bundles) => {
              const base = expressBundlesSortedByConfidence(bundles);
              return [...base].sort((a, b) => {
                  const ga = expressBundleAllTabSortGroup(a);
                  const gb = expressBundleAllTabSortGroup(b);
                  if (ga !== gb) return ga - gb;
                  return (b.passProbability || 0) - (a.passProbability || 0);
              });
          };

          const expressBundleSignature = (bundle) =>
              (bundle?.legs || [])
                  .map((l) => String(l.id))
                  .sort()
                  .join('|');

          const expressBundleBalancedScore = (bundle) => {
              const p = Math.max(0, Number(bundle?.passProbability) || 0);
              const k = Math.max(1.01, Number(bundle?.totalOdd) || 1.01);
              const n = (bundle?.legs || []).length;
              const wt = bundle?.worstTier === 'weak' || bundle?.worstTier === 'mid' || bundle?.worstTier === 'strong' ? bundle.worstTier : 'mid';
              const tierPenalty = wt === 'strong' ? 0 : wt === 'mid' ? 6 : 14;
              const distance = Math.abs(Math.log(k / 2.2));
              return p * 100 - distance * 14 - Math.max(0, n - 3) * 6 - tierPenalty;
          };

          /** Полки на вкладке «Тотал»: Safe / Balanced / Aggressive. */
          const buildTotalsShelves = (totalsBundles) => {
              const seen = new Set();
              const source = expressBundlesSortedByConfidence(totalsBundles).filter((b) => {
                  const sig = expressBundleSignature(b);
                  if (!sig || seen.has(sig)) return false;
                  seen.add(sig);
                  return true;
              });
              const used = new Set();
              const takeUnique = (arr, limit) => {
                  const out = [];
                  (arr || []).forEach((b) => {
                      if (out.length >= limit) return;
                      const sig = expressBundleSignature(b);
                      if (!sig || used.has(sig)) return;
                      used.add(sig);
                      out.push(b);
                  });
                  return out;
              };

              const safeCandidates = source
                  .filter((b) => (b.legs || []).length <= 3)
                  .filter((b) => b.worstTier !== 'weak')
                  .filter((b) => (Number(b.passProbability) || 0) >= 0.18)
                  .sort((a, b) => {
                      const pa = Number(a.passProbability) || 0;
                      const pb = Number(b.passProbability) || 0;
                      if (pa !== pb) return pb - pa;
                      return (Number(b.totalOdd) || 0) - (Number(a.totalOdd) || 0);
                  });
              const safe = takeUnique(safeCandidates, 5);

              const balancedCandidates = source
                  .filter((b) => (b.legs || []).length <= 4)
                  .filter((b) => (Number(b.passProbability) || 0) >= 0.1)
                  .sort((a, b) => {
                      const sa = expressBundleBalancedScore(a);
                      const sb = expressBundleBalancedScore(b);
                      if (sa !== sb) return sb - sa;
                      return (Number(b.passProbability) || 0) - (Number(a.passProbability) || 0);
                  });
              const balanced = takeUnique(balancedCandidates, 10);

              const aggressiveCandidates = source
                  .filter((b) => (Number(b.totalOdd) || 0) >= 3.0)
                  .filter((b) => (Number(b.passProbability) || 0) >= 0.06)
                  .sort((a, b) => {
                      const ka = Number(a.totalOdd) || 0;
                      const kb = Number(b.totalOdd) || 0;
                      if (ka !== kb) return kb - ka;
                      return (Number(b.passProbability) || 0) - (Number(a.passProbability) || 0);
                  });
              const aggressive = takeUnique(aggressiveCandidates, 5);

              return { safe, balanced, aggressive };
          };

          const renderExpressTab = () => {
              const matchLabelFromSides = (home, away) => `${String(home).trim()} — ${String(away).trim()}`;
              const linePickSelected = (home, away, predictionLabel) => {
                  const matchStr = matchLabelFromSides(home, away);
                  const pred = String(predictionLabel).trim();
                  const key = expressOutcomeKey(matchStr, pred);
                  return expressPicks.some(
                      (p) =>
                          String(p.match).trim() &&
                          String(p.prediction).trim() &&
                          expressOutcomeKey(p.match, p.prediction) === key,
                  );
              };
              const togglePickFromLine = (home, away, predictionLabel, oddVal) => {
                  const matchStr = matchLabelFromSides(home, away);
                  const pred = String(predictionLabel).trim();
                  const key = expressOutcomeKey(matchStr, pred);
                  const oddStr = String(Number(oddVal).toFixed(2));
                  const idx = expressPicks.findIndex(
                      (p) =>
                          String(p.match).trim() &&
                          String(p.prediction).trim() &&
                          expressOutcomeKey(p.match, p.prediction) === key,
                  );
                  if (idx >= 0) {
                      setExpressPicks((prev) => prev.filter((_, i) => i !== idx));
                      return;
                  }
                  setExpressPicks((prev) => [
                      ...prev,
                      {
                          id: `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
                          match: matchStr,
                          prediction: expressFormatPredictionTotalDisplaySpacing(pred),
                          odd: oddStr,
                          tier: 'mid',
                      },
                  ]);
              };
              const expressLinePickSelEm =
                  'border border-emerald-100/95 ring-2 ring-inset ring-emerald-200/95 bg-emerald-400/40 text-white';
              const expressLinePickSelSk =
                  'border border-sky-100/95 ring-2 ring-inset ring-sky-200/95 bg-sky-400/40 text-white';
              const expressLinePickSelNeu =
                  'border border-slate-100/90 ring-2 ring-inset ring-slate-200/95 bg-slate-500/45 text-white';
              const expressLinePickSelDraw =
                  'border border-amber-100/90 ring-2 ring-inset ring-amber-200/95 bg-amber-400/38 text-white';
              const expressLinePickSelDc =
                  'border border-orange-100/95 ring-2 ring-inset ring-orange-200/95 bg-orange-400/40 text-white';
              /** Колонка стрелок ±: idle и selected состояния */
              const expressLineOddsStepStrip = 'border-l border-slate-600/80 bg-slate-900/85';
              const expressLineOddsStepSelEm = 'border-l border-emerald-200/45 bg-emerald-950/15';
              const expressLineOddsStepSelSk = 'border-l border-sky-200/45 bg-sky-950/15';
              const expressLineOddsStepSelNeu = 'border-l border-slate-200/45 bg-slate-100/10';
              const expressLineOddsStepSelDraw = 'border-l border-amber-200/45 bg-amber-950/15';
              const expressLineOddsStepSelDc = 'border-l border-orange-200/45 bg-orange-950/15';
              const expressLineExtraIdleWrapDc = 'border border-orange-700/55 bg-orange-950/42';
              const expressLineExtraIdleWrapTot = 'border border-sky-700/55 bg-sky-950/38';
              const expressLineExtraIdleBtnDc =
                  'border-0 bg-orange-950/30 text-orange-100 transition hover:bg-orange-900/50';
              const expressLineExtraIdleBtnTot =
                  'border-0 bg-sky-950/30 text-sky-100 transition hover:bg-sky-900/50';
              const toggleExpressLineLeague = (leagueId) => {

              const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
              const toOdd2 = (v) => Number((Math.round(v * 100) / 100).toFixed(2));
              const deriveExpressLineMarkets = (odds) => {
                  const w1 = Math.max(1.01, Number(odds?.w1) || 1.01);

                  const w2 = Math.max(1.01, Number(odds?.w2) || 1.01);
                  const i1 = 1 / w1;

                  const p1 = i1 / margin;
                  const px = ix / margin;
                  const p2 = i2 / margin;
                  const p1x = clamp(p1 + px, 0.05, 0.95);

                  const pOver25 = clamp(0.48 + (0.3 - px) * 0.7, 0.35, 0.7);

              const expressLineSyncTb25Tb15FromTb25 = (oddTb25Str) => {

                  return {

              const expressLineSyncTb25Tb15FromTb15 = (oddTb15Str) => {
                  const o = clamp(parseFloat(String(oddTb15Str).replace(',', '.')), 1.01, 99);
                  const p15Raw = 1 / o;
                  let px = 0.3 - (p15Raw - 0.74) / 0.35;
                  px = clamp(px, 0.05, 0.95);
                  const p25f = clamp(0.48 + (0.3 - px) * 0.7, 0.35, 0.7);
                  const p15f = clamp(0.74 + (0.3 - px) * 0.35, 0.6, 0.9);
                  return {

              const expressLineApplyPickOddIfAny = (home, away, predictionLabel, oddStr) => {

              const getExpressLineMainOdd = (matchKey, field, baseOdds) => {

                  setExpressLineMarketsByMatch((prev) => {
