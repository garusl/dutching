                  const O = templateOdd > 1 ? templateOdd : 1.01;
                  const nextStake = chaserStakeFromParams(T, A, totalChaseLosses, O);
                  newSteps.push({ id: Date.now(), stake: nextStake, odd: O, result: 'PENDING' });
              } else if (result === 'WON') {
                  const winAmount = newSteps[index].stake * newSteps[index].odd;
                  const stakesSum = newSteps.slice(0, index + 1).reduce((sum, s) => sum + (Number(s.stake) || 0), 0);
                  const netProfit = winAmount - stakesSum;
                  newSteps.push({ id: Date.now(), isDone: true, netProfit });
              }
              setChaserSteps(newSteps);
          };

          /** Пересчёт текущей открытой ноги при смене цели / «уже поставлено» / шаблонного кэфа (кэф шага правится в строке). */
          useEffect(() => {
              setChaserSteps((prev) => recalcChaserPendingFromInputs(prev, chaserTarget, chaserAlreadyStaked, chaserInputOdd));
          }, [chaserTarget, chaserAlreadyStaked, chaserInputOdd]);

          const chaserPreview = useMemo(() => {
              const T = chaserParseMoney(chaserTarget);
              const A = chaserParseMoney(chaserAlreadyStaked);
              const W = chaserParseMoney(chaserPossibleWin);
              const pending = chaserSteps.find((s) => s.result === 'PENDING');
              const O =
                  pending && Number(pending.odd) > 1
                      ? Number(pending.odd)
                      : chaserParseMoney(chaserInputOdd);
              if (O <= 1) return { targetStake: null, equalStake: null, netIfChaseWin: null };
              const lostSum = chaserSteps.filter((s) => s.result === 'LOST').reduce((s, st) => s + (Number(st.stake) || 0), 0);
              const ts = chaserStakeFromParams(chaserTarget, chaserAlreadyStaked, lostSum, O);
              const targetStake = Number.isFinite(ts) && ts > 0 ? ts : null;
              let equalStake = null;
              if (W + A > 0) {
                  const eq = (W + A) / O;
                  if (Number.isFinite(eq) && eq > 0) equalStake = eq;
              }
              const netIfChaseWin =
                  targetStake != null ? targetStake * (O - 1) - A - lostSum : null;
              return { targetStake, equalStake, netIfChaseWin: Number.isFinite(netIfChaseWin) ? netIfChaseWin : null };
          }, [chaserTarget, chaserAlreadyStaked, chaserPossibleWin, chaserInputOdd, chaserSteps]);

          // --- ЛОГИКА ВКЛАДОК ДАТЧИНГА ---
          const getActiveMatches = (tab) => {
              if (tab === 'classic') return classicMatches.slice(0, classicCount);
              if (tab === 'totals') return totalsMatches.slice(0, customTotalsCount);
              return [];
          };

          /** Распределение банка по экспрессам — та же формула, что в «Экспрессы / Тоталы». */
          const allocateDutchingExpressStakesFromRaw = (expressesRaw, totalBank, minBet) => {
              const raw = expressesRaw.map((e) => ({ ...e }));
              let actualBank = 0;
              let mainTotalPayouts = 0;
              let mainCount = 0;
              let insureCostExact = 0;
              let mainProbSum = 0;

              raw.forEach((exp) => {
                  if (exp.mode === 'INSURE') {
                      const actualBet = Math.max(Math.ceil((totalBank / exp.totalOdd) * 20) / 20, minBet);
                      exp.betAmount = actualBet;
                      insureCostExact += actualBet;
                  } else if (exp.mode === 'MAIN') mainProbSum += 1 / exp.totalOdd;
              });
              const isBankrupt = insureCostExact >= totalBank && mainProbSum > 0;
              const availableMainBank = Math.max(0, totalBank - insureCostExact);
              const targetMainPayout = mainProbSum > 0 ? availableMainBank / mainProbSum : 0;

              const expresses = raw.map((exp) => {
                  let betAmount = 0;
                  if (exp.mode === 'INSURE') betAmount = exp.betAmount;
                  else if (exp.mode === 'MAIN') betAmount = Math.max(Math.round((targetMainPayout / exp.totalOdd) * 20) / 20, minBet);
                  actualBank += betAmount;
                  if (exp.mode === 'MAIN' && betAmount > 0) {
                      mainTotalPayouts += betAmount * exp.totalOdd;
                      mainCount++;
                  }
                  return { ...exp, betAmount, payout: betAmount * exp.totalOdd };
              });
              if (isBankrupt) {
                  return { expresses, summary: { actualBank, avgMainPayout: 0, netProfit: 0, roi: 0, isBankrupt: true, strategyName: '' } };
              }
              const avgMainPayout = mainCount > 0 ? mainTotalPayouts / mainCount : 0;
              const netProfit = avgMainPayout > 0 ? avgMainPayout - actualBank : 0;
              return {
                  expresses,
                  summary: {
                      actualBank,
                      avgMainPayout,
                      netProfit,
                      roi: actualBank > 0 ? (netProfit / actualBank) * 100 : 0,
                      isBankrupt: false,
                      strategyName: '',
                  },
              };
          };

          // --- РАСЧЕТ РЕЗУЛЬТАТОВ (Экспрессы и Тоталы) ---
          const getResults = () => {
            if (!calcTab || calcTab === 'chaser' || calcTab === 'pool' || calcTab === 'express') return { expresses: [], summary: null };
            const totalBank = parseFloat(bank); const minBet = parseFloat(minimumBet) || 0;
            if (totalBank <= 0) return { expresses: [], summary: null };

            const currentMatches = getActiveMatches(calcTab);
            const currentModesState = calcTab === 'classic' ? classicModes : totalsModes;

            const activePaths = currentMatches.map((m, mIdx) => m.outcomes.map((o, oIdx) => ({ ...o, matchName: m.name, matchIdx: mIdx, outcomeIdx: oIdx })).filter(o => o.active));
            if (activePaths.some(p => p.length === 0)) return { expresses: [], summary: null, error: "Выберите хотя бы один исход в каждом матче." };
            let combos = [[]];
            for (const path of activePaths) { const newCombos = []; for (const combo of combos) { for (const outcome of path) newCombos.push([...combo, outcome]); } combos = newCombos; }
            const expressesRaw = combos.map((parts, index) => {
                const totalOdd = parts.reduce((acc, part) => acc * parseFloat(part.odd || 1), 1);
                const hash = parts.map(p => `${p.matchIdx}-${p.outcomeIdx}`).join('|');
                const defaultMode = 'MAIN';
                return { id: index + 1, hash, parts, totalOdd, mode: currentModesState[hash] || defaultMode };
            });

            const { expresses, summary: sumBase } = allocateDutchingExpressStakesFromRaw(expressesRaw, totalBank, minBet);
            if (sumBase.isBankrupt) return { expresses, summary: sumBase };

            const stratName = calcTab === 'classic' ? `Экспрессы (${classicCount})` : `Тоталы (${customTotalsCount})`;
            return { expresses, summary: { ...sumBase, strategyName: stratName } };
          };

          const results = useMemo(getResults, [classicMatches, totalsMatches, classicCount, customTotalsCount, bank, minimumBet, classicModes, totalsModes, calcTab, activeTab]);

          const historySaveKey = () => {
              if (activeTab === 'classic' || activeTab === 'totals') return activeTab;
              return null;
          };

          const saveToHistory = () => {
            const key = historySaveKey();
            if (!key || !results || !results.summary) return;
            const expressesSnapshot = (results.expresses || []).map((exp) => ({
                id: exp.id,
                hash: exp.hash,
                mode: exp.mode,
                totalOdd: exp.totalOdd,
                betAmount: exp.betAmount,
                payout: exp.payout,
                parts: (exp.parts || []).map((p, i) => ({
                    matchName: p.matchName,
                    label: p.label,
                    odd: typeof p.odd === 'number' ? p.odd : parseFloat(p.odd) || 0,
                    matchIdx: p.matchIdx,
                    outcomeIdx: p.outcomeIdx,
                    active: p.active !== false,
                })),
            }));
            const row = {
                id: Date.now(),
                date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
                strategy: results.summary.strategyName,
                matches: getActiveMatches(calcTab).map((m) => m.name).join(' | '),
                gameBank: results.summary.actualBank,
                netProfit: results.summary.netProfit,
                status: 'PENDING',
                expresses: expressesSnapshot,
                expressResults: {},
            };
            setHistoryByTab((prev) => ({ ...prev, [key]: [row, ...prev[key]] }));
          };

          /** Сохранить в историю «Линия» только содержимое текущей вкладки (Все / Тотал / Ординар / Crazy). */
          const saveExpressBundlesToHistory = () => {
              const tab = ['all', 'totals', 'crazy', 'ordinary'].includes(expressBundlesPage) ? expressBundlesPage : 'all';
              const mainOnly = expressBundles.filter(
                  (b) => b.expressCategory !== 'totals' && b.expressCategory !== 'ordinary',
              );
              const totalsOnly = expressBundles.filter((b) => b.expressCategory === 'totals');
              const ordinaryOnly = expressBundles.filter((b) => b.expressCategory === 'ordinary');
              const crazyMaxTotalsBundle =
                  totalsOnly.length === 0
                      ? null
                      : totalsOnly.reduce((a, b) =>
                            (Number(b.totalOdd) || 0) > (Number(a.totalOdd) || 0) ? b : a,
                        );
              const crazyTotalsRow = crazyMaxTotalsBundle
                  ? [
                        {
                            ...crazyMaxTotalsBundle,
                            id: `${String(crazyMaxTotalsBundle.id)}-crazy-totals`,
                            expressCategory: 'crazy',
                        },
                    ]
                  : [];
              const crazyW12 = buildExpressCrazyWin12Ladder(expressPicks);
              const crazySignatures = new Set(
                  [...crazyTotalsRow, ...crazyW12]
                      .map((b) => expressBundleSignature(b))
                      .filter((sig) => sig && String(sig).trim().length > 0),
              );
              const totalsOnlyWithoutCrazy = totalsOnly.filter((b) => {
                  const sig = expressBundleSignature(b);
                  if (!sig) return true;
                  return !crazySignatures.has(sig);
              });

              let bundlesToSave = [];
              if (tab === 'all') {
                  bundlesToSave = expressBundlesSortedForAllTab(mainOnly);
              } else if (tab === 'totals') {
                  bundlesToSave = expressBundlesSortedByConfidence(totalsOnlyWithoutCrazy);
              } else if (tab === 'ordinary') {
                  bundlesToSave = expressBundlesSortedByConfidence(ordinaryOnly);
              } else if (tab === 'crazy') {
                  bundlesToSave = [...crazyTotalsRow, ...crazyW12];
              }

              if (!bundlesToSave.length) {
                  setExpressGenMessage(
                      tab === 'crazy'
                          ? 'Нет вариантов на вкладке Crazy для сохранения в историю.'
                          : !expressBundles.length
                            ? 'Сначала нажмите «Сгенерировать экспрессы».'
                            : 'На этой вкладке нет купонов для сохранения в историю.',
                  );
                  return;
              }

              const orderedBundles = bundlesToSave;
              const matchNames = new Set();
              orderedBundles.forEach((bb) => (bb.legs || []).forEach((lg) => matchNames.add(String(lg.match || '').trim())));
              const matchesStr = [...matchNames].filter(Boolean).join(' | ') || '—';
              const tabLabel =
                  tab === 'all' ? 'Все' : tab === 'totals' ? 'Тотал' : tab === 'ordinary' ? 'Ординар' : 'Crazy';
              const strategyLabel = `Линия · ${tabLabel} (${orderedBundles.length})`;
              const expressesSnapshot = orderedBundles.map((b, bi) => {
                  const legs = b.legs || [];
                  const parts = legs.map((leg, i) => ({
                      matchName: String(leg.match || '').trim(),
                      label: String(leg.prediction || '').trim(),
                      odd: Number(leg.odd) || 1.01,
                      matchIdx: i,
                      outcomeIdx: 0,
                      active: true,
                  }));
                  const totalOdd = Number(b.totalOdd) || parts.reduce((acc, p) => acc * p.odd, 1);
                  const hash = `${String(b.id)}-${bi}|${parts.map((p) => `${p.matchIdx}-${p.outcomeIdx}`).join('|')}`;
                  const wt = b.worstTier === 'strong' || b.worstTier === 'mid' || b.worstTier === 'weak' ? b.worstTier : 'mid';
                  return {
                      id: bi + 1,
                      hash,
                      mode: 'MAIN',
                      totalOdd,
                      betAmount: 0,
                      payout: 0,
                      worstTier: wt,
                      parts,
                  };
              });
              const row = {
                  id: Date.now(),
                  date: new Date().toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }),
                  strategy: strategyLabel,
                  matches: matchesStr,
                  gameBank: 0,
                  netProfit: 0,
                  status: 'PENDING',
                  expresses: expressesSnapshot,
                  expressResults: {},
                  expressLocalOnly: true,
              };
              setHistoryByTab((prev) => ({ ...prev, express: [row, ...(prev.express || [])] }));
              setExpressGenMessage(`В историю добавлена серия из ${orderedBundles.length} экспресс(ов) · ${tabLabel}.`);
          };

          const setHistoryExpressResult = (tabKey, itemId, expressId, value) => {
              setHistoryByTab((prev) => ({
                  ...prev,
                  [tabKey]: (prev[tabKey] || []).map((item) => {
                      if (item.id !== itemId || item.status !== 'PENDING') return item;
                      if (item.expressLocalOnly) {
                          const er = { ...(item.expressResults || {}) };
                          if (value === 'clear' || value === '' || value == null) {
                              delete er[expressId];
                          } else if (value === 'WIN') {
                              er[expressId] = 'WIN';
                          } else {
                              er[expressId] = value;
                          }
                          return { ...item, expressResults: er };
                      }
                      const er = { ...(item.expressResults || {}) };
                      if (value === 'clear' || value === '' || value == null) {
                          const wasWin = er[expressId] === 'WIN';
                          delete er[expressId];
                          if (wasWin) {
                              (item.expresses || []).forEach((exp) => {
                                  if (exp.mode === 'SKIP' || String(exp.id) === String(expressId)) return;
                                  if (er[exp.id] === 'LOSE') delete er[exp.id];
                              });
                          }
                      } else if (value === 'WIN') {
                          (item.expresses || []).forEach((exp) => {
                              if (exp.mode === 'SKIP' || String(exp.id) === String(expressId)) return;
                              er[exp.id] = 'LOSE';
                          });
                          er[expressId] = 'WIN';
                      } else {
                          er[expressId] = value;
                      }
                      const updated = { ...item, expressResults: er };
                      const preview = computeHistoryCouponPreview(updated);
                      if (preview && preview.suggested) {
                          const outcome = preview.suggested;
                          if (outcome === 'WON_MAIN' || outcome === 'WON_INSURE') {
                              const add = historyRealizedProfitForStats({ ...updated, status: outcome });
                              setMainBank((mb) => ((parseFloat(mb) || 0) + add).toFixed(2));
                          } else if (outcome === 'LOST') {
                              const sub = Number(item.gameBank) || 0;
                              setMainBank((mb) => ((parseFloat(mb) || 0) - sub).toFixed(2));
                          }
                          return { ...updated, status: outcome };
                      }
                      return updated;
                  }),
              }));
          };

          const toggleHistoryRowExpand = (tabKey, itemId) => {
              const k = getHistoryExpandKey(tabKey, itemId);
              setExpandedHistoryIds((p) => ({ ...p, [k]: !p[k] }));
          };

          const resolveHistoryItem = (tabKey, id, outcome) => {
            setHistoryByTab((prev) => ({
                ...prev,
                [tabKey]: (prev[tabKey] || []).map((item) => {
                    if (item.id === id && item.status === 'PENDING') {
                        if (item.expressLocalOnly) return item;
                        const nextEr =
                            item.expresses && item.expresses.length
                                ? buildExpressResultsForHistoryRowResolve(item, outcome)
                                : item.expressResults || {};
                        const updated = { ...item, status: outcome, expressResults: nextEr };
                        const pl = historyRealizedProfitForStats(updated);
                        setMainBank((parseFloat(mainBank) + pl).toFixed(2));
                        return updated;
                    } return item;
                }),
            }));
          };

          /** Вернуть закрытую строку в расчёт: откат движения по банку (как при resolve). */
          const reopenHistoryItemForEdit = (tabKey, id) => {
              const sid = String(id);
              const list = historyByTabRef.current[tabKey] || [];
              const hit = list.find((it) => String(it.id) === sid);
              if (!hit || hit.status === 'PENDING') return;
              if (!hit.expressLocalOnly) {
                  const bankDelta = -historyRealizedProfitForStats(hit);
                  setMainBank((mb) => ((parseFloat(mb) || 0) + bankDelta).toFixed(2));
              }
              setHistoryByTab((p) => ({
                  ...p,
                  [tabKey]: (p[tabKey] || []).map((it) => (String(it.id) === sid ? { ...it, status: 'PENDING' } : it)),
              }));
          };

          /** Открыть модалку удаления (данные снимаем с строки — не зависим от ref). */
          const openHistoryDeletePrompt = (tabKey, item, opts = {}) => {
              const idStr = item && item.id != null && item.id !== '' ? String(item.id) : '';
              setHistoryDeletePrompt({
                  tabKey,
                  id: idStr,
                  fromGlobal: !!opts.fromGlobal,
                  label:
                      tabKey === 'pool'
                          ? `Пул лесенок · ${(item && item.savedAt) || ''}`
                          : `${(item && item.strategy) || 'Серия'} · ${(item && item.date) || ''}`,
                  fallback:
                      idStr === ''
                          ? {
                                date: item.date,
                                strategy: item.strategy,
                                matches: item.matches,
                                gameBank: Number(item.gameBank) || 0,
                            }
                          : null,
              });
          };

          /** Подтверждённое удаление: синхронно по ref (без побочных эффектов внутри updater — Strict Mode). */
          const commitHistoryDelete = () => {
              const p = historyDeletePrompt;
              if (!p) return;
              const rid = p.id && String(p.id) !== '' ? String(p.id) : null;
              const tabKey = p.tabKey;
              if (p.fromGlobal && rid && tabKey) {
                  const list = globalHistoryRef.current || [];
                  const hit = list.find((it) => String(it.id) === rid && it.sourceTab === tabKey);
                  if (!hit) {
                      setHistoryDeletePrompt(null);
                      return;
                  }
                  const bankDelta = hit.sourceTab === 'pool' ? 0 : -historyRealizedProfitForStats(hit);
                  if (bankDelta !== 0) setMainBank((mb) => ((parseFloat(mb) || 0) + bankDelta).toFixed(2));
                  setGlobalHistory((prev) =>
                      (prev || []).filter((it) => !(String(it.id) === rid && it.sourceTab === tabKey)),
                  );
                  setExpandedHistoryIds((ex) => {
                      const n = { ...ex };
                      delete n[getHistoryExpandKey(tabKey, rid)];
                      return n;
                  });
                  setHistoryDeletePrompt(null);
                  return;
              }
              const prev = historyByTabRef.current;

              let hit = null;
              if (rid) {
                  for (const k of HISTORY_TAB_KEYS) {
                      hit = (prev[k] || []).find((it) => String(it.id) === rid);
                      if (hit) break;
                  }
              } else if (tabKey && p.fallback) {
                  const f = p.fallback;
                  hit =
                      (prev[tabKey] || []).find(
                          (it) =>
                              it.date === f.date &&
                              it.strategy === f.strategy &&
                              it.matches === f.matches &&
                              (Number(it.gameBank) || 0) === (Number(f.gameBank) || 0),
                      ) || null;
              }
              if (!hit) {
                  setHistoryDeletePrompt(null);
                  return;
              }

              const bankDelta = -historyRealizedProfitForStats(hit);
              if (bankDelta !== 0) setMainBank((mb) => ((parseFloat(mb) || 0) + bankDelta).toFixed(2));

              const next = { ...prev };
              if (rid) {
                  HISTORY_TAB_KEYS.forEach((k) => {
                      next[k] = (prev[k] || []).filter((it) => String(it.id) !== rid);
                  });
              } else if (tabKey) {
                  next[tabKey] = (prev[tabKey] || []).filter((it) => it !== hit);
              }
              setHistoryByTab(next);
              try {
                  localStorage.setItem('dutchingHistoryByTab', JSON.stringify(next));
              } catch (e) {
                  /* ignore */
              }
              setExpandedHistoryIds((ex) => {
                  const n = { ...ex };
                  if (rid) {
                      HISTORY_TAB_KEYS.forEach((k) => {
                          delete n[getHistoryExpandKey(k, rid)];
                      });
                  } else if (tabKey) {
                      Object.keys(n).forEach((key) => {
                          if (key.startsWith(`${tabKey}::`)) delete n[key];
                      });
                  }
                  return n;
              });
              setHistoryDeletePrompt(null);
          };

          const commitHistoryMassClear = () => {
              const p = historyMassClearPrompt;
              if (!p) return;
              if (p.scope === 'global') {
                  const rows = globalHistoryRef.current || [];
                  setExpandedHistoryIds((ex) => {
                      const n = { ...ex };
                      rows.forEach((row) => {
                          if (row && row.sourceTab && row.id != null) delete n[getHistoryExpandKey(row.sourceTab, row.id)];
                      });
                      return n;
                  });
                  setGlobalHistory([]);
                  setHistoryRowDeleteModeByPanel((prev) => ({ ...prev, global: false }));
                  setHistoryMassClearPrompt(null);
                  return;
              }
              const prev = historyByTabRef.current;
              let next;
              if (p.scope === 'section' && p.tabKey) {
                  next = { ...prev, [p.tabKey]: [] };
              } else {
                  setHistoryMassClearPrompt(null);
                  return;
              }
              setHistoryByTab(next);
              try {
                  localStorage.setItem('dutchingHistoryByTab', JSON.stringify(next));
              } catch (e) {
                  /* ignore */
              }
              setExpandedHistoryIds((ex) => {
                  const n = { ...ex };
                  Object.keys(n).forEach((key) => {
                      if (key.startsWith(`${p.tabKey}::`)) delete n[key];
                  });
                  return n;
              });
              setHistoryRowDeleteModeByPanel((prev) => ({ ...prev, [p.tabKey]: false }));
              setHistoryMassClearPrompt(null);
          };
          const toggleHistoryItemInGlobal = (tabKey, item) => {
              if (!item || (tabKey !== 'classic' && tabKey !== 'totals')) return;
              const sid = String(item.id);
              let added = false;
              setGlobalHistory((prev) => {
                  const exists = prev.some((x) => x.sourceTab === tabKey && String(x.id) === sid);
                  if (exists) return prev.filter((x) => !(x.sourceTab === tabKey && String(x.id) === sid));
                  added = true;
                  return [{ ...item, sourceTab: tabKey }, ...prev];
              });
              if (added) setActiveTab('home');
          };
          const togglePoolSnapshotInGlobal = (snapshot) => {
              if (!snapshot || snapshot.id == null) return;
              const sid = String(snapshot.id);
              let added = false;
              setGlobalHistory((prev) => {
                  const exists = prev.some((x) => x.sourceTab === 'pool' && String(x.id) === sid);
                  if (exists) return prev.filter((x) => !(x.sourceTab === 'pool' && String(x.id) === sid));
                  added = true;
                  return [{ ...snapshot, sourceTab: 'pool' }, ...prev];
              });
              if (added) setActiveTab('home');
          };

          const globalStats = useMemo(() => {
            const all = globalHistory || [];
            return { ...computeHistoryStats(all), total: all.length };
          }, [globalHistory]);

          /** Закрытые исходы по всей истории + сумма «в работе» на ожидающих (gameBank). */
          const globalHistoryOutcomes = useMemo(() => {
              const all = globalHistory || [];
              let wins = 0;
              let returns = 0;
              let losses = 0;
              let pending = 0;
              let pendingHeld = 0;
              all.forEach((item) => {
                  if (item.sourceTab === 'pool') {
                      if (item.goalMet) wins++;
                      else losses++;
                      return;
                  }
                  if (item.status === 'WON_MAIN') wins++;
                  else if (item.status === 'WON_INSURE') returns++;
                  else if (item.status === 'LOST') losses++;
                  else if (item.status === 'PENDING') {
                      pending++;
                      pendingHeld += Number(item.gameBank) || 0;
                  }
              });
              const wl = wins + losses;
              const winRateWL = wl > 0 ? (wins / wl) * 100 : null;
              const resolvedClosed = wins + returns + losses;
              return { wins, returns, losses, pending, pendingHeld, wl, winRateWL, resolvedClosed };
          }, [globalHistory]);

          /**
           * Если в общей истории есть «Пул» (карточка на Главной), P&L закрытых снимков пула
           * (insideSnapshot − initialPoolBank) входит в «доступный банк» вместе с main − удержания ожидающих.
           */
          const poolHomeBankAdjust = useMemo(() => {
              const gh = globalHistory || [];
              if (!gh.some((row) => row && row.sourceTab === 'pool')) return 0;
              return poolMoney2(
                  gh
                      .filter((item) => item && item.sourceTab === 'pool' && item.insideSnapshot != null)
                      .reduce(
                          (acc, item) =>
                              poolMoney2(
                                  acc +
                                      poolMoney2(
                                          poolMoney2(Number(item.insideSnapshot) || 0) -
                                              poolMoney2(Number(item.initialPoolBank) || 0),
                                      ),
                              ),
                          0,
                      ),
              );
          }, [globalHistory]);

          const sectionHistoryOutcomes = (items) => {
              const list = items || [];
              let wins = 0;
              let returns = 0;
              let losses = 0;
              let pending = 0;
              list.forEach((item) => {
                  if (item.sourceTab === 'pool') {
                      if (item.goalMet) wins++;
                      else losses++;
                      return;
                  }
                  if (item.status === 'WON_MAIN') wins++;
                  else if (item.status === 'WON_INSURE') returns++;
                  else if (item.status === 'LOST') losses++;
                  else if (item.status === 'PENDING') pending++;
              });
              const wl = wins + losses;
              const winRateWL = wl > 0 ? (wins / wl) * 100 : null;
              return { wins, returns, losses, pending, winRateWL };
          };

          /** Статистика по экспрессам конструктора (без банка): только разметка WIN/LOSE/RETURN по каждому купону. */
          const computeExpressConstructorHistoryStats = (items) => {
              const tierKeys = ['strong', 'mid', 'weak'];
              const tier = Object.fromEntries(tierKeys.map((t) => [t, { w: 0, l: 0, r: 0, p: 0 }]));
              let wins = 0;
              let losses = 0;
              let returns = 0;
              let pending = 0;
              (items || []).forEach((item) => {
                  if (!item.expressLocalOnly) return;
                  const er = item.expressResults || {};
                  (item.expresses || []).forEach((exp) => {
                      if (exp.mode === 'SKIP') return;
                      const v = er[exp.id];
                      const wt = tierKeys.includes(exp.worstTier) ? exp.worstTier : 'mid';
                      if (v === 'WIN') {
                          wins++;
                          tier[wt].w++;
                      } else if (v === 'LOSE') {
                          losses++;
                          tier[wt].l++;
                      } else if (v === 'RETURN') {
                          returns++;
                          tier[wt].r++;
                      } else {
                          pending++;
                          tier[wt].p++;
                      }
                  });
              });
              const wl = wins + losses;
              const winRateWL = wl > 0 ? (wins / wl) * 100 : null;
              return { wins, losses, returns, pending, tier, winRateWL };
          };

          const SECTION_META = {
              classic: { title: 'Экспрессы', desc: 'Датчинг по исходам (W / X / W2)', grad: 'from-emerald-600 to-teal-700', ring: 'ring-emerald-500/30', border: 'border-emerald-600/40' },
              totals: { title: 'Тоталы', desc: 'ТБ / ТМ матрицы', grad: 'from-blue-600 to-cyan-700', ring: 'ring-blue-500/30', border: 'border-blue-600/40' },
              pool: { title: 'Пул', desc: 'Пул лесенок', grad: 'from-teal-600 to-cyan-700', ring: 'ring-teal-500/30', border: 'border-teal-600/40' },
              express: { title: 'Линия', desc: 'Линия дня и варианты купонов', grad: 'from-fuchsia-600 to-rose-600', ring: 'ring-fuchsia-500/30', border: 'border-fuchsia-600/40' },
          };

          const renderLineStrategyPickFeedRow = (p) => {
              const stratName =
                  (lineStrategiesData.strategies || []).find((ss) => String(ss.id) === String(p.strategyId))?.name || '—';
              const statusShort =
                  p.status === 'PENDING'
                      ? 'Ожидает'
                      : p.status === 'WON'
                        ? 'Вин'
                        : p.status === 'LOST'
                          ? 'Слив'
                          : p.status === 'RETURN'
                            ? 'Возвр.'
                            : String(p.status || '');
              const settledRowClass =
                  p.status === 'WON'
                      ? 'bg-emerald-950/70 ring-1 ring-inset ring-emerald-600/30'
                      : p.status === 'LOST'
                        ? 'bg-red-950/65 ring-1 ring-inset ring-red-600/30'
                        : p.status === 'RETURN'
                          ? 'bg-slate-700/35 ring-1 ring-inset ring-slate-500/35'
                          : '';
              return (
                  <li key={`line-lenta-${p.id}`} className={`px-3 py-2.5 text-sm rounded-sm ${settledRowClass}`.trim()}>
                      <div className="mb-2 flex flex-wrap items-center gap-1.5">
                          <span
                              className="max-w-[min(100%,14rem)] truncate rounded border border-violet-500/45 bg-violet-950/40 px-1.5 py-0.5 text-[10px] font-black uppercase tracking-wide text-violet-100/95"
                              title={stratName}
                          >
                              {stratName}
                          </span>
                          <span
                              className={`rounded px-1.5 py-0.5 text-[10px] font-bold uppercase ${
                                  p.status === 'PENDING'
                                      ? 'border border-amber-700/40 bg-amber-950/35 text-amber-200'
                                      : 'border border-slate-600/60 bg-slate-800/60 text-slate-300'
                              }`}
                          >
                              {statusShort}
                          </span>
                      </div>
                      <div className="flex flex-wrap items-start justify-between gap-1.5">
                          <span className="text-slate-500 font-mono text-xs sm:text-sm min-w-0 break-all sm:break-normal">{p.savedAt}</span>
                          <div className="flex shrink-0 items-center gap-1">
                              <span className="font-mono font-bold text-slate-200 text-right">
                                  {formatUSD(p.stake, 2)} · @{Number(p.bundle.totalOdd).toFixed(2)}
                              </span>
                              {p.status !== 'PENDING' ? (
                                  <>
                                      <button
                                          type="button"
                                          title="Изменить результат"
                                          onClick={() =>
                                              setLineStrategyPickEditId((id) => (id != null && String(id) === String(p.id) ? null : p.id))
                                          }
                                          className={`inline-flex items-center justify-center rounded border p-1 transition-colors ${
                                              lineStrategyPickEditId != null && String(lineStrategyPickEditId) === String(p.id)
                                                  ? 'border-amber-500/60 bg-amber-950/40 text-amber-200'
                                                  : 'border-slate-600 bg-slate-800/80 text-slate-400 hover:border-amber-600/50 hover:text-amber-200'
                                          }`}
                                      >
                                          <HistoryEditPencil size={13} className="pointer-events-none" />
                                      </button>
                                      <button
                                          type="button"
                                          title="Удалить прогноз"
                                          onClick={() => setLineStrategyPickDeletePrompt({ pickId: p.id })}
                                          className="inline-flex items-center justify-center rounded border border-slate-600 bg-slate-800/80 p-1 text-slate-400 transition-colors hover:border-red-700/50 hover:text-red-400"
                                      >
                                          <Trash2 size={13} className="pointer-events-none opacity-90" aria-hidden />
                                      </button>
                                  </>
                              ) : null}
                          </div>
                      </div>
                      <div
                          className="mt-1 text-xs leading-relaxed text-slate-400"
                          title={(p.bundle.legs || []).map((l) => `${l.match}: ${l.prediction}`).join(' · ')}
                      >
                          <ul className="list-none space-y-1 break-words">
                              {(p.bundle.legs || []).map((l, li) => (
                                  <li key={li} className="border-b border-slate-700/40 pb-1 last:border-b-0 last:pb-0">
                                      <span className="font-semibold text-slate-300">{l.match}</span>
                                      <span className="text-slate-600">: </span>
                                      <span>{expressFormatPredictionTotalDisplaySpacing(l.prediction)}</span>
                                      <span className="ml-1 font-mono text-slate-500">@{Number(l.odd).toFixed(2)}</span>
                                  </li>
                              ))}
                          </ul>
                      </div>
                      {p.status === 'PENDING' ? (
                          <div className="mt-1.5 flex flex-wrap gap-1">
                              <button
                                  type="button"
                                  onClick={() => settleLineStrategyPick(p.id, 'WIN')}
                                  className="inline-flex items-center gap-0.5 rounded border border-emerald-700/50 bg-emerald-950/40 px-1.5 py-0.5 text-xs font-bold text-emerald-300"
                              >
                                  <CheckCircle size={12} /> Вин
                              </button>
                              <button
                                  type="button"
                                  onClick={() => settleLineStrategyPick(p.id, 'RETURN')}
                                  className="inline-flex items-center gap-0.5 rounded border border-slate-600 bg-slate-800 px-1.5 py-0.5 text-xs font-bold text-slate-300"
                              >
                                  <ShieldAlert size={12} /> Возвр.
                              </button>
                              <button
                                  type="button"
                                  onClick={() => settleLineStrategyPick(p.id, 'LOST')}
                                  className="inline-flex items-center gap-0.5 rounded border border-red-800/50 bg-red-950/35 px-1.5 py-0.5 text-xs font-bold text-red-300"
                              >
                                  <XCircle size={12} /> Слив
                              </button>
                              <button
                                  type="button"
                                  title="Удалить прогноз из стратегии"
                                  aria-label="Удалить прогноз из стратегии"
                                  onClick={() => setLineStrategyPickDeletePrompt({ pickId: p.id })}
                                  className="ml-auto inline-flex items-center justify-center rounded border border-red-800/50 bg-red-950/35 p-1.5 text-red-300/95 transition hover:border-red-600/60 hover:bg-red-950/55 hover:text-red-100"
                              >
                                  <Trash2 size={14} className="pointer-events-none shrink-0 opacity-95" aria-hidden />
                              </button>
                          </div>
                      ) : lineStrategyPickEditId != null && String(lineStrategyPickEditId) === String(p.id) ? (
                          <div className="mt-1.5 flex flex-wrap gap-1">
                              <button
                                  type="button"
                                  onClick={() => changeLineStrategyPickOutcome(p.id, 'WIN')}
                                  className={`inline-flex items-center gap-0.5 rounded border px-1.5 py-0.5 text-xs font-bold ${
                                      p.status === 'WON'
                                          ? 'border-emerald-400/70 bg-emerald-900/50 text-emerald-200'
                                          : 'border-emerald-700/50 bg-emerald-950/40 text-emerald-300 hover:bg-emerald-900/50'
                                  }`}
                              >
                                  Вин
                              </button>
                              <button
                                  type="button"
                                  onClick={() => changeLineStrategyPickOutcome(p.id, 'RETURN')}
                                  className={`inline-flex items-center gap-0.5 rounded border px-1.5 py-0.5 text-xs font-bold ${
                                      p.status === 'RETURN'
                                          ? 'border-slate-400/60 bg-slate-700/60 text-slate-100'
                                          : 'border-slate-600 bg-slate-800 text-slate-300 hover:bg-slate-700'
                                  }`}
                              >
                                  Возврат
                              </button>
                              <button
                                  type="button"
                                  onClick={() => changeLineStrategyPickOutcome(p.id, 'LOST')}
                                  className={`inline-flex items-center gap-0.5 rounded border px-1.5 py-0.5 text-xs font-bold ${
                                      p.status === 'LOST'
                                          ? 'border-red-400/70 bg-red-900/45 text-red-100'
                                          : 'border-red-800/50 bg-red-950/35 text-red-300 hover:bg-red-900/45'
                                  }`}
                              >
                                  Слив
                              </button>
                          </div>
                      ) : null}
                  </li>
              );
          };

          const renderHistoryPanel = (tabKey, { isGlobal = false } = {}) => {
              let rows = [];
              if (isGlobal) {
                  rows = (globalHistory || [])
                      .map((item) => ({ item, sourceTab: item.sourceTab }))
                      .filter(
                          ({ sourceTab }) =>
                              sourceTab === 'classic' || sourceTab === 'totals' || sourceTab === 'pool',
                      )
                      .sort((a, b) => (Number(b.item.id) || 0) - (Number(a.item.id) || 0));
              } else {
                  rows = (historyByTab[tabKey] || []).map((item) => ({ item, sourceTab: tabKey }));
              }
              const panelId = isGlobal ? 'global' : tabKey;
              const rowDeleteMode = !!historyRowDeleteModeByPanel[panelId];
              const list = rows.map((r) => r.item);
              const localStats = { ...computeHistoryStats(list), total: list.length };
              const isExpressTab = !isGlobal && tabKey === 'express';
              const hasExpressCtorRows = isExpressTab && list.some((it) => it.expressLocalOnly);
              const expressCtorSeriesCount = list.filter((it) => it.expressLocalOnly).length;
              const expressCtorStats = hasExpressCtorRows ? computeExpressConstructorHistoryStats(list) : null;
              const showExpressCtorSummary = !!expressCtorStats;
              const sectionMeta = !isGlobal ? SECTION_META[tabKey] : null;
              const colSpan = isGlobal ? 8 : 7;
              const globalLinePicksFiltered = isGlobal
                  ? (lineStrategiesData.picks || [])
                        .filter((p) => {
                            if (homeLineFeedStrategyId !== 'all' && String(p.strategyId) !== String(homeLineFeedStrategyId)) return false;
                            if (homeLineFeedStatus === 'PENDING' && p.status !== 'PENDING') return false;
                            if (homeLineFeedStatus === 'SETTLED' && p.status === 'PENDING') return false;
                            return true;
                        })
                        .sort((a, b) => (Number(b.id) || 0) - (Number(a.id) || 0))
                  : [];
              return (
                  <div className={`bg-slate-900/80 border border-slate-700/80 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-xl ${isGlobal ? 'mt-0' : 'mt-8'}`}>
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between bg-slate-800 px-5 py-4 border-b border-slate-700/50 gap-3">
                          <div className="flex items-center gap-2 min-w-0">
                              <HistoryIcon size={20} className="text-slate-400 shrink-0" />
                              <div className="min-w-0">
                                  <h2 className="text-white font-bold uppercase tracking-wider text-sm">{isGlobal ? 'Общая лента' : 'История расчётов'}</h2>
                                  <p className="text-[10px] text-slate-500 font-semibold truncate">
                                      {isGlobal
                                          ? 'Прогнозы «Линия» (фильтры ниже) + сохранённые серии: датчинг, тоталы, пул'
                                          : sectionMeta
                                            ? `${sectionMeta.title} · только этот раздел`
                                            : `${tabKey} · только этот раздел`}
                                  </p>
                              </div>
                          </div>
                          <div className="flex items-center gap-4 self-end sm:self-auto shrink-0">
                              <div className="text-[11px] text-slate-300 font-mono flex items-center gap-4 bg-slate-900/80 px-4 py-2 rounded-lg border border-slate-700 shadow-inner">
                                  {showExpressCtorSummary ? (
                                      <div className="flex flex-col gap-1 min-w-0 max-w-[min(100%,28rem)]">
                                          <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 text-[10px] font-sans">
                                              <span title="Серий конструктора в ленте" className="flex items-center gap-1 shrink-0">
                                                  <span className="text-slate-500">Серий:</span> {expressCtorSeriesCount}
                                              </span>
                                              <span title="Сколько отдельных экспрессов уже размечено исходом" className="flex items-center gap-1 shrink-0">
                                                  <span className="text-slate-500">Исходов:</span> {expressCtorStats.wins + expressCtorStats.losses + expressCtorStats.returns}
                                              </span>
                                              <span className="text-emerald-400 font-bold shrink-0">Вин: {expressCtorStats.wins}</span>
                                              <span className="text-red-400/90 font-bold shrink-0">Пор: {expressCtorStats.losses}</span>
                                              <span className="text-slate-400 font-bold shrink-0">Возвр.: {expressCtorStats.returns}</span>
                                              <span className="text-amber-400/90 shrink-0">Ждём: {expressCtorStats.pending}</span>
                                              {expressCtorStats.winRateWL != null ? (
                                                  <span className="text-slate-300 shrink-0" title="Доля побед среди завершённых WIN/LOSE">
                                                      Вин%: {expressCtorStats.winRateWL.toFixed(1)}%
                                                  </span>
                                              ) : null}
                                          </div>
                                          <div className="flex flex-wrap gap-x-2 gap-y-0.5 text-[9px] text-slate-500 font-sans leading-tight" title="По метке худшего прогноза в экспрессе (как в генераторе)">
                                              <span>
                                                  Выс.: {expressCtorStats.tier.strong.w}–{expressCtorStats.tier.strong.l}–{expressCtorStats.tier.strong.r}
                                                  {expressCtorStats.tier.strong.p ? ` · жд.${expressCtorStats.tier.strong.p}` : ''}
                                              </span>
                                              <span>
                                                  Сред.: {expressCtorStats.tier.mid.w}–{expressCtorStats.tier.mid.l}–{expressCtorStats.tier.mid.r}
                                                  {expressCtorStats.tier.mid.p ? ` · жд.${expressCtorStats.tier.mid.p}` : ''}
                                              </span>
                                              <span>
                                                  Риск: {expressCtorStats.tier.weak.w}–{expressCtorStats.tier.weak.l}–{expressCtorStats.tier.weak.r}
                                                  {expressCtorStats.tier.weak.p ? ` · жд.${expressCtorStats.tier.weak.p}` : ''}
                                              </span>
                                              <span className="text-slate-600">(формат: вин–пор–возвр)</span>
                                          </div>
                                      </div>
                                  ) : (
                                      <>
                                          <span title="Закрыто / Всего" className="flex items-center gap-1.5">
                                              <span className="text-slate-500">Итогов:</span> {localStats.resolvedCount}/{localStats.total}
                                          </span>
                                          <span title={isGlobal ? 'Суммарный P&L' : 'P&L по разделу'} className={`flex items-center gap-1.5 font-bold ${localStats.totalProfit >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                                              <span className="text-slate-500 font-normal">P&L:</span> {localStats.totalProfit > 0 ? '+' : ''}
                                              {formatUSD(localStats.totalProfit, 2)}
                                          </span>
                                          {localStats.pending > 0 && <span className="text-amber-400/90">Ожид.: {localStats.pending}</span>}
                                      </>
                                  )}
                              </div>
                              <div className="flex items-center gap-2 shrink-0">
                                  <button
                                      type="button"
                                      onClick={() =>
                                          setHistoryRowDeleteModeByPanel((prev) => ({
                                              ...prev,
                                              [panelId]: !prev[panelId],
                                          }))
                                      }
                                      aria-pressed={rowDeleteMode}
                                      className={`transition-colors p-2 rounded border ${
                                          rowDeleteMode
                                              ? 'text-red-300 bg-red-950/55 border-red-500/50 hover:bg-red-900/45'
                                              : 'text-slate-500 hover:text-red-400 border-transparent hover:bg-red-400/10'
                                      }`}
                                      title={
                                          rowDeleteMode
                                              ? 'Скрыть корзины удаления в строках'
                                              : 'Показать корзины удаления у каждой серии (затем нажмите корзину в строке и подтвердите)'
                                      }
                                  >
                                      <Trash2 size={18} />
                                  </button>
                                  {rowDeleteMode && list.length > 0 ? (
                                      <button
                                          type="button"
                                          onMouseDown={(e) => e.stopPropagation()}
                                          onClick={(e) => {
                                              e.preventDefault();
                                              e.stopPropagation();
                                              if (isGlobal) setHistoryMassClearPrompt({ scope: 'global' });
                                              else setHistoryMassClearPrompt({ scope: 'section', tabKey });
                                          }}
                                          className="text-[10px] font-bold uppercase tracking-wide text-red-400/90 hover:text-red-300 underline decoration-red-500/50 underline-offset-2 px-1 py-1 rounded"
                                      >
                                          Очистить всё
                                      </button>
                                  ) : null}
                              </div>
                          </div>
                      </div>
                      <div className="p-0 max-w-full min-w-0 overflow-x-hidden max-h-[520px] overflow-y-auto custom-scrollbar">
                          {isGlobal ? (
                              <>
                                  <div className="border-b border-slate-700/50 bg-slate-950/30 px-3 py-3 sm:px-4">
                                      <div className="flex flex-wrap items-end gap-3 mb-2">
                                          <label className="flex flex-col gap-0.5 text-[10px] font-bold uppercase tracking-wide text-slate-500">
                                              Стратегия
                                              <select
                                                  value={homeLineFeedStrategyId}
                                                  onChange={(e) => setHomeLineFeedStrategyId(e.target.value)}
                                                  className="mt-0.5 rounded-lg border border-slate-600 bg-slate-900 px-2 py-1.5 text-xs font-medium text-white min-w-[10rem]"
                                              >
                                                  <option value="all">Все стратегии</option>
                                                  {(lineStrategiesData.strategies || []).map((s) => (
                                                      <option key={s.id} value={s.id}>
                                                          {s.name}
                                                      </option>
                                                  ))}
                                              </select>
                                          </label>
                                          <label className="flex flex-col gap-0.5 text-[10px] font-bold uppercase tracking-wide text-slate-500">
                                              Статус
                                              <select
                                                  value={homeLineFeedStatus}
                                                  onChange={(e) => setHomeLineFeedStatus(e.target.value)}
                                                  className="mt-0.5 rounded-lg border border-slate-600 bg-slate-900 px-2 py-1.5 text-xs font-medium text-white min-w-[8rem]"
                                              >
                                                  <option value="all">Все</option>
                                                  <option value="PENDING">Ожидают</option>
                                                  <option value="SETTLED">Завершены</option>
                                              </select>
                                          </label>
                                      </div>
                                      {globalLinePicksFiltered.length === 0 ? (
                                          <p className="rounded-lg border border-dashed border-slate-700/80 bg-slate-900/40 px-3 py-4 text-center text-xs text-slate-500">
                                              Нет прогнозов «Линия» по выбранным фильтрам.
                                          </p>
                                      ) : (
                                          <ul className="max-h-[220px] overflow-y-auto custom-scrollbar divide-y divide-slate-800/60 rounded-lg border border-slate-800/80 bg-slate-900/40">
                                              {globalLinePicksFiltered.map((p) => renderLineStrategyPickFeedRow(p))}
                                          </ul>
                                      )}
                                      <p className="mt-3 pt-2 border-t border-slate-800/60 text-[10px] font-black uppercase tracking-wide text-slate-500">
                                          Датчинг · тоталы · пул — таблица ниже
                                      </p>
                                  </div>
                              </>
                          ) : null}
                          {!isGlobal && list.length === 0 ? (
                              <div className="p-12 text-center text-slate-500 text-sm flex flex-col items-center gap-3">
                                  <Save size={32} className="opacity-20" />
                                  Сохраняйте расчёты из этого раздела — они появятся здесь.
                              </div>
                          ) : null}
                          {list.length > 0 ? (
                              <table className="w-full table-fixed border-collapse text-left">
                                  <thead>
                                      <tr className="bg-slate-900/50 border-b border-slate-800 text-[10px] uppercase tracking-wider text-slate-500 sticky top-0 backdrop-blur-md z-10">
                                          <th className="py-2.5 px-1 w-9 font-semibold text-center"></th>
                                          {isGlobal ? <th className="py-2.5 px-1 w-14 font-semibold text-left">Раздел</th> : null}
                                          <th className="py-2.5 px-1 w-[5.5rem] font-semibold">Дата</th>
                                          <th className="py-2.5 px-1 w-[13%] font-semibold">Тип</th>
                                          <th className="py-2.5 px-1 w-[32%] font-semibold min-w-0">События</th>
                                          <th className="py-2.5 px-1 w-[4.5rem] font-semibold text-right">Сумма</th>
                                          <th className="py-2 px-0.5 w-[5.5rem] font-semibold text-right text-[8px] leading-tight text-slate-500">
