                          <p className="mt-2 text-sm text-slate-300 leading-snug">Текущая лесенка и шаги будут очищены. Поля «Цель», «Уже поставлено» и др. останутся как вы ввели.</p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700"
                                  onClick={() => setChaserResetPrompt(false)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500"
                                  onClick={() => {
                                      setChaserSteps([]);
                                      setChaserResetPrompt(false);
                                  }}
                              >
                                  Сбросить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {poolHistoryDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[203] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="pool-history-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setPoolHistoryDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="pool-history-delete-title" className="text-lg font-black text-white tracking-tight">
                              Удалить снимок из истории?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-snug">
                              {poolHistoryDeletePrompt.poolName
                                  ? `Пул «${poolHistoryDeletePrompt.poolName}» · ${poolHistoryDeletePrompt.savedAt || ''}`
                                  : poolHistoryDeletePrompt.savedAt || 'Запись из истории пулов'}
                          </p>
                          <p className="mt-3 text-xs text-slate-500 leading-relaxed">
                              Снимок будет удалён без восстановления. Запись исчезнет из списка и из сохранённого хранилища браузера.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setPoolHistoryDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitPoolHistoryDelete}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {historyDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[200] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="history-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setHistoryDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="history-delete-title" className="text-lg font-black text-white tracking-tight">
                              {historyDeletePrompt.fromGlobal ? 'Убрать из общей истории?' : 'Удалить прогноз?'}
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-snug">{historyDeletePrompt.label}</p>
                          <p className="mt-3 text-xs text-slate-500 leading-relaxed">
                              {historyDeletePrompt.fromGlobal
                                  ? 'Запись будет удалена только из общей истории на главной; в истории раздела «Экспрессы» или «Тоталы» она останется. Отменить действие нельзя.'
                                  : 'Запись будет удалена из архива раздела и пересчитаны сводки. Отменить действие нельзя.'}
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setHistoryDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitHistoryDelete}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {historyMassClearPrompt ? (
                  <div
                      className="fixed inset-0 z-[201] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="history-mass-clear-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setHistoryMassClearPrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="history-mass-clear-title" className="text-lg font-black text-white tracking-tight">
                              {historyMassClearPrompt.scope === 'global' ? 'Очистить общую историю?' : 'Очистить всю историю?'}
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-snug">
                              {historyMassClearPrompt.scope === 'global'
                                  ? 'Будет очищена только общая история на главной. История во вкладках «Экспрессы» и «Тоталы» не изменится. Отменить нельзя.'
                                  : `Будет очищена только история раздела «${SECTION_META[historyMassClearPrompt.tabKey]?.title || historyMassClearPrompt.tabKey}». Остальные разделы не затронуты.`}
                          </p>
                          <p className="mt-3 text-xs text-slate-500 leading-relaxed">
                              Учётный банк на главной не меняется автоматически — при необходимости скорректируйте поле «Баланс в учёте» вручную.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setHistoryMassClearPrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitHistoryMassClear}
                              >
                                  Очистить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {expressLineDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[206] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="express-line-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setExpressLineDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="express-line-delete-title" className="text-lg font-black text-white tracking-tight">
                              Удалить матч из линии?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-snug">{expressLineDeletePrompt.label}</p>
                          <p className="mt-3 text-xs text-slate-500 leading-relaxed">
                              Матч будет удалён из блока «Линия дня». Действие нельзя отменить.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setExpressLineDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitExpressLineDelete}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {expressLineMassDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[206] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="express-line-mass-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setExpressLineMassDeletePrompt(false);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="express-line-mass-delete-title" className="text-lg font-black text-white tracking-tight">
                              Удалить все матчи из линии?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                              Будут удалены все матчи из блока «Линия дня». Действие нельзя отменить.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setExpressLineMassDeletePrompt(false)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitExpressLineMassDelete}
                              >
                                  Удалить все
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {expressWorkspaceClearPrompt ? (
                  <div
                      className="fixed inset-0 z-[206] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="express-workspace-clear-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setExpressWorkspaceClearPrompt(false);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="express-workspace-clear-title" className="text-lg font-black text-white tracking-tight">
                              Очистить все прогнозы?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                              Будут удалены все прогнозы и сгенерированные варианты экспрессов в текущем блоке «Линия».
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setExpressWorkspaceClearPrompt(false)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitExpressWorkspaceClear}
                              >
                                  Очистить всё
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {lineStrategyDollarModal ? (
                  <div
                      className="fixed inset-0 z-[207] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="line-strategy-dollar-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setLineStrategyDollarModal(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-violet-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="line-strategy-dollar-title" className="text-lg font-black text-white tracking-tight">
                              В стратегию с «Линия»
                          </h3>
                          <p className="mt-2 text-xs text-slate-400 leading-relaxed">
                              Ставка спишется с кошелька выбранной стратегии (пополните его на «Главная» переводом с основного банка).
                          </p>
                          {lineStrategyDollarModal.err ? (
                              <p className="mt-2 text-sm text-red-300 font-bold">{lineStrategyDollarModal.err}</p>
                          ) : null}
                          {(lineStrategiesData.strategies || []).length > 0 ? (
                              <>
                                  <label className="mt-3 block text-[10px] font-bold uppercase text-violet-300 tracking-wide">Стратегия</label>
                                  <select
                                      value={lineStrategyDollarModal.strategyId || ''}
                                      onChange={(e) =>
                                          setLineStrategyDollarModal((m) => (m ? { ...m, strategyId: e.target.value, err: '' } : m))
                                      }
                                      className="mt-1 w-full rounded-lg border border-violet-600/50 bg-slate-950 px-3 py-2 text-sm text-white"
                                  >
                                      {(lineStrategiesData.strategies || []).map((st) => (
                                          <option key={st.id} value={st.id}>
                                              {st.name} · кошелёк {formatUSD(st.bank, 2)}
                                          </option>
                                      ))}
                                  </select>
                              </>
                          ) : (
                              <p className="mt-3 rounded-md border border-slate-700 bg-slate-950/60 px-3 py-2 text-xs text-slate-400">
                                  Нет стратегий на «Главная». Можно добавить купон сразу в «Пул лесенок» ниже.
                              </p>
                          )}
                          <label className="mt-3 block text-[10px] font-bold uppercase text-slate-400 tracking-wide">Сумма ставки ($)</label>
                          <input
                              type="number"
                              step="0.01"
                              min="0"
                              value={lineStrategyDollarModal.stakeStr}
                              onChange={(e) =>
                                  setLineStrategyDollarModal((m) => (m ? { ...m, stakeStr: e.target.value, err: '' } : m))
                              }
                              className="mt-1 w-full rounded-lg border border-slate-600 bg-slate-950 px-3 py-2 text-sm font-mono text-white"
                          />
                          <div className="mt-4 rounded-xl border border-teal-500/35 bg-teal-950/20 p-3">
                              <p className="text-[11px] font-black uppercase tracking-wide text-teal-200">В «Пул лесенок»</p>
                              <p className="mt-1 text-[11px] leading-relaxed text-slate-400">
                                  Купон запишется в доступный шаг с минимальной ставкой (при равной сумме — меньший номер шага).
                              </p>
                              {lineStrategyDollarModal.poolErr ? (
                                  <p className="mt-2 text-sm font-bold text-red-300">{lineStrategyDollarModal.poolErr}</p>
                              ) : null}
                              <label className="mt-2 block text-[10px] font-bold uppercase tracking-wide text-teal-300/90">
                                  Открытый пул
                              </label>
                              <select
                                  value={lineStrategyDollarModal.poolId || ''}
                                  onChange={(e) =>
                                      setLineStrategyDollarModal((m) => (m ? { ...m, poolId: e.target.value, poolErr: '' } : m))
                                  }
                                  className="mt-1 w-full rounded-lg border border-teal-600/50 bg-slate-950 px-3 py-2 text-sm text-white"
                              >
                                  {(poolMulti.pools || [])
                                      .filter((p) => !p.isClosed)
                                      .map((p) => (
                                          <option key={p.id} value={p.id}>
                                              {p.name}
                                          </option>
                                      ))}
                              </select>
                              {(poolMulti.pools || []).filter((p) => !p.isClosed).length === 0 ? (
                                  <p className="mt-2 text-[11px] text-slate-500">
                                      Нет открытых пулов. Откройте или создайте пул во вкладке «Пул лесенок».
                                  </p>
                              ) : null}
                          </div>
                          <div className="mt-3 max-h-32 overflow-y-auto rounded border border-slate-700/60 bg-slate-950/80 p-2 text-[11px] text-slate-300 custom-scrollbar">
                              <span className="font-mono font-bold text-violet-200">@{Number(lineStrategyDollarModal.bundle.totalOdd).toFixed(2)}</span>
                              <ul className="mt-1 space-y-0.5">
                                  {(lineStrategyDollarModal.bundle.legs || []).map((lg, li) => (
                                      <li key={lg.id != null ? String(lg.id) : `dlg-leg-${li}`} className="truncate">
                                          {lg.match} — {lg.prediction} ({Number(lg.odd).toFixed(2)})
                                      </li>
                                  ))}
                              </ul>
                          </div>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setLineStrategyDollarModal(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-violet-500/60 bg-violet-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-violet-500 transition-colors"
                                  onClick={commitLineStrategyDollarModal}
                                  disabled={(lineStrategiesData.strategies || []).length === 0}
                              >
                                  В стратегию
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-teal-500/60 bg-teal-700 px-4 py-2.5 text-sm font-bold text-white hover:bg-teal-600 transition-colors"
                                  onClick={commitLineBundleToPoolFromModal}
                              >
                                  В пул
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {lineStrategyDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[207] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="line-strategy-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setLineStrategyDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="line-strategy-delete-title" className="text-lg font-black text-white tracking-tight">
                              Удалить стратегию?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                              «{lineStrategyDeletePrompt.name || ''}»: кошелёк и незакрытые ставки вернутся на основной банк. Закрытые прогнозы из списка исчезнут.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setLineStrategyDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitRemoveLineStrategy}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {lineStrategyPickDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[208] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="line-strategy-pick-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setLineStrategyPickDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="line-strategy-pick-delete-title" className="text-lg font-black text-white tracking-tight">
                              Удалить прогноз?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                              Прогноз будет удалён из стратегии, кошелёк пересчитается (для ожидающих — ставка вернётся на баланс стратегии). Восстановить запись нельзя.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setLineStrategyPickDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitRemoveLineStrategyPick}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {expressBundleDeletePrompt ? (
                  <div
                      className="fixed inset-0 z-[206] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="express-bundle-delete-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setExpressBundleDeletePrompt(null);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-red-500/40 bg-slate-900 p-5 shadow-2xl shadow-black/50"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="express-bundle-delete-title" className="text-lg font-black text-white tracking-tight">
                              Убрать экспресс из очереди?
                          </h3>
                          <p className="mt-2 text-sm text-slate-300 leading-relaxed">
                              Купон будет удалён из блока «Варианты экспрессов». Отменить после удаления нельзя.
                          </p>
                          <div className="mt-6 flex flex-wrap justify-end gap-2">
                              <button
                                  type="button"
                                  className="rounded-xl border border-slate-600 bg-slate-800 px-4 py-2.5 text-sm font-bold text-slate-200 hover:bg-slate-700 transition-colors"
                                  onClick={() => setExpressBundleDeletePrompt(null)}
                              >
                                  Отмена
                              </button>
                              <button
                                  type="button"
                                  className="rounded-xl border border-red-500/60 bg-red-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-red-500 transition-colors"
                                  onClick={commitExpressBundleDelete}
                              >
                                  Удалить
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              <div className="relative z-10 mx-auto min-w-0 w-full max-w-[1400px] px-1 sm:px-2 md:px-3">
                
                {renderTabs()}

                {/* --- HEADER ДЛЯ ДАТЧИНГА (Экспрессы / Тоталы) --- */}
                {['classic', 'totals'].includes(calcTab) && (
                    <header className="flex flex-col xl:flex-row xl:items-start xl:justify-between items-stretch gap-4 mb-4 pb-4 border-b border-slate-600/30 min-w-0 w-full">
                      <div className="min-w-0 w-full xl:flex-1 overflow-x-auto overflow-y-visible custom-scrollbar pb-0.5">
                      <div className="flex flex-col sm:flex-row sm:items-center gap-3 w-max min-w-full sm:w-full sm:min-w-0 xl:w-auto justify-start sm:justify-center xl:justify-start">
                        {calcTab === 'classic' && (
                            <div className="flex bg-slate-900/60 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <button onClick={() => setClassicCount(2)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 2 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>2 Матча</button>
                              <button onClick={() => setClassicCount(3)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 3 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>3 Матча</button>
                              <button onClick={() => setClassicCount(4)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 4 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>4 Матча</button>
                              <button onClick={() => setClassicCount(5)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 5 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>5 Матчей</button>
                              <button onClick={() => setClassicCount(6)} className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${classicCount === 6 ? 'bg-emerald-600 text-white shadow-md' : 'text-emerald-400 hover:text-emerald-200'}`}>6 Матчей</button>
                            </div>
                        )}
                        {calcTab === 'totals' && (
                            <div className="flex items-center gap-2 bg-slate-900/60 p-1.5 rounded-lg border border-slate-700/50 backdrop-blur-md w-full sm:w-auto justify-center flex-wrap">
                              <span className="px-2 text-[11px] font-bold uppercase text-blue-300 whitespace-nowrap">Конструктор</span>
                              <select
                                  value={customTotalsCount}
                                  onChange={(e) => {
                                      const n = Number(e.target.value);
                                      setCustomTotalsCount(n);
                                      setPlacedBetsTotals(new Set());
                                      setTotalsModes({});
                                  }}
                                  className="bg-slate-900 text-blue-100 text-[11px] font-bold border border-blue-500 rounded px-2 py-1.5 outline-none min-w-[7.5rem]"
                              >
                                  {[3, 4, 5, 6, 7, 8, 9, 10].map((num) => (
                                      <option key={num} value={num}>
                                          {num} матчей
                                      </option>
                                  ))}
                              </select>
                            </div>
                        )}
                      </div>
                      </div>

                      <div className="flex flex-wrap items-center justify-center gap-3 bg-slate-900/60 px-4 py-2 rounded-xl border border-slate-700/50 backdrop-blur-md w-full shrink-0 xl:w-auto xl:max-w-[min(100%,22rem)] shadow-inner">
                        <div className="flex flex-col border-r border-slate-700 pr-3">
                          <label className={`text-[10px] font-bold uppercase tracking-wider mb-0.5 ${calcTab === 'totals' ? 'text-blue-400' : 'text-emerald-400'}`}>Игровой Банк (Ставка)</label>
                          <div className="relative">
                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">$</span>
                            <input type="number" value={bank} onChange={(e) => setBank(e.target.value)} className="bg-slate-800/50 border border-slate-600 text-white font-bold text-sm rounded pl-6 pr-2 py-1.5 w-24 focus:outline-none focus:ring-1 transition-all"/>
                          </div>
                        </div>
                        <div className="flex flex-col">
                          <label className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Мин. ставка (Лимит)</label>
                          <div className="relative">
                            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 font-bold text-sm">$</span>
                            <input type="number" step="0.05" value={minimumBet} onChange={(e) => setMinimumBet(e.target.value)} className="bg-slate-800 border border-slate-600 text-white font-bold text-sm rounded pl-6 pr-2 py-1.5 w-20 focus:outline-none focus:ring-1 transition-all"/>
                          </div>
                        </div>
                      </div>
                    </header>
                )}

                {/* --- РЕНДЕР ТЕКУЩЕЙ ВКЛАДКИ --- */}
                {activeTab === 'chaser'
                    ? renderChaserTab()
                    : activeTab === 'home'
                      ? renderHomePage()
                      : activeTab === 'pool'
                        ? renderPoolTab()
                        : activeTab === 'express'
                          ? renderExpressTab()
                          : dutchingCalculatorBlock}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
