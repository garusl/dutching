        const HISTORY_TAB_KEYS = ['classic', 'totals', 'express'];

        const POOL_LS_HISTORY = 'dutchingLadderPoolHistory';
        const GLOBAL_HISTORY_LS_KEY = 'dutchingGlobalHistory';
        const LINE_STRATEGIES_DATA_LS_KEY = 'dutchingLineStrategiesData';
        const MAIN_BANK_TOPUP_TOTAL_LS_KEY = 'dutchingMainBankTopupTotal';
        const MAIN_BANK_WITHDRAW_TOTAL_LS_KEY = 'dutchingMainBankWithdrawTotal';
        const SUPABASE_URL = 'https://zougmxypkuafvtgmfblf.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpvdWdteHlwa3VhZnZ0Z21mYmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzIzNDAsImV4cCI6MjA4OTQ0ODM0MH0.SFo1pEWBnWN__-A2kr7gJ7J5K_CI-h39SrI_3KSriC4';
        const SUPABASE_STATE_ROW_ID = 'global';
        const supabaseClient =
            typeof window !== 'undefined' &&

            SUPABASE_URL &&

        const poolClampSeries = (n) => Math.min(POOL_MAX_SERIES, Math.max(POOL_MIN_SERIES, parseInt(n, 10) || POOL_DEFAULT_SERIES));
        const poolClampSteps = (n) => Math.min(POOL_MAX_STEPS, Math.max(POOL_MIN_STEPS, parseInt(n, 10) || POOL_DEFAULT_STEPS));
        const poolShellBumpedSeries = (p, delta) => {
            const cur = poolClampSeries(String(p.constructorSeries));
            const next = poolClampSeries(String(cur + delta));
            return { ...p, constructorSeries: next, constructorSteps: poolCalcStepsForDoubleGoal(next) };
        };
        const poolShellBumpedSteps = (p, delta) => {
            const cur = poolClampSteps(String(p.constructorSteps));
            const next = poolClampSteps(String(cur + delta));
            return { ...p, constructorSteps: next };
        };
        const poolClampBank = (raw) => {
            const n = Math.floor(Math.abs(parseFloat(String(raw).replace(',', '.'))) || 0);
            return Math.min(POOL_MAX_BANK, Math.max(POOL_MIN_BANK, n));
        };
        const poolShellBumpedBank = (p, delta) => {
            const cur = poolClampBank(p.bankInput);
            const next = poolClampBank(cur + delta * POOL_BANK_STEP);
            return { ...p, bankInput: String(next) };
        };
        /** Минимум шагов в одной серии для цели x2 банка при минимальном кэфе 2.00 на каждом шаге. */
        const poolCalcStepsForDoubleGoal = (seriesCountRaw) => {
            const seriesCount = poolClampSeries(seriesCountRaw);
            // (банк / серий) * 2^steps >= 2 * банк => 2^steps >= 2 * серий
            const need = Math.ceil(Math.log2(Math.max(1, 2 * seriesCount)));
            return poolClampSteps(need);
        };
        /** Суммы пула: не более двух знаков после запятой (избегаем артефактов float в полях и расчётах). */
        const poolMoney2 = (n) => {
            const x = Number(n);
            if (!Number.isFinite(x)) return 0;
            return Math.round(x * 100) / 100;
        };

        /** Снимок стратегий с «Линия»: кошельки + прогнозы из вариантов экспрессов. */
        const loadLineStrategiesData = () => {
            try {
                const v = localStorage.getItem(LINE_STRATEGIES_DATA_LS_KEY);
                if (!v) return { strategies: [], picks: [] };
                const o = JSON.parse(v);
                const strategies = Array.isArray(o.strategies) ? o.strategies : [];
                const picks = Array.isArray(o.picks) ? o.picks : [];
                return {
                    strategies: strategies
                        .filter((s) => s && s.id != null)
                        .map((s) => ({
                            id: String(s.id),
                            name: String(s.name || '').trim() || 'Без имени',
                            bank: poolMoney2(Number(s.bank) || 0),
                        })),
                    picks: picks
                        .filter((p) => p && p.id != null && p.strategyId && p.bundle)
                        .map((p) => ({
                            id: Number(p.id) || Date.now(),
                            strategyId: String(p.strategyId),
                            stake: poolMoney2(Number(p.stake) || 0),
                            status: ['PENDING', 'WON', 'LOST', 'RETURN'].includes(p.status) ? p.status : 'PENDING',
                            bundle: p.bundle,
                            savedAt: String(p.savedAt || ''),
                        })),
                };
            } catch (e) {
                return { strategies: [], picks: [] };
            }
        };

        const poolStepsLen = (series) => (series && series[0] && series[0].steps ? series[0].steps.length : POOL_DEFAULT_STEPS);

        const poolEmptyLeg = () => ({ matchName: '', market: '', odd: '' });
        const poolEmptyStep = (stake) => ({
            stake: poolMoney2(stake),
            legs: [poolEmptyLeg(), poolEmptyLeg(), poolEmptyLeg()],
            status: 'empty',
            payout: null,
        });
        const poolNewSeries = (perStake, stepsCount) => {
            const sc = poolClampSteps(stepsCount);
            return {

                steps: Array.from({ length: sc }, (_, w) => poolEmptyStep(w === 0 ? perStake : 0)),

        const poolCreateSession = (poolBankInput, seriesCount, stepsCount) => {

            const nSer = poolClampSeries(seriesCount);
            const nSt = poolClampSteps(stepsCount);

            return {

                startedAt: new Date().toISOString(),
                seriesCount: nSer,
                stepsCount: nSt,

        const poolProductOdds = (legs) => {

        };
        const poolLegIsBlank = (lg) => {
            if (!lg) return true;
            const m = String(lg.matchName || '').trim();

        /** Индекс последней «ставки» в серии: самый правый шаг со статусом placed / won / lost (−1 если нет). */
        const poolSeriesLastBetIndex = (ser) => {
            if (!ser || !ser.steps) return -1;
            let last = -1;
            for (let w = 0; w < ser.steps.length; w++) {

                if (s === 'placed' || s === 'won' || s === 'lost') last = w;

            return last;
        };
        const poolSeriesInsideMoney = (ser) => {
            if (!ser || ser.dead) return 0;
            const len = ser.steps ? ser.steps.length : POOL_DEFAULT_STEPS;

                const st = ser.steps[i];
                if (st.status === 'won') {
                    if (i === len - 1) return Number(st.payout) || 0;
                    continue;
                }
                if (st.status === 'placed' || st.status === 'empty') return Number(st.stake) || 0;
                if (st.status === 'lost') return 0;
            }
            return 0;
        };
        const poolComputeInsideTotal = (series) =>
            poolMoney2((series || []).reduce((a, ser) => a + poolSeriesInsideMoney(ser), 0));
        /**
         * Шаг серии доступен, если серия жива и (для шага >0) предыдущий шаг этой же серии выигран.
         * Очередь между сериями не синхронизируется: после расчёта выигрыша следующий шаг этой лесенки
         * открывается сразу, параллельно с чужими шагами — может быть несколько «Следующая ставка».
         */
        const poolStepUnlocked = (series, serIdx, w) => {
            const ser = series[serIdx];
            if (!ser || ser.dead) return false;
            if (w > 0 && ser.steps[w - 1].status !== 'won') return false;
            return true;
        };
        /** Все пустые доступные ячейки для ставки (обход: шаг, затем серия). */
        const poolNextBetSlots = (series) => {
            const out = [];

            const nSer = series.length;
            for (let w = 0; w < nSt; w++) {
                for (let s = 0; s < nSer; s++) {
                    if (!poolStepUnlocked(series, s, w)) continue;

                    if (st && st.status === 'empty') out.push({ si: s, wi: w });

            }
            return out;

        const poolCountFullLadder = (series) =>
            series.filter((ser) => !ser.dead && ser.steps && ser.steps.length > 0 && ser.steps.every((st) => st.status === 'won')).length;
        const poolCountMinStepsWon = (series, k) =>
            series.filter((ser) => {
                if (ser.dead) return false;
                if (k <= 0) return false;
                return ser.steps.slice(0, k).every((st) => st.status === 'won');
            }).length;
        /** Пока есть нерасчитанные ставки («В игре»), итог пула и цели ещё не финальны. */
        const poolHasAnyPlacedBet = (series) =>
            (series || []).some((ser) => !ser.dead && ser.steps && ser.steps.some((st) => st.status === 'placed'));
        const poolGoalMet = (series, needFull, series3Need, steps3) => {
            if (poolHasAnyPlacedBet(series)) return false;
            const okFull = needFull > 0 && poolCountFullLadder(series) >= needFull;
            const ok3 = series3Need > 0 && steps3 > 0 && poolCountMinStepsWon(series, steps3) >= series3Need;
            return okFull || ok3;
        };

        const validatePoolSession = (sess) => {
            if (!sess || !Array.isArray(sess.series) || sess.series.length < POOL_MIN_SERIES) return null;
            const st0 = sess.series[0] && sess.series[0].steps;
            if (!st0 || st0.length < POOL_MIN_STEPS) return null;
            const sc = sess.seriesCount || sess.series.length;
            if (sess.series.length !== sc) return null;
            for (let i = 0; i < sess.series.length; i++) {
                if (!sess.series[i].steps || sess.series[i].steps.length !== st0.length) return null;
            }
            return {
                ...sess,
                initialPoolBank: poolMoney2(Number(sess.initialPoolBank) || 0),
                seriesCount: poolClampSeries(sc),
                stepsCount: poolClampSteps(sess.stepsCount || st0.length),
                series: sess.series.map((ser) => ({
                    ...ser,
                    steps: ser.steps.map((st) => ({
                        ...st,
                        stake: poolMoney2(st.stake),
                        payout: st.payout != null && st.payout !== '' ? poolMoney2(st.payout) : null,
                    })),
                })),
            };
        };

        /** Одна вкладка пула: сессия + настройки конструктора и целей. */
        const poolShellFromSession = (name, sess, extra = {}) => {
            const v = validatePoolSession(sess);
            if (!v) return null;
            const sc = v.seriesCount || v.series.length;
            const stc = v.stepsCount || poolStepsLen(v.series);
            const id = extra.id && String(extra.id).length ? String(extra.id).slice(0, 64) : `p-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
            return {
                id,
                name: String(name || 'Пул').slice(0, 48) || 'Пул',
                session: v,
                bankInput: String(extra.bankInput != null ? extra.bankInput : v.initialPoolBank ?? 500),
                constructorSeries: poolClampSeries(extra.constructorSeries != null ? extra.constructorSeries : sc),
                constructorSteps:
                    extra.constructorSteps != null
                        ? poolClampSteps(extra.constructorSteps)
                        : poolCalcStepsForDoubleGoal(extra.constructorSeries != null ? extra.constructorSeries : sc),
                targetFull4: (() => {
                    const x = extra.targetFull4 != null && extra.targetFull4 !== '' ? parseInt(extra.targetFull4, 10) : 1;
                    return Math.min(sc, Math.max(0, Number.isFinite(x) ? x : 1));

                    const x = extra.targetSeries3 != null && extra.targetSeries3 !== '' ? parseInt(extra.targetSeries3, 10) : 2;
                    return Math.min(sc, Math.max(0, Number.isFinite(x) ? x : 2));
                })(),
                targetSteps3: (() => {
                    const x = extra.targetSteps3 != null && extra.targetSteps3 !== '' ? parseInt(extra.targetSteps3, 10) : 3;
                    return Math.min(stc, Math.max(1, Number.isFinite(x) ? x : 3));
                })(),
                deadExpanded: extra.deadExpanded && typeof extra.deadExpanded === 'object' ? extra.deadExpanded : {},
                isClosed: extra.isClosed === true,
                closeReason: extra.closeReason === 'auto' ? 'auto' : extra.closeReason === 'manual' ? 'manual' : null,
            };
        };

        const loadPoolsMultiRaw = () => {
            try {
                const raw = localStorage.getItem(POOL_LS_SESSION);
                if (!raw) return null;
                const o = JSON.parse(raw);
                if (o && o.v === 2 && Array.isArray(o.pools) && o.pools.length > 0) {
                    const pools = [];

        /** Ключ раскрытия строки: на главной в одной таблице склеиваются разделы — id могут пересечься между вкладками. */
        const getHistoryExpandKey = (tabKey, itemId) => `${tabKey}::${String(itemId)}`;

        /** Статус экспресса в истории: WIN / LOSE / RETURN (как кнопки Вин / Слив / Возврат). */
        const historyExpressRowStatus = (exp, expressResults) => {
            if (!exp || exp.mode === 'SKIP') return 'SKIP';
            const er = expressResults || {};
            const v = er[exp.id];
            if (v === 'WIN') return 'WON';
            if (v === 'LOSE') return 'LOST';
            if (v === 'RETURN') return 'RETURN';
            return 'PENDING';
        };

        /** Выплата по экспрессу при выбранном исходе (Вин / Возврат / Слив) — для строки с событиями в разборе. */
        const historyExpressPayoutForResult = (exp, resultVal) => {
            if (!exp || exp.mode === 'SKIP' || !resultVal) return null;
            const stake = Number(exp.betAmount) || 0;
            const odd = Number(exp.totalOdd) || 1;
            if (resultVal === 'WIN') return stake * odd;
            if (resultVal === 'RETURN') return stake;
            if (resultVal === 'LOSE') return 0;
            return null;
        };

        /**
         * При закрытии купона с общей строки (Вин / Возврат / Слив) — заполнить expressResults для детального разбора:
         * LOST — все ноги LOSE; WON_MAIN — одна основа WIN (первая в списке), остальные LOSE;
         * WON_INSURE — если есть страховка: первая INSURE WIN, остальные LOSE; иначе первая основа RETURN, остальные LOSE.
         */
        const buildExpressResultsForHistoryRowResolve = (item, outcome) => {
            const expresses = item.expresses || [];
            const er = {};
            const nonSkip = expresses.filter((e) => e.mode !== 'SKIP');
            if (!nonSkip.length) return item.expressResults || {};
            if (outcome === 'LOST') {
                nonSkip.forEach((e) => {
                    er[e.id] = 'LOSE';
                });
                return er;
            }
            if (outcome === 'WON_MAIN') {
                const mains = nonSkip.filter((e) => e.mode === 'MAIN');
                const winner = mains.length ? mains[0] : nonSkip[0];
                nonSkip.forEach((e) => {
                    er[e.id] = e.id === winner.id ? 'WIN' : 'LOSE';
                });
                return er;
            }
            if (outcome === 'WON_INSURE') {
                const insures = nonSkip.filter((e) => e.mode === 'INSURE');
                if (insures.length) {
                    const firstIns = insures[0];
                    nonSkip.forEach((e) => {
                        er[e.id] = e.id === firstIns.id ? 'WIN' : 'LOSE';
                    });
                    return er;
                }
                const mains = nonSkip.filter((e) => e.mode === 'MAIN');
                const returner = mains.length ? mains[0] : nonSkip[0];
                nonSkip.forEach((e) => {
                    er[e.id] = e.id === returner.id ? 'RETURN' : 'LOSE';
                });
                return er;
            }
            return { ...(item.expressResults || {}) };
        };

        /** Для закрытых купонов: подставить правила строки, если в base не проставлены ноги (старые сохранения). Ручные отметки в base имеют приоритет. */
        const mergeHistoryExpressResultsForDisplay = (item) => {
            const base = item.expressResults || {};
            const expresses = item.expresses || [];
            if (item.status === 'PENDING' || !expresses.length) return base;
            const built = buildExpressResultsForHistoryRowResolve(item, item.status);
            const er = { ...base };
            expresses.forEach((e) => {
                if (e.mode === 'SKIP') return;
                const b = base[e.id];
                if (b == null || b === '') er[e.id] = built[e.id];
            });
            return er;
        };

        /** Сумма выплат по текущим отметкам WIN/RETURN (для «Возврат (…)» и сверки с разбором). */
        const historyExpressResultsPayoutSum = (item) => {
            if (!item || !item.expresses || !item.expresses.length) return 0;
            const er = mergeHistoryExpressResultsForDisplay(item);
            let sum = 0;
            item.expresses.forEach((exp) => {
                if (exp.mode === 'SKIP') return;
                const v = er[exp.id];
                if (v === 'WIN' || v === 'RETURN') {
                    const p = historyExpressPayoutForResult(exp, v);
                    if (p != null) sum += p;
                }
            });
            return sum;
        };

        /** Сумма выплат по всем экспрессам с отметкой WIN (в серии один вин — обычно одна строка) — для «Победа (+…)» вместо чистого профита. */
        const historyWinExpressPayoutTotal = (item) => {
            if (!item || !item.expresses || !item.expresses.length) return 0;
            const er = mergeHistoryExpressResultsForDisplay(item);
            let sum = 0;
            item.expresses.forEach((exp) => {
                if (exp.mode === 'SKIP') return;
                if (er[exp.id] !== 'WIN') return;
                const p = historyExpressPayoutForResult(exp, 'WIN');
                if (p != null) sum += p;
            });
            return sum;
        };

        /** Сводка по купону из отметок экспрессов: выплаты, P/L и какая итоговая кнопка (Вин/Возврат/Слив) совпадает. */
        const computeHistoryCouponPreview = (item) => {
            if (!item || item.expressLocalOnly || !item.expresses || !item.expresses.length || item.status !== 'PENDING') return null;
            const er = item.expressResults || {};
            const row = (exp) => historyExpressRowStatus(exp, er);
            let totalPayout = 0;
            item.expresses.forEach((exp) => {
                if (exp.mode === 'SKIP') return;
                const v = er[exp.id];
                if (v === 'WIN') totalPayout += (Number(exp.betAmount) || 0) * (Number(exp.totalOdd) || 1);
                else if (v === 'RETURN') totalPayout += Number(exp.betAmount) || 0;
            });
            const partialPL = totalPayout - (Number(item.gameBank) || 0);
            const mains = item.expresses.filter((e) => e.mode === 'MAIN');
            const insures = item.expresses.filter((e) => e.mode === 'INSURE');
            const mainStates = mains.map(row);
            const allMainsLost = mains.length > 0 && mainStates.every((s) => s === 'LOST');
            const insPending = insures.some((e) => row(e) === 'PENDING');
            const anyInsureSaved = insures.some((e) => {
                const s = row(e);
                return s === 'WON' || s === 'RETURN';
            });
            let suggested = null;
            if (allMainsLost && !insPending) suggested = anyInsureSaved ? 'WON_INSURE' : 'LOST';
            else {
                /** Победа купона только по основе; выигрыш страховки без «слива» всех основ — не WON_MAIN (иначе две победы в серии). */
                const anyMainMarkedWin = mains.some((e) => row(e) === 'WON');
                if (anyMainMarkedWin) suggested = 'WON_MAIN';
            }
            const pendingDetail = item.expresses.filter((e) => e.mode !== 'SKIP' && !er[e.id]).length;
            return { suggested, totalPayout, partialPL, pendingDetail, allMainsLost };
        };

        /**
         * Реализованный (или по текущим отметкам предварительный) P/L серии для статистики и банка:
         * Вин — выплаты по WIN минус gameBank; Слив — −gameBank; Возврат — сумма WIN/RETURN − gameBank;
         * Ожидание с разметкой «как победа» — partialPL из превью, не netProfit калькулятора.
         */
        const historyRealizedProfitForStats = (item) => {
            if (!item) return 0;
            if (item.expressLocalOnly) return 0;
            /** Снимок «Пул лесенок» в общей истории: прибыль = «Закрыли» − старт (не связано с gameBank датчинга). */
            if (item.sourceTab === 'pool' && item.insideSnapshot != null) {
                return poolMoney2(Number(item.insideSnapshot) || 0) - poolMoney2(Number(item.initialPoolBank) || 0);
            }
            const bank = Number(item.gameBank) || 0;
            if (item.status === 'LOST') return -bank;
            if (item.status === 'WON_MAIN') {
                if (item.expresses && item.expresses.length) {
                    const p = historyWinExpressPayoutTotal(item);
                    if (p > 0) return p - bank;
                }
                return Number(item.netProfit) || 0;
            }
            if (item.status === 'WON_INSURE') {
                if (item.expresses && item.expresses.length) {
                    const p = historyExpressResultsPayoutSum(item);
                    return p - bank;
                }
                return 0;
            }
            if (item.status === 'PENDING' && item.expresses && item.expresses.length) {
                const prev = computeHistoryCouponPreview(item);
                if (!prev) return 0;
                if (prev.suggested === 'LOST' || prev.suggested === 'WON_INSURE') return 0;
                const netN = Number(item.netProfit) || 0;
                const anyMainErWin = item.expresses.some((e) => e.mode === 'MAIN' && (item.expressResults || {})[e.id] === 'WIN');
                if (prev.suggested === 'WON_MAIN' || (anyMainErWin && prev.partialPL >= netN - 0.02)) return prev.partialPL;
            }
            return 0;
        };

                    return base;

                if (old) {

                            if (x.startsWith('Классика') || x.startsWith('Экспрессы')) return 'classic';
                            if (x.startsWith('Тоталы')) return 'totals';

                            return 'classic';
                        };
                        arr.forEach((item) => {
                            const k = infer(item.strategy);

        const expressOutcomeNormalizePrediction = (s) => {
            let t = String(s || '')
                .trim()
                .replace(/\s+/g, ' ')
                .toLowerCase();
            t = t.replace(/\u0445/g, 'x');
            t = t.replace(/\s+/g, '');

        /** Пробел между ТБ/ТМ и числом (ТБ 1.5); кириллица явно по коду + лат. TB/TM; ключ исхода не меняется. */
        const expressFormatPredictionTotalDisplaySpacing = (s) => {
            let t = String(s ?? '')
                .replace(/\u00a0/g, ' ')
                .normalize('NFC');
            const reCy = new RegExp(
                `(^|[,;]\\s*)((?:\\u0422|\\u0442)(?:\\u0411|\\u0431|\\u041c|\\u043c))\\s*((?:\\d+)(?:[.,]\\d+)?)`,
                'g',
            );
            t = t.replace(reCy, (_, pre, abbr, num) => {
                const isTb = /[\u0411\u0431]/.test(abbr[1] || '');
                return `${pre}${isTb ? 'ТБ' : 'ТМ'} ${num}`;
            });
            t = t.replace(/(^|[,;]\s*)(TB|tb|TM|tm)\s*((?:\d+)(?:[.,]\d+)?)/g, (_, pre, abbr, num) => {
                const isTb = /^tb$/i.test(abbr);
                return `${pre}${isTb ? 'ТБ' : 'ТМ'} ${num}`;
            });

                    clear();

         *  - общий кэф от 1.8 (ниже 2.00 помечается как «ниже цели»);
         *  - в одном экспрессе нельзя брать два исхода одного матча;
         *  - якоря: все пары/тройки только strong с кэфом каждой ноги ≥ EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD и общим ≥ min (без верхнего потолка); затем прежние якоря; перед выдачей купонов схлопываются дубли одной сигнатуры (одни и те же ноги), попавшие из разных подправил якорей;
         *  - якоря не увеличивают счётчик «не более 3 экспрессов на одну строку прогноза»;
         *  - затем жадная сборка и «пропущенные пары» — лимит 3 только там.
         */
        const buildExpressBundlesFromPicks = (picks) => {
            const coverageMode = true;
            const normalized = (picks || [])
                .map((p) => ({
                    id: p.id,
                    match: String(p.match || '').trim(),
                    matchKey: expressOutcomeNormalizePart(p.match),
                    prediction: expressFormatPredictionTotalDisplaySpacing(String(p.prediction || '').trim()),
                    odd: parseFloat(String(p.odd).replace(',', '.')) || 0,
                    tier: p.tier === 'weak' || p.tier === 'mid' || p.tier === 'strong' ? p.tier : 'mid',
                }))
                .filter((p) => p.match && p.prediction && p.odd >= 1.01);

            if (!normalized.length) {
                return { bundles: [], leftovers: [], message: 'Добавьте строки с матчем, прогнозом и коэффициентом не ниже 1.01.' };
            }

            const dupCheck = new Set();
            for (const p of normalized) {
                const k = expressOutcomeKey(p.match, p.prediction);
                if (dupCheck.has(k)) {
                    return {
                        bundles: [],
                        leftovers: [],
                        message:
                            'В списке есть дубликаты: одна и та же пара «матч + прогноз» встречается дважды. Удалите или измените лишнюю строку. Один матч можно указывать несколько раз с разными исходами.',
                    };
                }
                dupCheck.add(k);
            }

            const normalizedForMain = normalized.filter(
                (p) => Number(p.odd) + 1e-9 < EXPRESS_GEN_MAIN_MAX_LEG_ODD_EXCLUSIVE,
            );

            const bundles = [];
            const useCountById = new Map(normalizedForMain.map((p) => [String(p.id), 0]));
            const useCountByMatch = new Map();
            const usedAtLeastOnce = new Set();
            const usedComboSignatures = new Set();

            const legPassProbability = (leg) => {
                const pTier = EXPRESS_TIER_PROB[leg.tier] || EXPRESS_TIER_PROB.mid;
                const pOddRaw = leg.odd > 0 ? 1 / leg.odd : 0;
                const pOdd = Math.max(0.01, Math.min(0.99, pOddRaw));
                const p = EXPRESS_GEN_TIER_WEIGHT * pTier + (1 - EXPRESS_GEN_TIER_WEIGHT) * pOdd;
                return Math.max(0.01, Math.min(0.99, p));

                if (!legs || legs.length < 2 || legs.length > EXPRESS_GEN_MAX_LEGS) return null;

                if (matchSet.size !== legs.length) return null;

                const totalOdd = roundExpressTotalOdd(totalOddRaw);
                if (totalOdd + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) return null;

                const isBelowTarget = totalOdd < EXPRESS_GEN_TARGET_TOTAL_ODD;
                const meanTierPenalty =
                    legs.reduce((acc, l) => acc + (EXPRESS_TIER_ORDER[l.tier] ?? 1), 0) / Math.max(1, legs.length);
                const avgReusePenalty =
                    legs.reduce((acc, l) => acc + (useCountById.get(String(l.id)) || 0), 0) / Math.max(1, legs.length);
                const avgMatchReuse =
                    legs.reduce((acc, l) => acc + (useCountByMatch.get(String(l.matchKey)) || 0), 0) / Math.max(1, legs.length);

                    worstTier !== 'weak' && totalOdd >= EXPRESS_GEN_COVERAGE_ODD_MIN && totalOdd <= EXPRESS_GEN_COVERAGE_ODD_MAX;

                    (isBelowTarget ? 1 : 0) * 2 +
                    Math.abs(totalOdd - EXPRESS_GEN_TARGET_TOTAL_ODD) * EXPRESS_GEN_ODD_DISTANCE_WEIGHT +
                    meanTierPenalty * 0.2 +
                    (legs.length - 2) * 0.08 -
                    passProbability * 0.2 +
                    avgReusePenalty * 0.08 +
                    avgMatchReuse * (coverageMode ? 0.16 : 0.1) -
                    coverageBonus;
                return {
                    legs,
                    totalOdd,
                    worstTier,
                    passProbability,
                    isBelowTarget,
                    coverageCandidate,

            const anchorPairs = [];
            for (let ai = 0; ai < normalizedForMain.length; ai++) {
                for (let aj = ai + 1; aj < normalizedForMain.length; aj++) {
                    const la = normalizedForMain[ai];
                    const lb = normalizedForMain[aj];

                    if (la.tier !== 'strong' || lb.tier !== 'strong') continue;

                        la.odd + 1e-9 < EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD ||
                        lb.odd + 1e-9 < EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD
                    )
                        continue;

                    if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                    const legs = [la, lb];
                    const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                    const sig = [String(la.id), String(lb.id)].sort().join('|');
                    anchorPairs.push({
                        legs,
                        totalOdd: to,
                        sig,
                        passProbability,
                        worstTier: 'strong',
                        isBelowTarget: to < EXPRESS_GEN_TARGET_TOTAL_ODD,

                for (let aj = ai + 1; aj < normalizedForMain.length; aj++) {
                    for (let ak = aj + 1; ak < normalizedForMain.length; ak++) {
                        const la = normalizedForMain[ai];
                        const lb = normalizedForMain[aj];
                        const lc = normalizedForMain[ak];
                        if (la.matchKey === lb.matchKey || la.matchKey === lc.matchKey || lb.matchKey === lc.matchKey) continue;
                        if (la.tier !== 'strong' || lb.tier !== 'strong' || lc.tier !== 'strong') continue;
                        if (
                            la.odd + 1e-9 < EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD ||
                            lb.odd + 1e-9 < EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD ||
                            lc.odd + 1e-9 < EXPRESS_STRONG_ANCHOR_MIN_LEG_ODD
                        )
                            continue;
                        const to = roundExpressTotalOdd(la.odd * lb.odd * lc.odd);
                        if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                        const legs = [la, lb, lc];
                        const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                        const sig = [String(la.id), String(lb.id), String(lc.id)].sort().join('|');
                        anchorPairs.push({
                            legs,
                            totalOdd: to,
                            sig,
                            passProbability,
                            worstTier: 'strong',
                            isBelowTarget: to < EXPRESS_GEN_TARGET_TOTAL_ODD,
                        });
                    }
                }
            }
            for (let ai = 0; ai < normalizedForMain.length; ai++) {
                for (let aj = ai + 1; aj < normalizedForMain.length; aj++) {
                    const la = normalizedForMain[ai];
                    const lb = normalizedForMain[aj];
                    if (la.matchKey === lb.matchKey) continue;
                    if (la.tier !== 'strong' || lb.tier !== 'strong') continue;
                    const to = roundExpressTotalOdd(la.odd * lb.odd);
                    if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                    if (to >= EXPRESS_GEN_TARGET_TOTAL_ODD) continue;
                    const legs = [la, lb];
                    const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                    const sig = [String(la.id), String(lb.id)].sort().join('|');
                    anchorPairs.push({
                        legs,
                        totalOdd: to,
                        sig,
                        passProbability,
                        worstTier: 'strong',
                        isBelowTarget: true,
                    });
                }
            }
            for (let ai = 0; ai < normalizedForMain.length; ai++) {
                for (let aj = ai + 1; aj < normalizedForMain.length; aj++) {
                    const la = normalizedForMain[ai];
                    const lb = normalizedForMain[aj];
                    if (la.matchKey === lb.matchKey) continue;
                    const sm =
                        (la.tier === 'strong' && lb.tier === 'mid') || (la.tier === 'mid' && lb.tier === 'strong');
                    if (!sm) continue;
                    const to = roundExpressTotalOdd(la.odd * lb.odd);
                    if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                    if (to + 1e-9 < EXPRESS_GEN_TARGET_TOTAL_ODD) continue;
                    const legs = [la, lb];
                    const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                    const sig = [String(la.id), String(lb.id)].sort().join('|');
                    anchorPairs.push({
                        legs,
                        totalOdd: to,
                        sig,
                        passProbability,
                        worstTier: 'mid',
                        isBelowTarget: false,
                    });
                }
            }
            for (let ai = 0; ai < normalizedForMain.length; ai++) {
                for (let aj = ai + 1; aj < normalizedForMain.length; aj++) {
                    for (let ak = aj + 1; ak < normalizedForMain.length; ak++) {
                        const la = normalizedForMain[ai];
                        const lb = normalizedForMain[aj];
                        const lc = normalizedForMain[ak];
                        if (la.matchKey === lb.matchKey || la.matchKey === lc.matchKey || lb.matchKey === lc.matchKey) continue;
                        const tiers = [la.tier, lb.tier, lc.tier];
                        if (tiers.some((t) => t === 'weak')) continue;
                        const nStrong = tiers.filter((t) => t === 'strong').length;
                        const nMid = tiers.filter((t) => t === 'mid').length;
                        if (nStrong !== 2 || nMid !== 1) continue;
                        const to = roundExpressTotalOdd(la.odd * lb.odd * lc.odd);
                        if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                        if (to + 1e-9 < EXPRESS_GEN_TARGET_TOTAL_ODD) continue;
                        const legs = [la, lb, lc];
                        const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                        const sig = [String(la.id), String(lb.id), String(lc.id)].sort().join('|');
                        anchorPairs.push({
                            legs,
                            totalOdd: to,
                            sig,
                            passProbability,
                            worstTier: 'mid',
                            isBelowTarget: false,
                        });
                    }
                }
            }
            anchorPairs.sort((a, b) => (b.passProbability || 0) - (a.passProbability || 0));
            /** Одна сигнатура ног — один якорный купон (иначе новые strong-якоря дублируют старые пары strong+strong [min,2)). */
            const anchorPairsUnique = [];
            const anchorSeenSig = new Set();
            anchorPairs.forEach((ap) => {
                if (anchorSeenSig.has(ap.sig)) return;
                anchorSeenSig.add(ap.sig);
                anchorPairsUnique.push(ap);
            });
            const bundlesAfterAnchorsMark = bundles.length;
            anchorPairsUnique.forEach((ap) => {
                ap.legs.forEach((leg) => {
                    usedAtLeastOnce.add(String(leg.id));
                });
                const coverageCandidate =
                    ap.worstTier !== 'weak' &&
                    ap.totalOdd >= EXPRESS_GEN_COVERAGE_ODD_MIN &&
                    ap.totalOdd <= EXPRESS_GEN_COVERAGE_ODD_MAX;
                bundles.push({
                    id: `b-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
                    legs: ap.legs.map((r) => ({ ...r })),
                    totalOdd: ap.totalOdd,
                    worstTier: ap.worstTier,
                    passProbability: ap.passProbability,
                    isBelowTarget: ap.isBelowTarget,
                    coverageCandidate,
                });
            });
            for (let bi = bundlesAfterAnchorsMark; bi < bundles.length; bi++) {
                const bb = bundles[bi];
                const sig =
                    bb.legs && bb.legs.length
                        ? bb.legs
                              .map((l) => String(l.id))
                              .sort()
                              .join('|')
                        : '';
                if (sig) usedComboSignatures.add(sig);
            }

            while (true) {
                const available = normalizedForMain.filter((p) => (useCountById.get(String(p.id)) || 0) < EXPRESS_GEN_MAX_REUSE_PER_PICK);
                if (available.length < 2) break;
                const candidates = [];
                for (let i = 0; i < available.length; i++) {
                    for (let j = i + 1; j < available.length; j++) {
                        const pair = [available[i], available[j]];
                        const c2 = buildCandidate(pair);
                        if (c2) candidates.push(c2);
                        for (let k = j + 1; k < available.length; k++) {
                            const c3 = buildCandidate([available[i], available[j], available[k]]);
                            if (c3) candidates.push(c3);
                        }
                    }
                }
                if (!candidates.length) break;
                candidates.sort((a, b) => {
                    if (a.score !== b.score) return a.score - b.score;
                    if (a.passProbability !== b.passProbability) return b.passProbability - a.passProbability;
                    if (a.legs.length !== b.legs.length) return a.legs.length - b.legs.length;
                    return Math.abs(a.totalOdd - EXPRESS_GEN_TARGET_TOTAL_ODD) - Math.abs(b.totalOdd - EXPRESS_GEN_TARGET_TOTAL_ODD);
                });
                let picked = null;
                for (const c of candidates) {
                    const sig = c.legs
                        .map((l) => String(l.id))
                        .sort()
                        .join('|');
                    if (!usedComboSignatures.has(sig)) {
                        picked = { ...c, sig };
                        break;
                    }
                }
                if (!picked) break;
                picked.legs.forEach((leg) => {
                    const id = String(leg.id);
                    useCountById.set(id, (useCountById.get(id) || 0) + 1);
                    const mk = String(leg.matchKey);
                    useCountByMatch.set(mk, (useCountByMatch.get(mk) || 0) + 1);
                    usedAtLeastOnce.add(id);
                });
                usedComboSignatures.add(picked.sig);
                bundles.push({
                    id: `b-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
                    legs: picked.legs.map((r) => ({ ...r })),
                    totalOdd: roundExpressTotalOdd(picked.totalOdd),
                    worstTier: picked.worstTier,
                    passProbability: picked.passProbability,
                    isBelowTarget: picked.isBelowTarget,
                    coverageCandidate: picked.coverageCandidate,
                });
            }

            /** Добавить валидные 2-исходных пары, которые жадный цикл мог не взять из-за порядка score (исходы «сгорели» в других купонах). */
            const existingPairSigs = new Set(
                bundles.map((b) => (b.legs && b.legs.length === 2 ? b.legs.map((l) => String(l.id)).sort().join('|') : '')).filter(Boolean),
            );
            const reuseAfterGreedy = new Map(useCountById);
            const missingTwoLeg = [];
            for (let i = 0; i < normalizedForMain.length; i++) {
                for (let j = i + 1; j < normalizedForMain.length; j++) {
                    const la = normalizedForMain[i];
                    const lb = normalizedForMain[j];
                    if (la.matchKey === lb.matchKey) continue;
                    const to = roundExpressTotalOdd(la.odd * lb.odd);
                    if (to + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                    const sig = [String(la.id), String(lb.id)].sort().join('|');
                    if (existingPairSigs.has(sig)) continue;
                    const legs = [la, lb];
                    const passProbability = legs.reduce((acc, l) => acc * legPassProbability(l), 1);
                    const worstTier = legs.some((r) => r.tier === 'weak') ? 'weak' : legs.some((r) => r.tier === 'mid') ? 'mid' : 'strong';
                    const isBelowTarget = to < EXPRESS_GEN_TARGET_TOTAL_ODD;
                    missingTwoLeg.push({ legs, totalOdd: to, sig, passProbability, worstTier, isBelowTarget });
                }
            }
            missingTwoLeg.sort((a, b) => (b.passProbability || 0) - (a.passProbability || 0));
            missingTwoLeg.forEach((c) => {
                const [la, lb] = c.legs;
                const ida = String(la.id);
                const idb = String(lb.id);
                if ((reuseAfterGreedy.get(ida) || 0) >= EXPRESS_GEN_MAX_REUSE_PER_PICK) return;
                if ((reuseAfterGreedy.get(idb) || 0) >= EXPRESS_GEN_MAX_REUSE_PER_PICK) return;
                if (existingPairSigs.has(c.sig)) return;
                existingPairSigs.add(c.sig);
                reuseAfterGreedy.set(ida, (reuseAfterGreedy.get(ida) || 0) + 1);
                reuseAfterGreedy.set(idb, (reuseAfterGreedy.get(idb) || 0) + 1);
                const coverageCandidate =
                    c.worstTier !== 'weak' && c.totalOdd >= EXPRESS_GEN_COVERAGE_ODD_MIN && c.totalOdd <= EXPRESS_GEN_COVERAGE_ODD_MAX;
                bundles.push({
                    id: `b-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
                    legs: c.legs.map((r) => ({ ...r })),
                    totalOdd: c.totalOdd,
                    worstTier: c.worstTier,
                    passProbability: c.passProbability,
                    isBelowTarget: c.isBelowTarget,
                    coverageCandidate,
                });
            });

            bundles.sort((a, b) => {
                const pa = a.passProbability || 0;
                const pb = b.passProbability || 0;
                if (pa !== pb) return pb - pa;
                if (a.isBelowTarget !== b.isBelowTarget) return a.isBelowTarget ? 1 : -1;
                const dA = Math.abs(a.totalOdd - EXPRESS_GEN_TARGET_TOTAL_ODD);
                const dB = Math.abs(b.totalOdd - EXPRESS_GEN_TARGET_TOTAL_ODD);
                if (dA !== dB) return dA - dB;
                return a.legs.length - b.legs.length;
            });
            const leftovers = normalizedForMain.filter((p) => !usedAtLeastOnce.has(String(p.id)));
            let message = '';
            if (bundles.length === 0) {
                message =
                    leftovers.length > 0
                        ? 'Не удалось собрать ни одного валидного экспресса (2-3 исхода, кэф от 1.8, ноги с кэфом < 2).'
                        : 'Нет валидных прогнозов для сборки.';
            } else {
                message = `Собрано экспрессов: ${bundles.length}.`;
            }

            return { bundles, leftovers, message };
        };

        /** Только исходы 1х2 «П1 / П2» (без ничьей), по нормализованному ключу. */
        const expressPredictionIsWin12Only = (prediction) => {
            const k = expressOutcomeNormalizePrediction(prediction);
            return k === 'п1' || k === 'п2' || k === 'p1' || k === 'p2' || k === 'w1' || k === 'w2' || k === '1' || k === '2';
        };

        /** Прогноз — рынок тотала (ТБ/ТМ и линия), после нормализации ключа исхода. */
        const expressPredictionIsTotalMarket = (prediction) => {
            const k = expressOutcomeNormalizePrediction(prediction);
            if (!k) return false;
            if (/^т[бм](?:\d+[.,]\d+|\d+)$/.test(k)) return true;
            if (/^tb(?:\d+[.,]\d+|\d+)$/i.test(k)) return true;
            if (/^tm(?:\d+[.,]\d+|\d+)$/i.test(k)) return true;
            return false;
        };

        /** Вероятность прохода экспресса по кэфам: произведение имплицитных p_i = 1 / kf_i (независимые исходы). */
        const expressPassProbabilityFromImpliedOdds = (legs) => {
            const p = (legs || []).reduce((acc, l) => {
                const o = Math.max(1.01, Number(l.odd) || 1.01);
                return acc * (1 / o);
            }, 1);
            return Math.max(0.0001, Math.min(0.99, p));
        };

        /** Все сочетания индексов длины k из n без повторов. */
        const expressIndexCombinations = (n, k) => {
            const out = [];
            const cur = [];
            const dfs = (start) => {
                if (cur.length === k) {
                    out.push([...cur]);
                    return;
                }
                for (let i = start; i < n; i++) {
                    cur.push(i);
                    dfs(i + 1);
                    cur.pop();
                }
            };
            dfs(0);
            return out;
        };

        /** Оценка числа комбинаций 2…n по разным матчам (верхняя граница при уникальных матчах): 2^n − n − 1. */
        const expressTotalsComboCountUpperBound = (n) => (n >= 31 ? Number.POSITIVE_INFINITY : 2 ** n - n - 1);

        /**
         * Все допустимые экспрессы только из тоталов: от 2 до числа доступных исходов (ног),
         * не более одного исхода с матча, общий кэф ≥ EXPRESS_GEN_MIN_TOTAL_ODD.
         * Вероятность — имплицитная по кэфам.
         */
        const buildExpressTotalsCombinatorialBundles = (picks) => {
            const MAX_COMBO_ESTIMATE = 220000;
            const roundExpressTotalOdd = (raw) => Math.round(Number(raw) * 10000) / 10000;
            const normalized = (picks || [])
                .map((p) => ({
                    id: p.id,
                    match: String(p.match || '').trim(),
                    matchKey: expressOutcomeNormalizePart(p.match),
                    prediction: expressFormatPredictionTotalDisplaySpacing(String(p.prediction || '').trim()),
                    odd: parseFloat(String(p.odd).replace(',', '.')) || 0,
                    tier: p.tier === 'weak' || p.tier === 'mid' || p.tier === 'strong' ? p.tier : 'mid',
                }))
                .filter((p) => p.match && expressPredictionIsTotalMarket(p.prediction) && p.odd >= 1.01);

            if (!normalized.length) {
                return { bundles: [], message: '' };
            }

            const dupCheck = new Set();
            for (const p of normalized) {
                const k = expressOutcomeKey(p.match, p.prediction);
                if (dupCheck.has(k)) {
                    return {
                        bundles: [],
                        message:
                            'В тоталах есть дубликат «матч + прогноз». Удалите лишнее — для комбинаций нужны уникальные исходы.',
                    };
                }
                dupCheck.add(k);
            }

            let n = normalized.length;
            while (n > 2 && expressTotalsComboCountUpperBound(n) > MAX_COMBO_ESTIMATE) {
                n -= 1;
            }
            const pool = normalized.slice(0, n);
            let truncatedNote = '';
            if (n < normalized.length) {
                truncatedNote = ` Для перебора учтены первые ${n} тоталов (лимит объёма комбинаций).`;
            }

            const bundles = [];
            const maxK = pool.length;
            for (let k = 2; k <= maxK; k++) {
                const idxCombos = expressIndexCombinations(pool.length, k);
                for (const idxs of idxCombos) {
                    const legs = idxs.map((i) => pool[i]);
                    const matchSet = new Set(legs.map((l) => l.matchKey));
                    if (matchSet.size !== legs.length) continue;
                    const totalOddRaw = legs.reduce((acc, l) => acc * l.odd, 1);
                    const totalOdd = roundExpressTotalOdd(totalOddRaw);
                    if (totalOdd + 1e-9 < EXPRESS_GEN_MIN_TOTAL_ODD) continue;
                    const passProbability = expressPassProbabilityFromImpliedOdds(legs);
                    const worstTier = legs.some((r) => r.tier === 'weak')
                        ? 'weak'
                        : legs.some((r) => r.tier === 'mid')
                          ? 'mid'
                          : 'strong';
                    const isBelowTarget = totalOdd < EXPRESS_GEN_TARGET_TOTAL_ODD;
                    const coverageCandidate =
                        worstTier !== 'weak' &&
                        totalOdd >= EXPRESS_GEN_COVERAGE_ODD_MIN &&
                        totalOdd <= EXPRESS_GEN_COVERAGE_ODD_MAX;
                    const sig = legs
                        .map((l) => String(l.id))
                        .sort()
                        .join('|');
                    bundles.push({
                        id: `bt-${k}-${sig.replace(/\|/g, '-')}`,
                        legs: legs.map((r) => ({ ...r })),
                        totalOdd,
                        worstTier,
                        passProbability,
                        isBelowTarget,
                        coverageCandidate,
                        expressCategory: 'totals',
                    });
                }
            }

            bundles.sort((a, b) => {
                const pa = a.passProbability || 0;
                const pb = b.passProbability || 0;
                if (pa !== pb) return pb - pa;
                return (Number(b.totalOdd) || 0) - (Number(a.totalOdd) || 0);
            });

            let message = '';
            if (bundles.length === 0) {
                message =
                    pool.length < 2
                        ? 'Для тоталов нужно минимум два разных матча с кэфами тотала.'
                        : `Нет тотал-экспрессов с общим кэфом от ${EXPRESS_GEN_MIN_TOTAL_ODD} (от 2 ног до числа матчей в списке).`;
            } else {
                message = `Тотал: собрано комбинаций ${bundles.length}.${truncatedNote}`;
            }
            return { bundles, message };
        };

        /** Одиночки: любые исходы с кэфом от 1.8 (в т.ч. ≥ 2); вероятность от кэфа. */
        const buildExpressOrdinarySingles = (picks) => {
            const roundOdd = (raw) => Math.round(Number(raw) * 10000) / 10000;
            const normalized = (picks || [])
                .map((p) => ({
                    id: p.id,
                    match: String(p.match || '').trim(),
                    matchKey: expressOutcomeNormalizePart(p.match),
                    prediction: expressFormatPredictionTotalDisplaySpacing(String(p.prediction || '').trim()),
                    odd: parseFloat(String(p.odd).replace(',', '.')) || 0,
                    tier: p.tier === 'weak' || p.tier === 'mid' || p.tier === 'strong' ? p.tier : 'mid',
                }))
                .filter((p) => p.match && p.odd >= 1.01);

            const singles = normalized
                .filter((p) => p.prediction)
                .filter(
                    (p) =>
                        (p.odd + 1e-9 >= EXPRESS_GEN_MIN_TOTAL_ODD && p.odd + 1e-9 < EXPRESS_GEN_TARGET_TOTAL_ODD) ||
                        p.odd + 1e-9 >= EXPRESS_GEN_TARGET_TOTAL_ODD,
                )
                .map((leg) => ({
                    id: `o-${String(leg.id)}`,
                    legs: [{ ...leg }],
                    totalOdd: roundOdd(leg.odd),
                    worstTier: leg.tier,
                    passProbability: expressPassProbabilityFromImpliedOdds([leg]),
                    isBelowTarget: leg.odd < EXPRESS_GEN_TARGET_TOTAL_ODD,
                    coverageCandidate: false,
                    expressCategory: 'ordinary',
                }));

            singles.sort((a, b) => {
                const pa = Number(a.passProbability) || 0;
                const pb = Number(b.passProbability) || 0;
                if (pa !== pb) return pb - pa;
                return (Number(b.totalOdd) || 0) - (Number(a.totalOdd) || 0);
            });

            const message = singles.length ? ` Ординар: ${singles.length}.` : '';
            return { bundles: singles, message };
        };

        /**
         * Crazy 1x2: до 3 экспрессов из П1/П2 по списку прогнозов — максимальный набор ног, затем урезания по «риску».
         * Не смешивается с тоталами; не кладётся в expressBundles.
         */
        const buildExpressCrazyWin12Ladder = (picks) => {
            const CRAZY_WIN12_MAX_LEGS = 20;
            const CRAZY_WIN12_MAX_COUPONS = 3;
            const roundExpressTotalOdd = (raw) => Math.round(Number(raw) * 10000) / 10000;
            const tierOrder = { strong: 0, mid: 1, weak: 2 };
            const legSig = (legs) =>
                (legs || [])
                    .map((l) => String(l.id))
                    .sort()
                    .join('|');
            const normalized = (picks || [])
                .map((p) => ({
                    id: p.id,
                    match: String(p.match || '').trim(),
                    matchKey: expressOutcomeNormalizePart(p.match),
                    prediction: expressFormatPredictionTotalDisplaySpacing(String(p.prediction || '').trim()),
                    odd: parseFloat(String(p.odd).replace(',', '.')) || 0,
                    tier: p.tier === 'weak' || p.tier === 'mid' || p.tier === 'strong' ? p.tier : 'mid',
                }))
                .filter((p) => p.match && p.prediction && p.odd >= 1.01 && expressPredictionIsWin12Only(p.prediction));

            const pickBetter = (a, b) => {
                const ta = tierOrder[a.tier] ?? 1;
                const tb = tierOrder[b.tier] ?? 1;
                if (ta !== tb) return ta < tb ? a : b;
                return a.odd >= b.odd ? a : b;
            };

            const byMatch = new Map();
            normalized.forEach((p) => {
                const mk = p.matchKey;
                const cur = byMatch.get(mk);
                if (!cur) byMatch.set(mk, p);
                else byMatch.set(mk, pickBetter(cur, p));
            });
            let pool = [...byMatch.values()];
            if (pool.length < 2) return [];

            pool.sort((a, b) => {
                const ta = tierOrder[a.tier] ?? 1;
                const tb = tierOrder[b.tier] ?? 1;
                if (ta !== tb) return ta - tb;
                return b.odd - a.odd;
            });
            if (pool.length > CRAZY_WIN12_MAX_LEGS) pool = pool.slice(0, CRAZY_WIN12_MAX_LEGS);

            const legRisk = (lg) => {
                const tr = tierOrder[lg.tier] ?? 1;
                const impl = 1 / Math.max(1.01, Number(lg.odd) || 1.01);
                return tr * 50 + impl * 100;
            };
            const removeWorstLegs = (legs, removeCountRaw) => {
                const n0 = legs.length;
                const maxRem = Math.max(0, n0 - 2);
                const removeCount = Math.min(Math.max(0, removeCountRaw | 0), maxRem);
                if (removeCount <= 0) return legs.slice();
                const idxs = legs.map((lg, i) => ({ i, r: legRisk(lg) }));
                idxs.sort((a, b) => b.r - a.r);
                const drop = new Set(idxs.slice(0, removeCount).map((x) => x.i));
                return legs.filter((_, i) => !drop.has(i));
            };

            const bundleFromLegs = (legs, idx) => {
                const to = roundExpressTotalOdd(legs.reduce((acc, l) => acc * Math.max(1.01, Number(l.odd) || 1.01), 1));
                const passProbability = expressPassProbabilityFromImpliedOdds(legs);
                const worstTier = legs.some((l) => l.tier === 'weak')
                    ? 'weak'
                    : legs.some((l) => l.tier === 'mid')

          const choosePoolSlotByMinStake = (pool) => {
              if (!pool || !pool.session || !pool.session.series) return null;
              const slots = poolNextBetSlots(pool.session.series);
              if (!slots.length) return null;
              const ranked = slots
                  .map((slot) => {
                      const st = pool.session.series[slot.si] && pool.session.series[slot.si].steps[slot.wi];
                      return {
                          ...slot,
                          stake: poolMoney2(Number(st && st.stake) || 0),
                      };
                  })
                  .sort((a, b) => {
                      if (a.stake !== b.stake) return a.stake - b.stake;
                      if (a.wi !== b.wi) return a.wi - b.wi;
                      return a.si - b.si;
                  });
              return ranked[0] || null;
          };

          const commitLineBundleToPoolFromModal = () => {
              const m = lineStrategyDollarModal;
              if (!m || !m.bundle) return;
              const openPools = (poolMultiRef.current.pools || []).filter((p) => !p.isClosed);
              if (!openPools.length) {
                  setLineStrategyDollarModal({ ...m, poolErr: 'Нет открытых пулов для добавления.' });
                  return;
              }
              const pid = m.poolId || (openPools[0] && openPools[0].id) || '';
              const targetPool = openPools.find((p) => String(p.id) === String(pid));
              if (!targetPool) {
                  setLineStrategyDollarModal({ ...m, poolErr: 'Выберите открытый пул.' });
                  return;
              }
              const slot = choosePoolSlotByMinStake(targetPool);
              if (!slot) {
                  setLineStrategyDollarModal({ ...m, poolErr: `В пуле «${targetPool.name}» нет доступных шагов для новой ставки.` });
                  return;

              setPoolMulti((pm) => ({
                  ...pm,
                  activePoolId: targetPool.id,
                  pools: pm.pools.map((p) => {
                      if (String(p.id) !== String(targetPool.id)) return p;
                      const next = JSON.parse(JSON.stringify(p.session));
                      const step = next.series[slot.si].steps[slot.wi];
                      const sourceLegs = (m.bundle.legs || []).slice(0, 3);
                      step.legs = [poolEmptyLeg(), poolEmptyLeg(), poolEmptyLeg()];
                      sourceLegs.forEach((lg, i) => {
                          step.legs[i] = {
                              matchName: String(lg.match || '').trim(),
                              market: String(lg.prediction || '').trim(),
                              odd: poolMoney2(Number(lg.odd) || 0),

                      return { ...p, session: next };

              }));

          const commitLineStrategyDollarModal = () => {
              const m = lineStrategyDollarModal;

              const stake = poolMoney2(parseFloat(String(m.stakeStr || '').replace(',', '.')) || 0);
              if (!(stake > 0)) {
                  setLineStrategyDollarModal({ ...m, err: 'Введите сумму ставки больше нуля.' });
                  return;

              const sid = m.strategyId;
              const strat = (lineStrategiesData.strategies || []).find((s) => String(s.id) === String(sid));

                  setLineStrategyDollarModal({ ...m, err: 'Выберите стратегию.' });

          const transferFromLineStrategyToMain = (strategyId, rawAmount) => {
              const amt = poolMoney2(parseFloat(String(rawAmount || '').replace(',', '.')) || 0);

              const s = (lineStrategiesData.strategies || []).find((z) => String(z.id) === String(strategyId));
              if (!s) return;
              const cur = poolMoney2(Number(s.bank) || 0);
              if (amt > cur + 1e-9) return;
              setMainBank((prev) => poolMoney2((parseFloat(prev) || 0) + amt).toFixed(2));
              setLineStrategiesData((prev) => ({
                  ...prev,
                  strategies: (prev.strategies || []).map((ss) =>
                      String(ss.id) === String(strategyId)

                  ),
              }));
              setLineStrategyXferOut((x) => ({ ...x, [strategyId]: '' }));
          };

          const settleLineStrategyPick = (pickId, outcome) => {
              const st = outcome === 'WIN' ? 'WON' : outcome === 'LOST' ? 'LOST' : 'RETURN';
              setLineStrategiesData((prev) => {
                  const picks = prev.picks || [];
                  const idx = picks.findIndex((p) => String(p.id) === String(pickId));
                  if (idx < 0) return prev;
                  const p = picks[idx];
                  if (p.status !== 'PENDING') return prev;
                  const odds = Number(p.bundle.totalOdd) || 1;
                  const stake = poolMoney2(Number(p.stake) || 0);
                  let bankDelta = 0;
                  if (st === 'WON') bankDelta = poolMoney2(stake * odds);
                  else if (st === 'RETURN') bankDelta = stake;
                  const nextStrategies = (prev.strategies || []).map((s) => {
                      if (String(s.id) !== String(p.strategyId)) return s;
                      return { ...s, bank: poolMoney2((Number(s.bank) || 0) + bankDelta) };
                  });
                  const nextPicks = picks.map((pp, i) => (i === idx ? { ...pp, status: st } : pp));
                  return { strategies: nextStrategies, picks: nextPicks };
              });
          };

          const changeLineStrategyPickOutcome = (pickId, outcome) => {
              const st = outcome === 'WIN' ? 'WON' : outcome === 'LOST' ? 'LOST' : 'RETURN';
              setLineStrategyPickEditId(null);
              setLineStrategiesData((prev) => {
                  const picks = prev.picks || [];
                  const idx = picks.findIndex((p) => String(p.id) === String(pickId));
                  if (idx < 0) return prev;
                  const p = picks[idx];
                  if (p.status === 'PENDING' || p.status === st) return prev;
                  const odds = Number(p.bundle.totalOdd) || 1;
                  const stake = poolMoney2(Number(p.stake) || 0);
                  let undo = 0;
                  if (p.status === 'WON') undo = poolMoney2(-poolMoney2(stake * odds));
                  else if (p.status === 'RETURN') undo = poolMoney2(-stake);
                  else undo = 0;
                  let apply = 0;
                  if (st === 'WON') apply = poolMoney2(stake * odds);
                  else if (st === 'RETURN') apply = stake;
                  else apply = 0;
                  const net = poolMoney2(undo + apply);
                  const nextStrategies = (prev.strategies || []).map((s) => {
                      if (String(s.id) !== String(p.strategyId)) return s;
                      return { ...s, bank: poolMoney2((Number(s.bank) || 0) + net) };
                  });
                  const nextPicks = picks.map((pp, i) => (i === idx ? { ...pp, status: st } : pp));
                  return { strategies: nextStrategies, picks: nextPicks };
              });
