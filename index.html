                          const h = Math.min(23, Math.max(0, parseInt(hh, 10) || 0));
                          const m = Math.min(59, Math.max(0, parseInt(mm, 10) || 0));
                          const cand = `${String(h).padStart(2, '0')}-${String(m).padStart(2, '0')}`;
                          if (!EXPRESS_BUILDER_TIME_OPTIONS.includes(cand)) {
                              setExpressGenMessage('Время: слот 16-00 … 23-30 с шагом 30 мин или оставьте пусто.');
                              return;
                          }
                          timeStr = cand;
                      } else {
                          setExpressGenMessage('Время: 24 ч, формат ЧЧ-ММ (например 19-30).');
                          return;
                      }
                  }
                  const newMatch = {
                      id: `line-${Date.now()}`,
                      time: timeStr,
                      home: expressBuilderHome.trim(),
                      away: expressBuilderAway.trim(),
                      odds: { w1, x: ox, w2 },
                  };
                  setExpressLineDayData((prev) => {
                      const idx = prev.findIndex((l) => l.id === meta.id);
                      if (idx >= 0) {
                          const next = [...prev];
                          next[idx] = { ...next[idx], matches: [...next[idx].matches, newMatch] };
                          return next;
                      }
                      return [...prev, { id: meta.id, title: meta.title, matches: [newMatch] }];
                  });
                  setExpressLineLeagueExpanded((prev) => ({ ...prev, [meta.id]: true }));
                  setExpressGenMessage(`Матч добавлен в блок «${meta.title}».`);
                  setExpressBuilderLeagueId('');
                  setExpressBuilderHome('');
                  setExpressBuilderAway('');
                  setExpressBuilderO1('');
                  setExpressBuilderOx('');
                  setExpressBuilderO2('');
                  setExpressBuilderTime('');
                  setExpressBuilderTimeMenuOpen(false);
                  setExpressBuilderO1MenuOpen(false);
                  setExpressBuilderOxMenuOpen(false);
                  setExpressBuilderO2MenuOpen(false);
                  setExpressBuilderOddEditField('');
                  setExpressBuilderOddDraft('');
              };

              const expressLineBuilderTimeSelectValue = EXPRESS_BUILDER_TIME_OPTIONS.includes(String(expressBuilderTime || '').trim())
                  ? String(expressBuilderTime).trim()
                  : '';

              const bumpExpressBuilderTime = (delta) => {
                  const opts = EXPRESS_BUILDER_TIME_OPTIONS;
                  const cur = String(expressBuilderTime || '').trim();
                  let idx = opts.indexOf(cur);
                  if (idx < 0) {
                      if (delta > 0) setExpressBuilderTime(opts[0]);
                      return;
                  }
                  const next = idx + delta;
                  if (next < 0) setExpressBuilderTime('');
                  else if (next >= opts.length) setExpressBuilderTime(opts[opts.length - 1]);
                  else setExpressBuilderTime(opts[next]);
              };

              const bumpExpressBuilderOddField = (setter, delta) => {
                  const opts = EXPRESS_BUILDER_ODDS_QUICK_LIST;
                  setter((prevRaw) => {
                      const cur = String(prevRaw || '').trim();
                      const idx = opts.indexOf(cur);
                      if (idx >= 0) {
                          const next = idx + delta;
                          if (next < 0) return '';
                          if (next >= opts.length) return opts[opts.length - 1];
                          return opts[next];
                      }
                      const v = parseFloat(cur.replace(',', '.'));
                      if (!Number.isFinite(v) || cur === '') {
                          if (delta > 0) return opts[0];
                          return prevRaw;
                      }
                      const nextVal = Math.round((v + delta * 0.1) * 10) / 10;
                      if (nextVal < 1.0) return '';
                      return String(Math.min(99, nextVal));
                  });
              };

              const normalizeExpressBuilderOddManualValue = (raw) => {
                  const prepared = String(raw || '').trim().replace(',', '.');
                  if (!prepared) return '';
                  const n = parseFloat(prepared);
                  if (!Number.isFinite(n)) return null;
                  const rounded = Math.round(n * 10) / 10;
                  const bounded = Math.min(99, Math.max(1.0, rounded));
                  return bounded.toFixed(1);
              };

              const startExpressBuilderOddEdit = (field, currentValue) => {
                  setExpressBuilderTimeMenuOpen(false);
                  setExpressBuilderO1MenuOpen(false);
                  setExpressBuilderOxMenuOpen(false);
                  setExpressBuilderO2MenuOpen(false);
                  setExpressBuilderOddEditField(field);
                  setExpressBuilderOddDraft(String(currentValue || '').trim());
              };

              const commitExpressBuilderOddEdit = (field) => {
                  const normalized = normalizeExpressBuilderOddManualValue(expressBuilderOddDraft);
                  if (normalized === null) {
                      setExpressGenMessage('Кэф должен быть числом с шагом 0.1 (например 1.0, 1.7, 2.8).');
                      return;
                  }
                  if (field === 'o1') setExpressBuilderO1(normalized);
                  if (field === 'ox') setExpressBuilderOx(normalized);
                  if (field === 'o2') setExpressBuilderO2(normalized);
                  setExpressBuilderOddEditField('');
                  setExpressBuilderOddDraft('');
              };

              const cancelExpressBuilderOddEdit = () => {
                  setExpressBuilderOddEditField('');
                  setExpressBuilderOddDraft('');
              };

              return (
                  <div className="mx-auto w-full min-w-0 max-w-6xl space-y-6 overflow-visible px-0 pb-10 sm:px-1">
                      <details className="group rounded-xl border border-fuchsia-500/35 bg-fuchsia-950/25 text-fuchsia-100 shadow-inner open:bg-fuchsia-950/35">
                          <summary className="cursor-pointer list-none px-3 py-2.5 text-sm font-bold text-fuchsia-50/95 marker:content-none [&::-webkit-details-marker]:hidden flex items-center gap-2 select-none hover:bg-fuchsia-900/20 rounded-xl">
                              <ChevronDown size={16} className="shrink-0 text-fuchsia-300/90 transition-transform group-open:rotate-180" aria-hidden />
                              <span>Как работает конструктор и линия дня</span>
                          </summary>
                          <div className="border-t border-fuchsia-500/20 px-3 pb-3 pt-2 text-xs leading-relaxed text-fuchsia-100/95">
                              <b>Конструктор:</b> внесите прогнозы (матч, исход, кэф) и метки уверенности. По «Сгенерировать» собираются купоны из{' '}
                              <span className="font-mono font-black">2–3</span> исходов с общим кэфом от <span className="font-mono font-black">1.8</span>.{' '}
                              В один экспресс не попадают два исхода одного матча, а один исход может повторяться в нескольких экспрессах (до 3 раз). Сначала в очередь якорей попадают пары «оба уверенных» с кэфом до 2.0, пары «уверенный + средний» с кэфом от 2.0 и тройки «два уверенных + средний» с кэфом от 2.0. Это эвристика, не прогноз вероятности.
                              <span className="mt-2 block text-fuchsia-200/80">
                                  <b>Линия дня:</b> клик по кэфу сразу добавляет исход в список прогнозов (метка по умолчанию «Средний» — её можно сменить в таблице ниже). Повторный клик по уже выбранному кэфу снимает прогноз. Ниже можно собрать матч вручную и отправить его в линию в нужный блок лиги.
                              </span>
                          </div>
                      </details>

                      <div className="relative z-40 min-w-0 max-w-full overflow-visible rounded-xl border border-fuchsia-500/35 bg-slate-900/90 p-2 shadow-md backdrop-blur-md sm:p-2.5">
                          <div className="mb-1.5 flex flex-col gap-2 min-[520px]:flex-row min-[520px]:flex-wrap min-[520px]:items-center min-[520px]:justify-between">
                              <h3 className="min-w-0 text-[10px] font-black uppercase tracking-wide text-fuchsia-200/95">Добавить в линию</h3>
                              <button
                                  type="button"
                                  onClick={addCustomMatchToExpressLine}
                                  className="w-full shrink-0 rounded-lg bg-gradient-to-r from-fuchsia-600 to-rose-600 px-3 py-1.5 text-[10px] font-black uppercase tracking-wide text-white shadow-sm transition hover:from-fuchsia-500 hover:to-rose-500 min-[520px]:w-auto"
                              >
                                  Добавить матч
                              </button>
                          </div>
                          <div className="flex min-w-0 max-w-full flex-wrap items-end gap-x-2 gap-y-2 overflow-visible">
                              <div className="min-w-0 basis-full sm:basis-[min(100%,10rem)] sm:max-w-[min(100%,15rem)] sm:flex-1">
                                  <label className="mb-0.5 block text-[9px] font-bold uppercase tracking-wide text-slate-500">Лига</label>
                                  <select
                                      value={expressBuilderLeagueId}
                                      onChange={(e) => {
                                          setExpressBuilderLeagueId(e.target.value);
                                          setExpressBuilderHome('');
                                          setExpressBuilderAway('');
                                      }}
                                      className="h-8 w-full rounded-md border border-slate-600 bg-slate-950 px-1.5 py-0.5 text-xs font-semibold text-slate-100 outline-none focus:border-fuchsia-500"
                                  >
                                      <option value="">Лига…</option>
                                      {EXPRESS_LEAGUES_CATALOG.map((lg) => (
                                          <option key={lg.id} value={lg.id}>
                                              {lg.title}
                                          </option>
                                      ))}
                                  </select>
                              </div>
                              <div ref={expressBuilderTimeMenuRef} className="relative z-30 w-[min(100%,6rem)] shrink-0 overflow-visible">
                                  <label className="mb-0.5 block text-[9px] font-bold uppercase tracking-wide text-slate-500" htmlFor="express-line-builder-time-btn">
                                      Время · ЧЧ‑ММ
                                  </label>
                                  <div className="flex h-8 overflow-hidden rounded-md border border-slate-600 bg-slate-950 shadow-sm">
                                      <button
                                          id="express-line-builder-time-btn"
                                          type="button"
                                          onClick={() => {
                                              setExpressBuilderO1MenuOpen(false);
                                              setExpressBuilderOxMenuOpen(false);
                                              setExpressBuilderO2MenuOpen(false);
                                              setExpressBuilderTimeMenuOpen((o) => !o);
                                          }}
                                          aria-expanded={expressBuilderTimeMenuOpen}
                                          aria-haspopup="listbox"
                                          title="Клик — список 16-00 … 23-30 (шаг 30 мин); стрелки — ±30 мин по слотам"
                                          className="min-w-0 flex-1 cursor-pointer truncate border-0 bg-transparent px-1 text-center font-mono text-xs tabular-nums text-slate-100 outline-none hover:bg-slate-900/80 focus-visible:ring-1 focus-visible:ring-fuchsia-500/70"
                                      >
                                          {expressLineBuilderTimeSelectValue || '—'}
                                      </button>
                                      <div className="flex h-8 w-5 shrink-0 flex-col border-l border-slate-600/90 bg-slate-900/75">
                                          <button
                                              type="button"
                                              aria-label="На полчаса позже"
                                              title="Следующий слот"
                                              className="flex flex-1 items-center justify-center border-b border-slate-600/55 text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                              onMouseDown={(e) => e.preventDefault()}
                                              onClick={() => bumpExpressBuilderTime(1)}
                                          >
                                              <ChevronUp size={11} className="shrink-0" aria-hidden />
                                          </button>
                                          <button
                                              type="button"
                                              aria-label="На полчаса раньше"
                                              title="Предыдущий слот"
                                              className="flex flex-1 items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                              onMouseDown={(e) => e.preventDefault()}
                                              onClick={() => bumpExpressBuilderTime(-1)}
                                          >
                                              <ChevronDown size={11} className="shrink-0" aria-hidden />
                                          </button>
                                      </div>
                                  </div>
                                  {expressBuilderTimeMenuOpen ? (
                                      <div
                                          role="listbox"
                                          className="absolute left-0 top-full z-[320] mt-0.5 box-border w-full min-w-full max-h-[8rem] overflow-y-auto overflow-x-hidden overscroll-contain rounded-md border border-slate-600 bg-slate-950 py-0.5 pl-1 pr-2 shadow-xl [scrollbar-gutter:stable] custom-scrollbar"
                                      >
                                          <button
                                              type="button"
                                              role="option"
                                              className="flex w-full px-2 py-0.5 text-left font-mono text-[11px] text-slate-500 hover:bg-slate-800/90"
                                              onClick={() => {
                                                  setExpressBuilderTime('');
                                                  setExpressBuilderTimeMenuOpen(false);
                                              }}
                                          >
                                              —
                                          </button>
                                          {EXPRESS_BUILDER_TIME_OPTIONS.map((tv) => (
                                              <button
                                                  key={tv}
                                                  type="button"
                                                  role="option"
                                                  className={`flex w-full px-2 py-0.5 text-left font-mono text-[11px] tabular-nums hover:bg-slate-800/90 ${
                                                      tv === expressLineBuilderTimeSelectValue ? 'bg-fuchsia-950/55 text-fuchsia-100' : 'text-slate-100'
                                                  }`}
                                                  onClick={() => {
                                                      setExpressBuilderTime(tv);
                                                      setExpressBuilderTimeMenuOpen(false);
                                                  }}
                                              >
                                                  {tv}
                                              </button>
                                          ))}
                                      </div>
                                  ) : null}
                              </div>
                              <div className="min-w-0 max-w-full flex-1 basis-[min(100%,11rem)] sm:basis-0 sm:min-w-[5.5rem] sm:max-w-[12rem]">
                                  <label className="mb-0.5 block text-[9px] font-bold uppercase text-slate-500">Дома</label>
                                  <select
                                      value={expressBuilderHome}
                                      onChange={(e) => {
                                          setExpressBuilderHome(e.target.value);
                                          if (e.target.value === expressBuilderAway) setExpressBuilderAway('');
                                      }}
                                      disabled={!expressBuilderLeagueId}
                                      className="h-8 w-full max-w-full rounded-md border border-slate-600 bg-slate-950 px-1.5 py-0.5 text-xs text-slate-100 outline-none focus:border-fuchsia-500 disabled:opacity-50"
                                  >
                                      <option value="">—</option>
                                      {builderTeams.map((t) => (
                                          <option key={`h-${t}`} value={t}>
                                              {t}
                                          </option>
                                      ))}
                                  </select>
                              </div>
                              <div className="min-w-0 max-w-full flex-1 basis-[min(100%,11rem)] sm:basis-0 sm:min-w-[5.5rem] sm:max-w-[12rem]">
                                  <label className="mb-0.5 block text-[9px] font-bold uppercase text-slate-500">В гостях</label>
                                  <select
                                      value={expressBuilderAway}
                                      onChange={(e) => setExpressBuilderAway(e.target.value)}
                                      disabled={!expressBuilderLeagueId}
                                      className="h-8 w-full max-w-full rounded-md border border-slate-600 bg-slate-950 px-1.5 py-0.5 text-xs text-slate-100 outline-none focus:border-fuchsia-500 disabled:opacity-50"
                                  >
                                      <option value="">—</option>
                                      {(expressBuilderHome ? builderAwayOptions : builderTeams).map((t) => (
                                          <option key={`a-${t}`} value={t}>
                                              {t}
                                          </option>
                                      ))}
                                  </select>
                              </div>
                              <div className="grid w-full min-w-0 max-w-full grid-cols-3 gap-1.5 basis-full xl:flex xl:w-auto xl:basis-auto xl:max-w-none xl:shrink-0 xl:flex-nowrap xl:gap-x-1.5">
                                  <div ref={expressBuilderO1MenuRef} className="relative z-20 min-w-0 w-full max-w-full overflow-visible xl:w-24 xl:max-w-none xl:shrink-0">
                                      <label className="mb-0.5 block text-center text-[11px] font-bold text-emerald-500/90 sm:text-xs" htmlFor="express-line-builder-o1-btn">
                                          1
                                      </label>
                                      <div className="flex h-8 overflow-hidden rounded-md border border-slate-600 bg-slate-950 shadow-sm">
                                          {expressBuilderOddEditField === 'o1' ? (
                                              <input
                                                  type="text"
                                                  inputMode="decimal"
                                                  autoFocus
                                                  value={expressBuilderOddDraft}
                                                  onChange={(e) => setExpressBuilderOddDraft(e.target.value)}
                                                  onBlur={() => commitExpressBuilderOddEdit('o1')}
                                                  onKeyDown={(e) => {
                                                      if (e.key === 'Enter') commitExpressBuilderOddEdit('o1');
                                                      if (e.key === 'Escape') cancelExpressBuilderOddEdit();
                                                  }}
                                                  placeholder="1.0"
                                                  aria-label="Ручной ввод кэфа 1"
                                                  title="Введите кэф с шагом 0.1 (от 1.0)"
                                                  className="min-w-0 flex-1 border-0 bg-transparent px-1 text-center font-mono text-xs font-bold tabular-nums text-white outline-none focus-visible:ring-1 focus-visible:ring-fuchsia-500/70"
                                              />
                                          ) : (
                                              <button
                                                  id="express-line-builder-o1-btn"
                                                  type="button"
                                                  onClick={() => {
                                                      if (expressBuilderOddEditField === 'o1') return;
                                                      setExpressBuilderTimeMenuOpen(false);
                                                      setExpressBuilderOxMenuOpen(false);
                                                      setExpressBuilderO2MenuOpen(false);
                                                      setExpressBuilderO1MenuOpen((o) => !o);
                                                  }}
                                                  onDoubleClick={() => startExpressBuilderOddEdit('o1', expressBuilderO1)}
                                                  aria-expanded={expressBuilderO1MenuOpen}
                                                  aria-haspopup="listbox"
                                                  title="Клик — список 1.2–5.0; двойной клик — ручной ввод (шаг 0.1)"
                                                  className="min-w-0 flex-1 cursor-pointer truncate border-0 bg-transparent px-1 text-center font-mono text-xs font-bold tabular-nums text-white outline-none hover:bg-slate-900/80 focus-visible:ring-1 focus-visible:ring-fuchsia-500/70"
                                              >
                                                  {String(expressBuilderO1 || '').trim() || '—'}
                                              </button>
                                          )}
                                          <div className="flex h-8 w-5 shrink-0 flex-col border-l border-slate-600/90 bg-slate-900/75">
                                              <button
                                                  type="button"
                                                  aria-label="Кэф выше"
                                                  title="Выше; удерживайте — быстрый повтор"
                                                  className="flex flex-1 touch-manipulation items-center justify-center border-b border-slate-600/55 text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                                  {...expressHoldRepeatHandlers(() => bumpExpressBuilderOddField(setExpressBuilderO1, 1))}
                                              >
                                                  <ChevronUp size={11} className="shrink-0" aria-hidden />
                                              </button>
                                              <button
                                                  type="button"
                                                  aria-label="Кэф ниже"
                                                  title="Ниже; удерживайте — быстрый повтор"
                                                  className="flex flex-1 touch-manipulation items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                                  {...expressHoldRepeatHandlers(() => bumpExpressBuilderOddField(setExpressBuilderO1, -1))}
                                              >
                                                  <ChevronDown size={11} className="shrink-0" aria-hidden />
                                              </button>
                                          </div>
                                      </div>
                                      {expressBuilderO1MenuOpen ? (
                                          <div
                                              role="listbox"
                                              className="absolute left-0 top-full z-[320] mt-0.5 box-border w-full min-w-full max-h-[8rem] overflow-y-auto overflow-x-hidden overscroll-contain rounded-md border border-slate-600 bg-slate-950 py-0.5 pl-1 pr-2 shadow-xl [scrollbar-gutter:stable] custom-scrollbar"
                                          >
                                              <button
                                                  type="button"
                                                  role="option"
                                                  className="flex w-full px-2 py-0.5 text-left font-mono text-[11px] text-slate-500 hover:bg-slate-800/90"
                                                  onClick={() => {
                                                      setExpressBuilderO1('');
                                                      setExpressBuilderO1MenuOpen(false);
                                                  }}
                                              >
                                                  —
                                              </button>
                                              {EXPRESS_BUILDER_ODDS_QUICK_LIST.map((v) => (
                                                  <button
                                                      key={`o1-${v}`}
                                                      type="button"
                                                      role="option"
                                                      className={`flex w-full px-2 py-0.5 text-left font-mono text-[11px] tabular-nums hover:bg-slate-800/90 ${
                                                          v === String(expressBuilderO1 || '').trim() ? 'bg-fuchsia-950/55 text-fuchsia-100' : 'text-slate-100'
                                                      }`}
                                                      onClick={() => {
                                                          setExpressBuilderO1(v);
                                                          setExpressBuilderO1MenuOpen(false);
                                                      }}
                                                  >
                                                      {v}
                                                  </button>
                                              ))}
                                          </div>
                                      ) : null}
                                  </div>
                                  <div ref={expressBuilderOxMenuRef} className="relative z-20 min-w-0 w-full max-w-full overflow-visible xl:w-24 xl:max-w-none xl:shrink-0">
                                      <label className="mb-0.5 block text-center text-[11px] font-bold text-slate-500 sm:text-xs" htmlFor="express-line-builder-ox-btn">
                                          X
                                      </label>
                                      <div className="flex h-8 overflow-hidden rounded-md border border-slate-600 bg-slate-950 shadow-sm">
                                          {expressBuilderOddEditField === 'ox' ? (
                                              <input
                                                  type="text"
                                                  inputMode="decimal"
                                                  autoFocus
                                                  value={expressBuilderOddDraft}
                                                  onChange={(e) => setExpressBuilderOddDraft(e.target.value)}
                                                  onBlur={() => commitExpressBuilderOddEdit('ox')}
                                                  onKeyDown={(e) => {
                                                      if (e.key === 'Enter') commitExpressBuilderOddEdit('ox');
                                                      if (e.key === 'Escape') cancelExpressBuilderOddEdit();
                                                  }}
                                                  placeholder="1.0"
                                                  aria-label="Ручной ввод кэфа X"
                                                  title="Введите кэф с шагом 0.1 (от 1.0)"
                                                  className="min-w-0 flex-1 border-0 bg-transparent px-1 text-center font-mono text-xs font-bold tabular-nums text-white outline-none focus-visible:ring-1 focus-visible:ring-fuchsia-500/70"
                                              />
                                          ) : (
                                              <button
                                                  id="express-line-builder-ox-btn"
                                                  type="button"
                                                  onClick={() => {
                                                      if (expressBuilderOddEditField === 'ox') return;
                                                      setExpressBuilderTimeMenuOpen(false);
                                                      setExpressBuilderO1MenuOpen(false);
                                                      setExpressBuilderO2MenuOpen(false);
                                                      setExpressBuilderOxMenuOpen((o) => !o);
                                                  }}
                                                  onDoubleClick={() => startExpressBuilderOddEdit('ox', expressBuilderOx)}
                                                  aria-expanded={expressBuilderOxMenuOpen}
                                                  aria-haspopup="listbox"
                                                  title="Клик — список 1.2–5.0; двойной клик — ручной ввод (шаг 0.1)"
                                                  className="min-w-0 flex-1 cursor-pointer truncate border-0 bg-transparent px-1 text-center font-mono text-xs font-bold tabular-nums text-white outline-none hover:bg-slate-900/80 focus-visible:ring-1 focus-visible:ring-fuchsia-500/70"
                                              >
                                                  {String(expressBuilderOx || '').trim() || '—'}
                                              </button>
                                          )}
                                          <div className="flex h-8 w-5 shrink-0 flex-col border-l border-slate-600/90 bg-slate-900/75">
                                              <button
                                                  type="button"
                                                  aria-label="Кэф выше"
                                                  title="Выше; удерживайте — быстрый повтор"
                                                  className="flex flex-1 touch-manipulation items-center justify-center border-b border-slate-600/55 text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                                  {...expressHoldRepeatHandlers(() => bumpExpressBuilderOddField(setExpressBuilderOx, 1))}
                                              >
                                                  <ChevronUp size={11} className="shrink-0" aria-hidden />
                                              </button>
                                              <button
                                                  type="button"
                                                  aria-label="Кэф ниже"
                                                  title="Ниже; удерживайте — быстрый повтор"
                                                  className="flex flex-1 touch-manipulation items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-slate-100"
                                                  {...expressHoldRepeatHandlers(() => bumpExpressBuilderOddField(setExpressBuilderOx, -1))}
                                              >
                                                  <ChevronDown size={11} className="shrink-0" aria-hidden />
                                              </button>
                                          </div>
                                      </div>
                                      {expressBuilderOxMenuOpen ? (

                                                                  className={

                                                                  const idleWrap = isDc ? expressLineExtraIdleWrapDc : expressLineExtraIdleWrapTot;
                                                                  const idleBtn = isDc ? expressLineExtraIdleBtnDc : expressLineExtraIdleBtnTot;
                                                                  return (
                                                                      <div key={lbl} className="flex shrink-0 flex-col items-center gap-0.5">
                                                                          <span
                                                                              className={`max-w-[4.25rem] whitespace-nowrap text-center text-[9px] font-black tracking-tight sm:max-w-none sm:text-[10px] ${extraLblTone}`}
                                                                          >
                                                                              {expressLineExtraMarketLineLabel(lbl)}
                                                                          </span>
                                                                          <div
                                                                              className={`flex min-h-[2.35rem] min-w-[4.05rem] overflow-hidden rounded-lg shadow-sm transition sm:min-h-[2.55rem] sm:min-w-[4.25rem] ${
                                                                                  sEx
                                                                                      ? isDc
                                                                                          ? expressLinePickSelDc
                                                                                          : expressLinePickSelSk
                                                                                      : idleWrap
                                                                              }`}
                                                                          >
                                                                              <button
                                                                                  type="button"
                                                                                  title={`${expressLineExtraMarketLineLabel(lbl)} — в список / снять`}
                                                                                  onClick={() =>
                                                                                      togglePickFromLine(
                                                                                          m.home,
                                                                                          m.away,
                                                                                          lbl,
                                                                                          Number.isFinite(oddNum) ? oddNum : 1.01,
                                                                                      )
                                                                                  }
                                                                                  className={`flex min-w-0 flex-1 flex-col items-center justify-center px-0.5 text-sm font-black transition hover:brightness-110 sm:px-1 sm:text-base ${sEx ? 'bg-transparent text-white' : idleBtn}`}
                                                                              >
                                                                                  <span className="font-mono text-sm tabular-nums leading-none sm:text-base">{oddStr}</span>
                                                                              </button>
                                                                              <div
                                                                                  className={`flex w-5 shrink-0 flex-col self-stretch ${
                                                                                      sEx
                                                                                          ? isDc
                                                                                              ? expressLineOddsStepSelDc
                                                                                              : expressLineOddsStepSelSk
                                                                                          : expressLineOddsStepStrip
                                                                                  }`}
                                                                              >
                                                                                  <button
                                                                                      type="button"
                                                                                      aria-label={`${expressLineExtraMarketLineLabel(lbl)}: выше`}

                                                                                          bumpExpressLineExtraMarket(lineMk, lbl, 1, m.odds, m.home, m.away),
                                                                                      )}
                                                                                  >
                                                                                      <ChevronUp size={10} className="shrink-0" aria-hidden />
                                                                                  </button>
                                                                                  <button
                                                                                      type="button"
                                                                                      aria-label={`${expressLineExtraMarketLineLabel(lbl)}: ниже`}
                                                                                      title="Ниже на 0.01; удерживайте — быстрый повтор"
                                                                                      className="flex flex-1 touch-manipulation items-center justify-center text-slate-400 transition hover:text-slate-100"
                                                                                      {...expressHoldRepeatHandlers(() =>
                                                                                          bumpExpressLineExtraMarket(lineMk, lbl, -1, m.odds, m.home, m.away),

                                                                                      <ChevronDown size={10} className="shrink-0" aria-hidden />
                                                                                  </button>
                                                                              </div>
                                                                          </div>
                                                                      </div>
                                                                  );
                                                              })}
                                                              </div>
                                                          </div>
                                                          {expressLineDeleteMode ? (
                                                              <div className="flex w-full flex-[0_0_auto] items-center justify-end sm:w-auto">
                                                                  <button
                                                                      type="button"
                                                                      data-express-line-delete="1"
                                                                      onMouseDown={(e) => e.stopPropagation()}
                                                                      onClick={(e) => {
                                                                          e.preventDefault();
                                                                          e.stopPropagation();
                                                                          openExpressLineDeletePrompt(league.id, m.id, m.home, m.away);
                                                                      }}
                                                                      title="Удалить матч из линии"
                                                                      aria-label="Удалить матч из линии"
                                                                      className="relative z-[5] inline-flex h-8 w-8 cursor-pointer items-center justify-center rounded-lg border border-red-500/60 bg-red-900/40 text-red-200 transition hover:bg-red-900/60 hover:text-red-100"
                                                                  >
                                                                      <Trash2 size={14} />
                                                                  </button>
                                                              </div>
                                                          ) : null}
                                                      </div>
                                                  )})}
                                              </div>
                                          ) : null}
                                      </div>
                                  );
                              })}
                              {expressLineDayData.length === 0 ? (
                                  <div className="h-3 rounded-b-2xl bg-slate-900/35" aria-hidden />
                              ) : null}
                          </div>
                      </div>

                      <div className="flex flex-col gap-1.5">
                          <div className="flex flex-wrap gap-2">
                              <button
                                  type="button"
                                  onClick={addRow}
                                  className="rounded-xl bg-fuchsia-700 hover:bg-fuchsia-600 text-white px-4 py-2.5 text-sm font-bold border border-fuchsia-500/50 transition-colors"

                                  + Добавить прогноз вручную
                              </button>
                              <button
                                  type="button"
                                  onClick={runGenerate}

                              >
                                  Очистить всё
                              </button>
                          </div>
                          {expressGenMessage ? (
                              <p className="max-w-full text-[11px] leading-snug text-slate-300 sm:pl-0.5">{expressGenMessage}</p>
                          ) : null}
                      </div>
                      {expressPicks.length === 0 ? (
                          <p className="text-sm text-slate-500">Список пуст — нажмите «Добавить прогноз».</p>

                                  <thead className="max-sm:hidden sm:table-header-group">
                                      <tr className="border-b border-slate-700 bg-slate-800/90 sm:table-row">
                                          <th className="py-2.5 px-2 text-[10px] font-bold uppercase text-slate-400">Матч</th>
                                          <th className="py-2.5 px-2 text-[10px] font-bold uppercase text-slate-400">Прогноз</th>
                                          <th className="py-2.5 px-2 text-[10px] font-bold uppercase text-slate-400 w-24">Кэф</th>
                                          <th className="min-w-[8.5rem] py-2.5 px-2 text-[10px] font-bold uppercase text-slate-400 sm:min-w-[11rem]">Метка</th>

                                      </tr>
                                  </thead>
                                  <tbody className="max-sm:block max-sm:px-1 max-sm:py-2 sm:table-row-group sm:divide-y sm:divide-slate-800">
                                      {expressPicks.map((row) => {
                                          const tierRow =
                                              row.tier === 'strong'
                                                  ? 'bg-emerald-950/35 hover:bg-emerald-900/30'
                                                  : row.tier === 'weak'
                                                    ? 'bg-rose-950/28 hover:bg-rose-900/25'
                                                    : 'bg-amber-950/22 hover:bg-amber-900/22';
                                          return (
                                          <tr
                                              key={row.id}
                                              className={`transition-colors max-sm:mx-0 max-sm:mb-3 max-sm:flex max-sm:flex-wrap max-sm:gap-x-2 max-sm:gap-y-2 max-sm:rounded-xl max-sm:border max-sm:border-slate-600/50 max-sm:p-3 max-sm:last:mb-0 sm:table-row ${tierRow}`}
                                          >
                                              <td className="max-sm:basis-full max-sm:py-0.5 sm:table-cell sm:p-2 sm:align-middle">
                                                  <span className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-500 sm:hidden">
                                                      Матч
                                                  </span>
                                                  <input
                                                      type="text"
                                                      value={row.match}
                                                      onChange={(e) => updateRow(row.id, 'match', e.target.value)}
                                                      placeholder="Напр. Бавария — Боруссия Д"
                                                      className="w-full min-h-[2.75rem] rounded-lg border border-slate-700 bg-slate-950 px-2.5 py-2 text-sm text-slate-100 focus:outline-none focus:ring-1 focus:ring-fuchsia-500 max-sm:text-[13px] sm:min-h-0 sm:px-2 sm:py-1.5 sm:text-xs"
                                                  />
                                              </td>
                                              <td className="max-sm:basis-full max-sm:py-0.5 sm:table-cell sm:p-2 sm:align-middle">

                                                      Прогноз
                                                  </span>
                                                  <input
                                                      type="text"
                                                      value={row.prediction}
                                                      onChange={(e) => updateRow(row.id, 'prediction', e.target.value)}
                                                      placeholder="ТБ 2.5, П1…"
                                                      className="w-full rounded-lg border border-slate-700 bg-slate-950 px-2.5 py-2 text-sm text-slate-100 focus:outline-none focus:ring-1 focus:ring-fuchsia-500 sm:px-2 sm:py-1.5 sm:text-xs"
                                                  />
                                              </td>
                                              <td className="max-sm:min-w-0 max-sm:flex-1 max-sm:basis-[calc(50%-0.25rem)] max-sm:py-0.5 sm:table-cell sm:w-auto sm:p-2 sm:align-middle">
                                                  <span className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-500 sm:hidden">
                                                      Кэф
                                                  </span>
                                                  <input
                                                      type="text"
                                                      inputMode="decimal"
                                                      value={row.odd}
                                                      onChange={(e) => updateRow(row.id, 'odd', e.target.value)}
                                                      placeholder="1.80"
                                                      className="w-full rounded-lg border border-slate-700 bg-slate-950 px-2 py-2 text-center font-mono text-sm font-bold text-white focus:outline-none focus:ring-1 focus:ring-fuchsia-500 sm:py-1.5 sm:text-xs"
                                                  />
                                              </td>
                                              <td className="max-sm:min-w-0 max-sm:flex-1 max-sm:basis-[calc(50%-0.25rem)] max-sm:py-0.5 sm:table-cell sm:min-w-[8.5rem] sm:p-2 sm:align-middle md:min-w-[11rem]">
                                                  <span className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-500 sm:hidden">
                                                      Метка
                                                  </span>

                                                      onChange={(e) => updateRow(row.id, 'tier', e.target.value)}

                                                  >
                                                      <option value="strong">Уверенный</option>
                                                      <option value="mid">Средний</option>

                                              </td>

                                                      onClick={() => removeRow(row.id)}
                                                      className="rounded-lg p-2 text-slate-500 transition-colors hover:bg-red-950/40 hover:text-red-400 sm:p-1.5"
                                                      title="Удалить строку"
                                                  >
                                                      <Trash2 size={16} />
                                                  </button>
                                              </td>
                                          </tr>

                              <h3 className="text-slate-100 font-bold text-lg flex items-center gap-2.5 shrink-0">

                              </h3>
                              {[
                                  { id: 'all', label: `Экспрессы (${expressBundlesMainOnly.length})` },
                                  { id: 'totals', label: `Тотал (${totalsBundleCount})` },
                                  { id: 'ordinary', label: `Ординар (${ordinaryBundleCount})` },
                                  { id: 'crazy', label: `Crazy (${crazyBundleCount})` },

                                                  ? 'border-sky-400/70 bg-sky-500/25 text-sky-50'
                                                  : 'border-violet-400/60 bg-violet-500/20 text-violet-100'
                                              : 'border-slate-500/45 bg-slate-700/40 text-slate-300 hover:bg-slate-600/40'
                                      }`}
                                  >
                                      {tab.label}
                                  </button>
                              ))}
                              <button
                                  type="button"
                                  onClick={saveExpressBundlesToHistory}

                                      expressSaveTabBundleCount
                                          ? `Сохранить в историю только купоны с вкладки «${
                                                expressListTab === 'all'
                                                    ? 'Все'
                                                    : expressListTab === 'totals'
                                                      ? 'Тотал'
                                                      : expressListTab === 'ordinary'
                                                        ? 'Ординар'
                                                        : 'Crazy'
                                            }» (${expressSaveTabBundleCount})`

                                            ? 'Нет вариантов Crazy для сохранения'
                                            : 'Сначала сгенерируйте экспрессы или откройте вкладку с купонами'

                                  <Save size={16} className="shrink-0 opacity-90" aria-hidden />

                              </button>

                              totalsShelves.safe.length || totalsShelves.balanced.length || totalsShelves.aggressive.length ? (
                                  <div className="mt-2 space-y-3">
                                      {[
                                          {
                                              id: 'safe',
                                              title: `Safe (${totalsShelves.safe.length})`,
                                              desc: 'Максимальный шанс прохода',
                                              items: totalsShelves.safe,
                                              titleClass: 'text-emerald-200',
                                          },
                                          {
                                              id: 'balanced',
                                              title: `Balanced (${totalsShelves.balanced.length})`,
                                              desc: 'Лучший баланс шанса и кэфа',
                                              items: totalsShelves.balanced,
                                              titleClass: 'text-sky-100',
                                          },
                                          {
                                              id: 'aggressive',
                                              title: `Aggressive (${totalsShelves.aggressive.length})`,
                                              desc: 'Высокие кэфы с минимальным фильтром качества',
                                              items: totalsShelves.aggressive,
                                              titleClass: 'text-fuchsia-100',
                                          },
                                      ].map((shelf) =>
                                          shelf.items.length ? (
                                              <div key={shelf.id} className="rounded-xl border border-sky-700/35 bg-slate-900/40 p-2">
                                                  <div className="flex flex-wrap items-center justify-between gap-2 px-1">
                                                      <h4 className={`text-sm font-black uppercase tracking-wide ${shelf.titleClass}`}>
                                                          {shelf.title}
                                                      </h4>
                                                      <span className="text-[11px] text-slate-400">{shelf.desc}</span>
                                                  </div>
                                                  {renderExpressBundlesGrid(shelf.items, 'totals', `${shelf.id}-`)}
                                              </div>
                                          ) : null,
                                      )}
                                  </div>
                              ) : expressBundles.length > 0 ? (
                                  <p className="mt-2 text-sm text-slate-500">В этой вкладке пока нет купонов.</p>

                                                  <span className="text-[11px] text-slate-400">
                                                      Максимальный итоговый кэф среди сгенерированных экспрессов «Тотал»

                                              </div>
                                              {renderExpressBundlesGrid(crazyTotalsViewRow, 'crazy', 'crazy-t-', true)}
                                          </div>
                                      ) : null}

                                                  </span>

                                  </p>

                      <div className="rounded-2xl border border-slate-500/35 bg-slate-800/45 p-4 shadow-lg ring-1 ring-white/5">

                          </h3>
                          {renderHistoryPanel('express')}
                      </div>
                  </div>
              );
          };

          // --- РЕНДЕРЕРЫ ---
          const renderTabs = () => (
              <div className="mb-6 w-full min-w-0 max-w-full px-14 sm:px-16">
                  <div className="overflow-x-auto overflow-y-visible pb-2 -mx-0.5 px-0.5 custom-scrollbar">
                      <div className="mx-auto flex w-max flex-nowrap items-center gap-1 rounded-2xl border border-slate-700/50 bg-slate-900/80 p-1 shadow-2xl backdrop-blur-md sm:gap-2 sm:p-1.5 max-w-none">
                          <button onClick={() => setActiveTab('home')} className={`shrink-0 whitespace-nowrap px-2.5 py-2 sm:px-4 sm:py-2.5 rounded-xl font-bold text-sm sm:text-base flex items-center gap-1.5 sm:gap-2 transition-all ${activeTab === 'home' ? 'bg-gradient-to-r from-sky-600 to-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                              <HomeIcon size={18} className={activeTab === 'home' ? "text-cyan-100" : ""} /> Главная
                          </button>

                              <Layers size={18} className={activeTab === 'classic' ? "text-emerald-100" : ""} /> Экспрессы
                          </button>
