                              <Activity size={18} className={activeTab === 'totals' ? "text-blue-100" : ""} /> Тоталы
                          </button>
                          <button onClick={() => setActiveTab('express')} className={`shrink-0 whitespace-nowrap px-2.5 py-2 sm:px-4 sm:py-2.5 rounded-xl font-bold text-sm sm:text-base flex items-center gap-1.5 sm:gap-2 transition-all ${activeTab === 'express' ? 'bg-gradient-to-r from-fuchsia-600 to-rose-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                              <Zap size={18} className={activeTab === 'express' ? 'text-fuchsia-100' : ''} /> Линия
                          </button>
                          <button onClick={() => setActiveTab('chaser')} className={`shrink-0 whitespace-nowrap px-2.5 py-2 sm:px-4 sm:py-2.5 rounded-xl font-bold text-sm sm:text-base flex items-center gap-1.5 sm:gap-2 transition-all ${activeTab === 'chaser' ? 'bg-gradient-to-r from-red-600 to-pink-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                              <TrendingUp size={18} className={activeTab === 'chaser' ? "text-red-100" : ""} /> Догон
                          </button>
                          <button onClick={() => setActiveTab('pool')} className={`shrink-0 whitespace-nowrap px-2.5 py-2 sm:px-4 sm:py-2.5 rounded-xl font-bold text-sm sm:text-base flex items-center gap-1.5 sm:gap-2 transition-all ${activeTab === 'pool' ? 'bg-gradient-to-r from-teal-600 to-cyan-600 text-white shadow-lg' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                              <LadderPoolIcon size={18} className={activeTab === 'pool' ? 'text-cyan-100' : ''} /> Пул<span className="hidden sm:inline"> лесенок</span>
                          </button>
                      </div>
                  </div>
              </div>
          );

          const renderChaserTab = () => (
              <div className="mx-auto w-full min-w-0 max-w-6xl rounded-2xl border border-red-500/30 bg-slate-900/80 p-3 shadow-2xl backdrop-blur-xl sm:p-6">
                  <div className="bg-red-900/30 border border-red-500/50 p-4 rounded-xl mb-6 text-red-100 text-sm shadow-inner w-full">
                      💡 <b>Догон с учётом основы:</b> «Уже поставлено» — сумма текущей ставки в риске; «Возможный выигрыш» — полная выплата по ней при заходе (gross). Ставка догона:{' '}
                      <b className="text-white">(цель + уже поставлено + сумма сливов догона) / (кэф − 1)</b>. Второй вариант — выровнять два исхода:{' '}
                      <b className="text-white">(выигрыш + уже поставлено) / кэф</b>, если указана выплата по основе.
                  </div>
                  <div className="mb-6 flex items-center gap-3 border-b border-slate-700 pb-4">
                      <TrendingUp className="text-red-400" size={28} />
                      <div>
                          <h2 className="text-xl font-bold text-white uppercase">Умный Догон</h2>
                          <p className="text-xs text-red-300">Цель, основа в риске и кэф — всё пересчитывается на лету</p>
                      </div>
                  </div>

                  <div className="mb-6 grid grid-cols-1 gap-3 sm:grid-cols-2">
                      <div className="rounded-xl border border-slate-700 bg-slate-800/80 p-3">
                          <label className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-400">Желаемая чистая прибыль ($)</label>
                          <input
                              type="number"
                              step="0.01"
                              value={chaserTarget}
                              onChange={(e) => setChaserTarget(e.target.value)}
                              className="w-full rounded border border-slate-600 bg-slate-900 p-2.5 text-center text-lg font-bold text-emerald-400 outline-none focus:border-red-500"
                          />
                      </div>
                      <div className="rounded-xl border border-slate-700 bg-slate-800/80 p-3">
                          <label className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-400">Уже поставлено ($)</label>
                          <input
                              type="number"
                              step="0.01"
                              value={chaserAlreadyStaked}
                              onChange={(e) => setChaserAlreadyStaked(e.target.value)}
                              placeholder="0"
                              className="w-full rounded border border-slate-600 bg-slate-900 p-2.5 text-center text-lg font-bold text-amber-200 outline-none focus:border-red-500"
                          />
                          <p className="mt-1 text-[10px] text-slate-500">В риске сейчас, отбивается при выигрыше догона</p>
                      </div>
                      <div className="rounded-xl border border-slate-700 bg-slate-800/80 p-3">
                          <label className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-400">Возможный выигрыш — выплата по основе ($)</label>
                          <input
                              type="number"
                              step="0.01"
                              value={chaserPossibleWin}
                              onChange={(e) => setChaserPossibleWin(e.target.value)}
                              placeholder="Gross при заходе основы"
                              className="w-full rounded border border-slate-600 bg-slate-900 p-2.5 text-center text-lg font-bold text-sky-300 outline-none focus:border-red-500"
                          />
                          <p className="mt-1 text-[10px] text-slate-500">Полная сумма от БК при выигрыше основы (не чистая прибыль)</p>
                      </div>
                      <div className="rounded-xl border border-slate-700 bg-slate-800/80 p-3">
                          <label className="mb-1 block text-[10px] font-bold uppercase tracking-wide text-slate-400">Коэффициент догона</label>
                          <input
                              type="number"
                              step="0.01"
                              value={chaserInputOdd}
                              onChange={(e) => setChaserInputOdd(e.target.value)}
                              className="w-full rounded border border-slate-600 bg-slate-900 p-2.5 text-center text-lg font-bold text-white outline-none focus:border-red-500"
                          />
                      </div>
                  </div>

                  {(chaserPreview.targetStake != null || chaserPreview.equalStake != null) && (
                      <div className="mb-6 space-y-2 rounded-xl border border-red-500/40 bg-red-950/25 p-4">
                          {chaserPreview.targetStake != null ? (
                              <div className="flex flex-col gap-0.5 sm:flex-row sm:items-baseline sm:justify-between">
                                  <span className="text-xs font-bold uppercase text-red-200">Рекомендуемая ставка (цель + основа + сливы догона)</span>
                                  <span className="font-mono text-xl font-black text-white tabular-nums">{formatUSD(chaserPreview.targetStake, 2)}</span>
                              </div>
                          ) : null}
                          {chaserPreview.netIfChaseWin != null && chaserPreview.targetStake != null ? (
                              <p className="text-[11px] text-slate-400">
                                  При заходе догона (без учёта движений банка по шагам): чистыми ≈{' '}
                                  <span className="font-mono font-bold text-emerald-300/90">{formatUSD(chaserPreview.netIfChaseWin, 2)}</span> к сценарию «отбить основу и сливы + цель».
                              </p>
                          ) : null}
                          {chaserPreview.equalStake != null ? (
                              <div className="border-t border-slate-700/80 pt-2">
                                  <div className="flex flex-col gap-0.5 sm:flex-row sm:items-baseline sm:justify-between">
                                      <span className="text-xs font-bold uppercase text-slate-300">Выровнять сценарии (основа + выплата)</span>
                                      <span className="font-mono text-lg font-black text-sky-200 tabular-nums">{formatUSD(chaserPreview.equalStake, 2)}</span>
                                  </div>
                                  <p className="mt-1 text-[10px] text-slate-500">Одинаковый итог при выигрыше основы или догона (идеализация двух исходов).</p>
                              </div>
                          ) : null}
                      </div>
                  )}

                  {chaserSteps.length === 0 ? (
                      <div className="mx-auto max-w-md space-y-4 py-2">
                          <button
                              type="button"
                              onClick={startChaser}
                              disabled={chaserPreview.targetStake == null || chaserPreview.targetStake <= 0}
                              className="w-full rounded-xl bg-red-600 py-4 font-bold uppercase tracking-wider text-white shadow-lg transition-all hover:bg-red-500 hover:scale-[1.01] disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:scale-100"
                          >
                              Начать цикл догона
                          </button>
                      </div>
                  ) : (
                      <div className="space-y-3">
                          <div className="mb-4 flex flex-wrap items-center justify-between gap-2 rounded-lg border border-red-500/30 bg-red-900/20 p-3">
                              <div className="flex flex-wrap gap-3 text-sm">
                                  <span className="font-bold text-emerald-300">Цель: +{formatUSD(chaserParseMoney(chaserTarget), 2)}</span>
                                  <span className="font-bold text-amber-200">Основа: {formatUSD(chaserParseMoney(chaserAlreadyStaked), 2)}</span>
                                  <span className="font-bold text-red-300">
                                      Сливы догона: −{formatUSD(chaserSteps.filter((s) => s.result === 'LOST').reduce((a, b) => a + b.stake, 0), 2)}
                                  </span>
                              </div>
                              <button
                                  type="button"
                                  onClick={() => setChaserResetPrompt(true)}
                                  className="rounded bg-slate-800 px-3 py-1.5 text-xs text-slate-300 transition-colors hover:bg-slate-700"
                              >
                                  Сброс цикла
                              </button>
                          </div>

                          {chaserSteps.map((step, idx) => (
                              <div
                                  key={step.id}
                                  className={`flex flex-wrap items-center gap-3 rounded-xl border p-4 transition-all md:flex-nowrap ${
                                      step.result === 'PENDING'
                                          ? 'border-red-500/50 bg-slate-800 shadow-lg'
                                          : step.isDone
                                            ? 'border-emerald-500/50 bg-emerald-900/30'
                                            : 'border-slate-700 bg-slate-900/50 opacity-60'
                                  }`}
                              >
                                  {step.isDone ? (
                                      <div className="flex w-full flex-col items-center justify-center py-2 text-center font-bold text-emerald-400">
                                          <span className="text-xl">🎉 Цикл закрыт! Все минусы отбиты.</span>
                                          <span className="mt-1 text-sm text-emerald-200">Чистая прибыль по шагам догона: +{formatUSD(step.netProfit, 2)} (сумма всех ставок шага).</span>
                                          <button
                                              type="button"
                                              onClick={() => setChaserSteps([])}
                                              className="mt-4 rounded-lg bg-emerald-600 px-6 py-2 text-xs font-bold text-white transition-all hover:bg-emerald-500"
                                          >
                                              Новый цикл
                                          </button>
                                      </div>
                                  ) : (
                                      <>
                                          <div className="w-12 shrink-0 text-center">
                                              <span className="text-[10px] font-bold uppercase text-slate-500">Шаг</span>
                                              <p className="text-2xl font-black text-red-400">{idx + 1}</p>
                                          </div>

                                          {step.result === 'PENDING' ? (
                                              <>
                                                  <div className="min-w-[120px] flex-1 rounded border border-red-500/30 bg-red-900/30 p-2 text-center">
                                                      <span className="mb-1 block text-[10px] font-bold uppercase text-red-300">Сумма ставки</span>
                                                      <p className="text-2xl font-bold text-white tabular-nums">{formatUSD(step.stake, 2)}</p>
                                                  </div>
                                                  <div className="w-full shrink-0 sm:w-36">
                                                      <span className="mb-0.5 block text-[10px] font-bold uppercase text-slate-400">Кэф</span>
                                                      <input
                                                          type="number"
                                                          step="0.01"
                                                          value={step.odd}
                                                          onChange={(e) => {
                                                              const newOdd = parseFloat(e.target.value) || 1.01;
                                                              const n = [...chaserSteps];
                                                              const lost = n.filter((s) => s.result === 'LOST').reduce((a, s) => a + (Number(s.stake) || 0), 0);
                                                              const T = chaserParseMoney(chaserTarget);
                                                              const A = chaserParseMoney(chaserAlreadyStaked);
                                                              const st = (T + A + lost) / (newOdd - 1);
                                                              n[idx] = { ...n[idx], odd: newOdd, stake: Number.isFinite(st) && st > 0 ? st : n[idx].stake };
                                                              setChaserSteps(n);
                                                          }}
                                                          className="w-full rounded border border-slate-600 bg-slate-950 p-2.5 text-center text-lg font-bold text-white outline-none focus:border-red-500"
                                                      />
                                                  </div>
                                                  <div className="ml-auto flex shrink-0 flex-wrap gap-2">
                                                      <button
                                                          type="button"
                                                          onClick={() => handleChaserResult(idx, 'WON')}
                                                          className="flex items-center gap-2 rounded-lg bg-emerald-600 px-4 py-3 font-bold text-white hover:bg-emerald-500"
                                                      >
                                                          <CheckCircle size={18} /> Зашла
                                                      </button>
                                                      <button
                                                          type="button"
                                                          onClick={() => handleChaserResult(idx, 'LOST')}
                                                          className="flex items-center gap-2 rounded-lg bg-slate-700 px-4 py-3 font-bold text-white hover:bg-slate-600"
                                                      >
                                                          <XCircle size={18} /> Слив
                                                      </button>
                                                  </div>
                                              </>
                                          ) : (
                                              <>
                                                  <div className="min-w-[120px] flex-1">
                                                      <span className="mb-0.5 block text-[10px] font-bold uppercase text-slate-500">Ставка</span>
                                                      <p className="text-lg font-bold text-slate-300">{formatUSD(step.stake, 2)}</p>
                                                  </div>
                                                  <div className="ml-auto flex items-center gap-4">
                                                      <span className="font-mono text-xs text-slate-400">Кэф: {Number(step.odd).toFixed(2)}</span>
                                                      <span className="rounded bg-red-900/30 px-3 py-1 text-sm font-bold text-red-400">−{formatUSD(step.stake, 2)}</span>
                                                  </div>
                                              </>
                                          )}
                                      </>
                                  )}
                              </div>
                          ))}
                      </div>
                  )}
              </div>
          );

          const renderMatchesGrid = () => {
              const gridTab = calcTab;
              const isTotals = gridTab === 'totals';
              const matchesToRender = getActiveMatches(gridTab);

              const updateM = (idx, field, val) => {
                  if (gridTab === 'classic') setClassicMatches((prev) => { const n = [...prev]; n[idx][field] = val; return n; });
                  else setTotalsMatches((prev) => { const n = [...prev]; n[idx][field] = val; return n; });
              };
              const updateO = (mIdx, oIdx, field, val) => {
                  if (gridTab === 'classic') setClassicMatches((prev) => { const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n; });
                  else setTotalsMatches((prev) => { const n = [...prev]; n[mIdx].outcomes[oIdx][field] = val; return n; });
              };

              const borderTheme = isTotals ? 'border-blue-700/50' : 'border-emerald-700/50';
              const focusTheme = isTotals ? 'focus:ring-blue-400' : 'focus:ring-emerald-400';
              const activeTheme = isTotals ? 'bg-blue-900/60 border-blue-500/50 accent-blue-500' : 'bg-emerald-900/60 border-emerald-500/50 accent-emerald-500';

              return (
                  <>
                  {gridTab === 'classic' && (
                      <div className="bg-emerald-900/30 border border-emerald-500/50 p-4 rounded-xl mb-4 text-emerald-100 text-sm shadow-inner">
                          💡 <b>Классический Датчинг:</b> Введите коэффициенты на взаимоисключающие исходы. Калькулятор распределит банк так, чтобы при заходе ЛЮБОГО из выбранных исходов (Основа) вы получили одинаковую прибыль. Страховки вернут сумму ставки.
                      </div>
                  )}
                  {isTotals && (
                      <div className="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-4 text-blue-100 text-sm shadow-inner">
                          💡 <b>Конструктор тоталов:</b> выберите число матчей, включайте исходы и коэффициенты, в матрице экспрессов задайте для каждой ветки Основа / Страховка / Пропуск — калькулятор распределит банк как в разделе «Экспрессы».
                      </div>
                  )}
                  <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-${matchesToRender.length > 4 ? (matchesToRender.length === 5 ? 5 : 4) : matchesToRender.length} gap-3 mb-5 transition-all`}>
                  {matchesToRender.map((match, mIndex) => (
                    <div key={match.id} className={`bg-slate-900/80 border ${borderTheme} rounded-xl p-3 shadow-lg backdrop-blur-md relative overflow-hidden group`}>
                      <div className="flex items-center gap-2 mb-3">
                        <Goal className={isTotals ? 'text-blue-400' : 'text-emerald-400'} size={16} />
                        <input type="text" value={match.name} onChange={(e) => updateM(mIndex, 'name', e.target.value)} className={`bg-transparent text-white font-bold text-sm border-b border-slate-600/50 focus:outline-none w-full pb-1 ${focusTheme}`} placeholder="Команды" />
                      </div>

                      <div className="flex flex-row gap-2 justify-between">
                            {match.outcomes.map((outcome, oIndex) => (
                              <div key={oIndex} className={`flex flex-col items-center gap-1.5 p-1.5 rounded-lg border transition-colors flex-1 ${outcome.active ? activeTheme : 'bg-slate-900/50 border-transparent opacity-50'}`}>
                                <label className="text-xs font-bold text-slate-200 cursor-pointer flex items-center gap-1 w-full justify-center">
                                  <input type="checkbox" checked={outcome.active} onChange={(e) => updateO(mIndex, oIndex, 'active', e.target.checked)} className={`w-3 h-3 cursor-pointer ${isTotals ? 'accent-blue-500' : 'accent-emerald-500'}`} />
                                  {outcome.label}
                                </label>
                                <input type="number" step="0.01" value={outcome.odd} disabled={!outcome.active} onChange={(e) => updateO(mIndex, oIndex, 'odd', e.target.value)} className={`bg-slate-950 text-white font-bold text-xs border border-slate-700 rounded px-1 py-1 w-full text-center focus:outline-none focus:ring-1 ${focusTheme} disabled:opacity-50`} placeholder="Коэф" />
                              </div>
                            ))}
                      </div>
                    </div>
                  ))}
                </div>
                </>
              );
          };

          const themeMain = calcTab === 'totals' ? 'bg-blue-600/20 border-blue-500 text-blue-400' : 'bg-emerald-600/20 border-emerald-500 text-emerald-400';
          const themeCb = calcTab === 'totals' ? 'accent-blue-500' : 'accent-emerald-500';
          const themeBtn = calcTab === 'totals' ? 'from-blue-500 to-cyan-600 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'from-emerald-500 to-teal-600 shadow-[0_0_15px_rgba(16,185,129,0.3)]';

          const dutchingHistoryKey = activeTab;

          const dutchingCalculatorBlock = (
              <>
                  {renderMatchesGrid()}
                  {results.error ? (
                      <div className="bg-red-950/80 border border-red-800/80 rounded-xl p-6 text-center text-red-400 backdrop-blur-md mb-6"><ShieldAlert className="mx-auto mb-3 opacity-50" size={36} /><p className="text-sm font-bold">{results.error}</p></div>
                  ) : results.summary ? (
                      <div className="space-y-4 mb-8">
                          {results.summary.isBankrupt && (
                              <div className="bg-red-900/60 border border-red-500 rounded-lg p-3 flex items-center justify-center gap-2 text-red-100 animate-pulse shadow-lg"><ShieldAlert size={20} /><span className="text-sm font-bold">Внимание! Страховки съедают весь банк, на &quot;Основу&quot; денег не остается. Отключите часть исходов или увеличьте банк.</span></div>
                          )}
                          <div className="flex flex-col md:flex-row gap-4 items-stretch justify-between bg-slate-900/50 p-3 rounded-2xl border border-slate-700/50 backdrop-blur-md">
                              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 flex-1">
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                      <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Сумма Ставок</p>
                                      <p className="text-xl font-bold text-white">{formatUSD(results.summary.actualBank, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                      <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Ср. Выплата (Основа)</p>
                                      <p className="text-xl font-bold text-slate-100">{formatUSD(results.summary.avgMainPayout, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                      <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">Чистая Прибыль</p>
                                      <p className="text-xl font-bold text-white">{results.summary.netProfit > 0 ? '+' : ''}{formatUSD(results.summary.netProfit, 2)}</p>
                                  </div>
                                  <div className="bg-slate-800 border border-slate-700 rounded-xl p-3 flex flex-col items-center justify-center text-center shadow-inner">
                                      <p className="text-slate-400 text-[10px] uppercase tracking-widest mb-0.5">ROI (Основа)</p>
                                      <div className="flex items-center gap-1 text-xl font-bold text-white">
                                          {results.summary.roi > 0 ? '+' : ''}{results.summary.roi.toFixed(2)} <Percent size={16} />
                                      </div>
                                  </div>
                              </div>
                              <div className="flex shrink-0">
                                  <button type="button" onClick={saveToHistory} disabled={results.summary.isBankrupt || results.summary.actualBank === 0} className={`h-full w-full md:w-36 bg-gradient-to-br ${themeBtn} text-white rounded-xl p-3 flex flex-col items-center justify-center gap-1.5 transition-all hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:shadow-none`}>
                                      <Save size={24} />
                                      <span className="text-[10px] font-bold uppercase tracking-wider text-center leading-tight">В историю<br/>раздела</span>
                                  </button>
                              </div>
                          </div>
                          <div className="bg-slate-900/80 border border-slate-700/80 rounded-2xl overflow-hidden shadow-2xl backdrop-blur-xl">
                              <div className="max-h-[min(500px_72dvh)] overflow-y-auto overflow-x-auto custom-scrollbar">
                                  <table className="w-full min-w-[min(100%_36rem)] border-collapse text-left sm:min-w-[640px] md:min-w-[800px]">
                                      <thead className="sticky top-0 z-20">
                                          <tr className="bg-slate-800 border-b border-slate-700/50 shadow-md">
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center w-8">✓</th>
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">№</th>
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider">События в экспрессе</th>
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Коэф.</th>
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-center">Режим</th>
                                              <th className="py-3 px-3 text-slate-400 font-semibold text-[10px] uppercase tracking-wider text-right">Ставка</th>
                                              <th className="py-3 px-3 text-slate-300 font-semibold text-[10px] uppercase tracking-wider text-right bg-slate-800/50">Выплата</th>
                                          </tr>
                                      </thead>
                                      <tbody className="divide-y divide-slate-800/50">
                                          {results.expresses.map((exp) => {
                                              const isPlaced = calcTab === 'classic' ? placedBetsClassic.has(exp.id) : placedBetsTotals.has(exp.id);
                                              const toggle = () => {
                                                  if (calcTab === 'classic') { const s = new Set(placedBetsClassic); s.has(exp.id) ? s.delete(exp.id) : s.add(exp.id); setPlacedBetsClassic(s); }
                                                  else { const s = new Set(placedBetsTotals); s.has(exp.id) ? s.delete(exp.id) : s.add(exp.id); setPlacedBetsTotals(s); }
                                              };
                                              const setMode = (e) => {
                                                  if (calcTab === 'classic') setClassicModes((p) => ({ ...p, [exp.hash]: e.target.value }));
                                                  else setTotalsModes((p) => ({ ...p, [exp.hash]: e.target.value }));
                                              };
                                              return (
                                                  <tr key={exp.id} className={`transition-all duration-300 ${exp.mode === 'SKIP' ? 'opacity-30 grayscale' : ''} ${isPlaced ? 'bg-slate-800/80 opacity-60' : 'hover:bg-slate-800/50'}`}>
                                                      <td className="py-2 px-3 text-center">
                                                          <input type="checkbox" disabled={exp.mode === 'SKIP'} checked={isPlaced} onChange={toggle} className={`w-4 h-4 cursor-pointer rounded bg-slate-800 border-slate-600 disabled:opacity-50 ${themeCb}`} />
                                                      </td>
                                                      <td className="py-2 px-3 text-center font-mono text-xs text-slate-500">{exp.id}</td>
                                                      <td className="py-2 px-3">
                                                          <div className="flex flex-col gap-0.5">
                                                              {exp.parts.map((part, i) => (
                                                                  <div key={i} className="flex justify-between items-center bg-slate-800/50 rounded px-2 py-0.5">
                                                                      <span className="text-[11px] text-slate-300 w-32 lg:w-48 truncate" title={part.matchName}>{part.matchName}</span>
                                                                      <div className="flex items-center gap-2">
                                                                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm min-w-[32px] text-center ${part.label.includes('ТМ') || part.label === 'Нет' || part.label === 'Осечка' || part.label === 'Счет 0:0' ? 'bg-slate-700 text-slate-300' : 'bg-slate-900 text-white'}`}>{part.label}</span>
                                                                          <span className="text-[11px] text-slate-400 w-8 text-right">{parseFloat(part.odd).toFixed(2)}</span>
                                                                      </div>
                                                                  </div>
                                                              ))}
                                                          </div>
                                                      </td>
                                                      <td className="py-2 px-3 text-center">
                                                          <span className={`inline-block border font-bold px-2 py-0.5 text-xs rounded ${exp.mode === 'SKIP' ? 'text-slate-600 border-slate-700 bg-transparent' : 'bg-slate-800 border-slate-600 text-slate-300'}`}>{exp.totalOdd.toFixed(2)}</span>
                                                      </td>
                                                      <td className="py-2 px-3 text-center">
                                                          <select value={exp.mode} onChange={setMode} className={`text-[10px] font-bold px-2 py-1 rounded cursor-pointer border focus:outline-none appearance-none text-center ${exp.mode === 'MAIN' ? themeMain : exp.mode === 'INSURE' ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-900 border-slate-800 text-slate-600'}`}>
                                                              <option value="MAIN">🎯 Основа</option>
                                                              <option value="INSURE">🛡️ Страховка</option>
                                                              <option value="SKIP">❌ Пропуск</option>
                                                          </select>
                                                      </td>
                                                      <td className="py-2 px-3 text-right"><span className={`font-bold text-sm ${exp.mode === 'SKIP' ? 'text-slate-600' : 'text-slate-200'}`}>{formatUSD(exp.betAmount, 2)}</span></td>
                                                      <td className={`py-2 px-3 text-right ${exp.mode === 'SKIP' ? '' : 'bg-slate-800/30'}`}>
                                                          <div className="flex flex-col items-end">
                                                              <span className={`font-bold text-sm ${exp.mode === 'MAIN' ? 'text-white' : exp.mode === 'INSURE' ? 'text-slate-400' : 'text-slate-600'}`}>{formatUSD(exp.payout, 2)}</span>
                                                              {exp.mode === 'INSURE' && <span className="text-[9px] text-slate-500 leading-none mt-0.5">Возврат</span>}
                                                          </div>
                                                      </td>
                                                  </tr>
                                              );
                                          })}
                                      </tbody>
                                  </table>
                              </div>
                          </div>
                      </div>
                  ) : null}
                  {renderHistoryPanel(dutchingHistoryKey)}
              </>
          );

          const themeColors = uiThemeStyle(uiTheme);
          const activeFontPreset = fontPresetById(uiFontId);
          const themeCycleLabel = (t) => (t === 'slate' ? 'Тёмная' : t === 'lightGray' ? 'Светло-серая' : 'Песочная');
          const cycleUiTheme = () =>
              setUiTheme((t) => {
                  if (t === 'slate') return 'lightGray';
                  if (t === 'lightGray') return 'sand';
                  return 'slate';
              });
          const fabRoundSmall =
              'flex h-9 w-9 shrink-0 items-center justify-center rounded-full border shadow-md backdrop-blur-md transition focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400/50 active:scale-95';
          const fabThemeBtnClass =
              uiTheme === 'lightGray'
                  ? 'border-slate-300/90 bg-slate-50/95 text-slate-700 hover:bg-white'
                  : uiTheme === 'sand'
                  ? 'border-amber-300/80 bg-amber-50/95 text-amber-800 hover:bg-amber-50'
                  : 'border-slate-500/60 bg-slate-950/88 text-amber-300 hover:border-sky-400/45 hover:bg-slate-900/90';

          return (
            <div
                data-app-theme={uiTheme === 'lightGray' ? 'day' : uiTheme}
                data-app-font={uiFontId}
                className="relative min-h-screen min-w-0 max-w-[100vw] overflow-x-hidden bg-cover bg-center bg-fixed p-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] text-[15px] antialiased md:p-4"
                style={{
                    backgroundImage: "url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?auto=format&fit=crop&q=80&w=2000')",
                    backgroundColor: themeColors.pageBg,
                    color: themeColors.pageFg,
                    fontFamily: activeFontPreset.family,
                }}
            >
              <div className="absolute inset-0 backdrop-blur-[2px] pointer-events-none" style={{ backgroundColor: themeColors.overlay }} />
              <div
                  className="fixed z-[70] flex flex-col gap-1.5 top-[max(0.75rem,env(safe-area-inset-top))] right-[max(0.75rem,env(safe-area-inset-right))]"
                  role="toolbar"
                  aria-label="Оформление"
              >
                  <button
                      type="button"
                      onClick={cycleUiTheme}
                      title={`Тема: ${themeCycleLabel(uiTheme)} · нажмите — следующая`}
                      aria-label={`Сменить тему оформления, сейчас ${themeCycleLabel(uiTheme)}`}
                      className={`${fabRoundSmall} ${fabThemeBtnClass}`}
                  >
                      {uiTheme === 'slate' ? <MoonIcon size={17} /> : uiTheme === 'lightGray' ? <SunIcon size={17} /> : <DigitalBlueThemeIcon size={17} />}
                  </button>
              </div>

              {poolCelebrationModal ? (
                  <div
                      className="fixed inset-0 z-[205] flex items-center justify-center overflow-y-auto p-4 bg-black/70 backdrop-blur-sm"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="pool-celebration-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setPoolCelebrationModal(null);
                      }}
                  >
                      <div
                          className={`w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border p-0 shadow-2xl ${
                              poolCelebrationModal.kind === 'double'
                                  ? 'border-sky-500/45 bg-gradient-to-b from-slate-900 via-slate-950 to-slate-900 ring-2 ring-sky-400/30 shadow-sky-500/10'
                                  : poolCelebrationModal.kind === 'autoclose'
                                    ? 'border-amber-500/45 bg-gradient-to-b from-slate-900 via-amber-950/30 to-slate-900 ring-2 ring-amber-400/35 shadow-amber-500/15'
                                    : 'border-emerald-500/45 bg-gradient-to-b from-slate-900 via-emerald-950/35 to-slate-900 ring-2 ring-emerald-400/35 shadow-emerald-500/15'
                          }`}
                          onClick={(e) => e.stopPropagation()}
                      >
                          <div className="px-6 pt-8 pb-6 text-center">
                              <div
                                  className={`mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full text-3xl ${
                                      poolCelebrationModal.kind === 'double'
                                          ? 'bg-sky-500/20'
                                          : poolCelebrationModal.kind === 'autoclose'
                                            ? 'bg-amber-500/20'
                                            : 'bg-emerald-500/20'
                                  }`}
                              >
                                  {poolCelebrationModal.kind === 'double' ? '📈' : poolCelebrationModal.kind === 'autoclose' ? '🔒' : '🏆'}
                              </div>
                              <h3 id="pool-celebration-title" className="text-2xl font-black tracking-tight text-white">
                                  {poolCelebrationModal.title}
                              </h3>
                              <p className="mt-3 text-sm leading-relaxed text-slate-300">{poolCelebrationModal.subtitle}</p>
                              <button
                                  type="button"
                                  className={`mt-8 w-full rounded-xl py-3 text-base font-black text-white shadow-lg transition ${
                                      poolCelebrationModal.kind === 'double'
                                          ? 'bg-gradient-to-r from-sky-600 to-cyan-600 hover:from-sky-500 hover:to-cyan-500'
                                          : poolCelebrationModal.kind === 'autoclose'
                                            ? 'bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500'
                                            : 'bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500'
                                  }`}
                                  onClick={() => setPoolCelebrationModal(null)}
                              >
                                  Отлично
                              </button>
                          </div>
                      </div>
                  </div>
              ) : null}

              {chaserResetPrompt ? (
                  <div
                      className="fixed inset-0 z-[204] flex items-center justify-center overflow-y-auto p-4 bg-black/75"
                      role="dialog"
                      aria-modal="true"
                      aria-labelledby="chaser-reset-title"
                      onClick={(e) => {
                          if (e.target === e.currentTarget) setChaserResetPrompt(false);
                      }}
                  >
                      <div
                          className="w-full max-w-md max-h-[min(90dvh_calc(100dvh_-_2rem))] overflow-y-auto overscroll-contain rounded-2xl border border-slate-600 bg-slate-900 p-5 shadow-2xl"
                          onClick={(e) => e.stopPropagation()}
                      >
                          <h3 id="chaser-reset-title" className="text-lg font-black tracking-tight text-white">
